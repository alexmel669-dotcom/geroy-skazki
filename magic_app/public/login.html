<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Вход — Герой Сказок</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" type="image/png" href="assets/images/icon-192.png">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-avatar"><img src="assets/images/avatar.svg" data-avatar="lucik" alt="Люцик" width="80" height="80"></div>
    <h1>Вход</h1>
    <p class="auth-subtitle">Добро пожаловать в мир сказок!</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email">
      <input type="password" id="loginPassword" placeholder="Пароль" required autocomplete="current-password" minlength="6">
      <button type="submit" class="auth-btn">Войти</button>
    </form>
    <p class="auth-link"><a href="#" id="forgotPasswordLink" class="forgot-password">Забыли пароль?</a></p>
    <div id="passwordReset" class="password-reset" style="display:none;">
      <h3>Восстановление пароля</h3>
      <input type="email" id="resetEmail" placeholder="Email">
      <button type="button" class="auth-btn auth-btn-secondary" id="getSecretQuestionBtn">Далее</button>
      <div id="resetStep2" style="display:none;">
        <p id="secretQuestionText" class="secret-question-text"></p>
        <input type="text" id="secretAnswerInput" placeholder="Ваш ответ" autocomplete="off">
        <input type="password" id="newPassword" placeholder="Новый пароль" minlength="6" autocomplete="new-password">
        <button type="button" class="auth-btn" id="resetPasswordBtn">Сменить пароль</button>
      </div>
      <p class="auth-error" id="resetError"></p>
    </div>
    <p class="auth-error" id="loginError"></p>
    <p class="auth-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    <p class="auth-link"><a href="app.html" id="guestLink">Продолжить как гость 🐾</a></p>
  </div>
</div>
<script type="module" src="js/auth.js"></script>
<script>
  document.getElementById('guestLink')?.addEventListener('click', () => {
    localStorage.setItem('guestMode', 'true');
    localStorage.setItem('activeChildIndex', '-1');
    localStorage.removeItem('isAuth');
    localStorage.removeItem('userToken');
  });
</script>
</body>
</html>
