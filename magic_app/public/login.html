<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Вход — Герой Сказок</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-avatar">🐱</div>
    <h1>Вход</h1>
    <p class="auth-subtitle">Добро пожаловать в мир сказок!</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email">
      <input type="password" id="loginPassword" placeholder="Пароль" required autocomplete="current-password" minlength="6">
      <button type="submit" class="auth-btn">Войти</button>
    </form>
    <p class="auth-error" id="loginError"></p>
    <p class="auth-link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    <p class="auth-link"><a href="app.html">Продолжить как гость 🐾</a></p>
  </div>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    errorDiv.style.display = 'none';
    const btn = e.target.querySelector('button');
    btn.textContent = 'Вход...';
    btn.disabled = true;
    
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('userToken', data.token);
        localStorage.setItem('userEmail', data.email);
        window.location.href = '/app.html';
      } else {
        errorDiv.textContent = data.error || 'Неверный email или пароль';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      errorDiv.textContent = 'Ошибка соединения';
      errorDiv.style.display = 'block';
    } finally {
      btn.textContent = 'Войти';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
