<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Герой Сказок</title>
  <link rel="icon" type="image/png" href="assets/images/icon-192.png">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #5A52E0 0%, #6C63FF 50%, #7B73FF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
    }

    .splash {
      text-align: center;
      animation: fadeInScale 0.8s ease-out;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }

    .avatar-wrapper img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 40px rgba(255,215,0,0.3), 0 0 80px rgba(255,215,0,0.1);
      animation: gentlePulse 2s ease-in-out infinite;
    }

    .star {
      position: absolute;
      font-size: 20px;
      animation: starFloat 2s ease-in-out infinite;
    }
    .star-1 { top: 5px; left: -25px; animation-delay: 0s; }
    .star-2 { top: -10px; right: -20px; animation-delay: 0.5s; }
    .star-3 { bottom: 10px; left: -30px; animation-delay: 1s; }
    .star-4 { bottom: -5px; right: -25px; animation-delay: 1.5s; }

    h1 {
      color: #FFD700;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 6px;
      text-shadow:
        0 0 10px rgba(255,215,0,0.8),
        0 0 30px rgba(255,215,0,0.4),
        0 0 50px rgba(255,215,0,0.2),
        0 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 16px;
      font-style: italic;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .loading {
      margin-top: 32px;
    }

    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .loading-dots span {
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: dotBounce 1.4s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255,215,0,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255,215,0,0.5); }
    }

    @keyframes starFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-8px) scale(1.3); opacity: 1; }
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-12px); opacity: 1; }
    }

    @media (max-width: 480px) {
      .avatar-wrapper img { width: 100px; height: 100px; }
      h1 { font-size: 28px; letter-spacing: 4px; }
      .subtitle { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="avatar-wrapper">
      <img src="assets/images/avatar.png" alt="Люцик">
      <span class="star star-1">⭐</span>
      <span class="star star-2">✨</span>
      <span class="star star-3">🌟</span>
      <span class="star star-4">💫</span>
    </div>
    <h1>ГЕРОЙ СКАЗОК</h1>
    <p class="subtitle">каждый ребёнок — главный герой</p>

    <div class="loading">
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script>
    let navigated = false;

    function goToApp() {
      if (navigated) return;
      navigated = true;
      window.location.replace('app.html');
    }

    setTimeout(goToApp, 2000);

    document.addEventListener('click', goToApp);
    document.addEventListener('touchstart', goToApp, { passive: true });
  </script>
</body>
</html>
