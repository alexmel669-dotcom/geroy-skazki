<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Родительский кабинет — Люцик</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { background: linear-gradient(180deg, #141420, #1d1d30); }
    .parent-container { padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.5rem; }
    .back-link { color: var(--accent); text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
    .card h2 { margin: 0 0 12px; font-size: 1.1rem; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .row:last-child { border-bottom: none; }
    .label { opacity: 0.7; } .value { font-weight: 600; }
    .fear-item { margin-bottom: 12px; }
    .fear-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .bar-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 10px; background: var(--accent); }
    .badge { background: var(--accent); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; }
    .empty { opacity: 0.5; text-align: center; padding: 20px; }
  </style>
</head>
<body>
<div class="parent-container">
  <a href="app.html" class="back-link">← Назад к Люцику</a>
  <h1>👨‍👩‍👧 Родительский кабинет</h1>
  <p style="opacity:0.6; margin-bottom:20px;" id="childInfo">Статистика и прогресс</p>

  <div class="card">
    <h2>📊 Общая статистика</h2>
    <div id="statsContainer"><div class="empty">Загрузка...</div></div>
  </div>

  <div class="card">
    <h2>🎯 Работа со страхами</h2>
    <div id="fearsContainer"><div class="empty">Загрузка...</div></div>
  </div>

  <div class="card">
    <h2>📝 Последняя активность</h2>
    <div id="historyContainer"><div class="empty">Загрузка...</div></div>
  </div>
</div>
<script src="js/parent.js"></script>
</body>
</html>
