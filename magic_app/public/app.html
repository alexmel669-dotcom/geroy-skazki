<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* https://api.deepseek.com https://tts.api.cloud.yandex.net https://tts.speechkit.yandexcloud.net https://stt.api.cloud.yandex.net https://geroy-skazki.vercel.app https://*.vercel.app;">
  <title>Люцик — Герой Сказок</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
  <meta name="theme-color" content="#151521">
</head>
<body>
<div class="container">
  <header>
    <div class="header-title">🐱 Люцик</div>
    <div class="header-buttons">
      <button class="btn-icon" id="logoutBtn" style="display:none;">🚪</button>
      <button class="btn-icon" id="parentBtn">⚙️</button>
    </div>
  </header>

  <div class="avatar-section">
    <div class="avatar" id="avatar" style="background-image:url('/assets/images/avatar.svg')"></div>
    <div class="child-name" id="childNameLabel">Загрузка...</div>
  </div>

  <div class="stats-row">
    <div class="stat-item"><span>😊</span><div class="bar"><div class="fill" id="moodFill" style="width:70%;background:var(--yellow)"></div></div></div>
    <div class="stat-item"><span>🍎</span><div class="bar"><div class="fill" id="hungerFill" style="width:60%;background:var(--green)"></div></div></div>
    <div class="stat-item"><span>⚡</span><div class="bar"><div class="fill" id="energyFill" style="width:50%;background:var(--blue)"></div></div></div>
    <div class="stat-item"><span>⭐</span><div class="bar"><div class="fill" id="braveryFill" style="width:10%;background:var(--accent)"></div></div></div>
  </div>

  <div class="actions-row">
    <button class="action-btn" id="feedBtn">🍎</button>
    <button class="action-btn" id="gamesBtn">🎮</button>
    <button class="action-btn" id="roomBtn">🏠</button>
  </div>

  <div class="mic-wrapper">
    <button class="mic-btn" id="micBtn">🎤</button>
  </div>
</div>

<!-- Выбор ребёнка при запуске -->
<div class="modal-overlay" id="childSelectModal" style="display:none;">
  <div class="modal-box">
    <h3 style="margin:0 0 8px;">👶 С кем сегодня говорим?</h3>
    <p style="opacity:0.7;font-size:0.85rem;margin:0 0 16px;">Выбери, с кем из детей будет общаться Люцик</p>
    <div id="childSelectList" style="display:flex;flex-direction:column;gap:10px;"></div>
    <button class="modal-btn secondary" style="margin-top:14px;width:100%;" onclick="selectGuestMode()">🐾 Продолжить как гость</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
