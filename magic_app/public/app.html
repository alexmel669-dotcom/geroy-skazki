<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; manifest-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* https://api.deepseek.com https://tts.api.cloud.yandex.net https://tts.speechkit.yandexcloud.net https://stt.api.cloud.yandex.net https://geroy-skazki.vercel.app https://*.vercel.app;">
  <title>Люцик — Герой Сказок</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="assets/images/icon-192.png">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
</head>
<body>
<!-- Splash Overlay -->
<div id="splashOverlay" style="
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #5A52E0 0%, #6C63FF 50%, #7B73FF 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 10000; font-family: 'Georgia', serif;
  transition: opacity 0.5s ease;
">
  <div style="text-align: center; animation: fadeInScale 0.8s ease-out;">

    <div style="position: relative; display: inline-block; margin-bottom: 24px;">
      <img src="assets/images/avatar.png" alt="Люцик" class="splash-avatar" style="
        width: 130px; height: 130px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.4);
        box-shadow: 0 0 40px rgba(255,215,0,0.3);
      ">
    </div>

    <h1 style="
      color: #FFD700; font-size: 38px; font-weight: 700;
      letter-spacing: 6px; margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 30px rgba(255,215,0,0.4), 0 0 50px rgba(255,215,0,0.2);
    ">ГЕРОЙ СКАЗОК</h1>

    <p style="
      color: rgba(255,255,255,0.85); font-size: 16px;
      font-style: italic; letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    ">каждый ребёнок — главный герой</p>

    <div style="margin-top: 32px; display: flex; justify-content: center; gap: 8px;">
      <span class="splash-dot" style="width:10px;height:10px;background:rgba(255,255,255,0.6);border-radius:50%;animation:dotBounce 1.4s infinite;"></span>
      <span class="splash-dot" style="width:10px;height:10px;background:rgba(255,255,255,0.6);border-radius:50%;animation:dotBounce 1.4s 0.2s infinite;"></span>
      <span class="splash-dot" style="width:10px;height:10px;background:rgba(255,255,255,0.6);border-radius:50%;animation:dotBounce 1.4s 0.4s infinite;"></span>
    </div>

    <button type="button" onclick="skipSplash()" style="
      margin-top: 40px; background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4); color: #fff;
      padding: 12px 32px; border-radius: 24px; font-size: 16px;
      cursor: pointer; transition: background 0.3s;
    ">Войти ✨</button>

  </div>
</div>

<style>
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-12px); opacity: 1; }
  }

  @media (max-width: 480px) {
    #splashOverlay h1 { font-size: 28px; letter-spacing: 4px; }
    #splashOverlay img { width: 100px; height: 100px; }
  }
</style>

<script>
  let splashTimer = setTimeout(hideSplash, 1500);
  let splashHidden = false;

  function hideSplash() {
    if (splashHidden) return;
    splashHidden = true;
    const overlay = document.getElementById('splashOverlay');
    if (!overlay) {
      window.dispatchEvent(new Event('appReady'));
      return;
    }
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.remove();
      window.dispatchEvent(new Event('appReady'));
    }, 500);
  }

  function skipSplash() {
    clearTimeout(splashTimer);
    hideSplash();
  }

  window.skipSplash = skipSplash;

  document.getElementById('splashOverlay').addEventListener('click', skipSplash);

  // Страховка: скрыть splash через 3 секунды в любом случае
  setTimeout(() => {
    const splash = document.getElementById('splashOverlay');
    if (splash && splash.style.display !== 'none') {
      splash.style.display = 'none';
    }
  }, 3000);
</script>

<div class="container">
  <header>
    <div class="header-title"><img src="assets/images/avatar.png" data-avatar="lucik" alt="Люцик" class="header-avatar" width="28" height="28"> Люцик</div>
    <div class="header-buttons parent-access">
      <a href="index.html" class="btn-icon landing-link" id="landingLink" title="На главную">🏠</a>
      <button class="btn-icon settings-btn" id="parentBtn">⚙️</button>
    </div>
  </header>

  <div class="streak-display" id="streakDisplay">
    <button type="button" class="streak-btn" id="achievements-btn" title="Звёзды и достижения">
      <span class="star">⭐</span> × <span id="starCount">0</span>
      <span class="streak-fire">🔥</span> <span id="streakDays">0</span> дн.
    </button>
  </div>

  <div class="avatar-section">
    <div class="app-title">
      <span class="title-hero">Герой</span>
      <span class="title-tales">Сказок</span>
    </div>
    <div class="avatar-container">
      <img id="avatar" class="avatar avatar-img character-avatar" data-avatar="lucik" src="assets/images/avatar.png" alt="Люцик">
      <span id="avatarEmoji" class="avatar-fallback" style="display:none; font-size:80px;">🐱</span>
    </div>
    <div class="child-name" id="childNameLabel">Загрузка...</div>
  </div>

  <div class="stats-row">
    <div class="stat-item"><span>😊</span><div class="bar"><div class="fill" id="moodFill" style="width:70%;background:var(--yellow)"></div></div></div>
    <div class="stat-item"><span>🍎</span><div class="bar"><div class="fill" id="hungerFill" style="width:60%;background:var(--green)"></div></div></div>
    <div class="stat-item"><span>⚡</span><div class="bar"><div class="fill" id="energyFill" style="width:50%;background:var(--blue)"></div></div></div>
    <div class="stat-item"><span>⭐</span><div class="bar"><div class="fill" id="braveryFill" style="width:10%;background:var(--accent)"></div></div></div>
  </div>

  <div class="actions-row">
    <button class="action-btn" id="feedBtn" onclick="feedLucik()" title="Покормить Люцика">🍎</button>
    <button class="action-btn" onclick="showGamesMenu()" title="Игры">🎮</button>
    <button class="action-btn" onclick="showLeaderboard()" title="Таблица лидеров">🏆</button>
    <button class="action-btn" id="houseBtn" onclick="showLucikHouse()" title="Домик">🏠</button>
  </div>

  <div class="text-chat-row">
    <input type="text" id="textChatInput" placeholder="Напиши сообщение..." maxlength="200" autocomplete="off">
    <button type="button" class="action-btn" id="send-text-btn" title="Отправить">✉️</button>
  </div>

  <div class="plan-limit-bar" id="planLimitBar">
    <p>Мы сегодня уже много общались! Попроси родителей открыть полный доступ.</p>
    <a href="pricing.html" class="plan-upgrade-btn">Хочу больше сказок</a>
  </div>

  <div class="mic-wrapper">
    <p id="thinkingDots" class="thinking-dots" style="display:none;">🤔 Люцик думает...</p>
    <button class="mic-btn mic-idle" id="micButton" type="button" aria-label="Микрофон">
      <span class="mic-icon">🎤</span>
    </button>
  </div>
</div>

<!-- Выбор ребёнка при запуске -->
<div class="modal-overlay" id="childSelectModal" style="display:none;">
  <div class="modal-box">
    <h3 style="margin:0 0 8px;">👶 С кем сегодня говорим?</h3>
    <p style="opacity:0.7;font-size:0.85rem;margin:0 0 16px;">Выбери, с кем из детей будет общаться Люцик</p>
    <div id="childSelectList" style="display:flex;flex-direction:column;gap:10px;"></div>
    <button class="modal-btn secondary" style="margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;" onclick="selectGuestMode()"><img src="assets/images/avatar.svg" data-avatar="lucik" width="24" height="24" alt="" style="border-radius:50%;"> Продолжить как гость</button>
  </div>
</div>

<script type="module">
  import { initChildModeFromUrl } from './js/child-mode.js';
  initChildModeFromUrl();
</script>
<script type="module" src="js/error-monitor.js"></script>
<script type="module" src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage('skipWaiting');

            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#6C63FF;color:#fff;padding:12px 24px;border-radius:24px;z-index:9999;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
            banner.textContent = '🔄 Обновление готово. Нажмите чтобы обновить.';
            banner.onclick = () => location.reload();
            document.body.appendChild(banner);

            setTimeout(() => {
              location.reload();
            }, 3000);
          }
        });
      });

      setInterval(() => reg.update(), 600000);
    }).catch(() => {});
  }
</script>
</body>
</html>
