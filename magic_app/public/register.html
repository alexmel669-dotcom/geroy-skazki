<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Регистрация — Герой Сказок</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-avatar">🐱</div>
    <h1>Регистрация</h1>
    <p class="auth-subtitle">Создайте аккаунт и добавьте детей</p>
    
    <form id="registerForm">
      <input type="email" id="regEmail" placeholder="Ваш Email" required autocomplete="email">
      <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required autocomplete="new-password" minlength="6">
      
      <!-- Ребёнок 1 (обязательно) -->
      <div class="child-block">
        <label>👶 Ребёнок 1 *</label>
        <div class="child-row">
          <input type="text" id="child1Name" placeholder="Имя" required>
          <input type="number" id="child1Age" class="age-input" placeholder="Возраст" min="3" max="7" required>
        </div>
      </div>
      
      <!-- Ребёнок 2 (опционально) -->
      <div class="child-block">
        <label>👶 Ребёнок 2 (необязательно)</label>
        <div class="child-row">
          <input type="text" id="child2Name" placeholder="Имя">
          <input type="number" id="child2Age" class="age-input" placeholder="Возраст" min="3" max="7">
        </div>
      </div>
      
      <!-- Ребёнок 3 (опционально) -->
      <div class="child-block">
        <label>👶 Ребёнок 3 (необязательно)</label>
        <div class="child-row">
          <input type="text" id="child3Name" placeholder="Имя">
          <input type="number" id="child3Age" class="age-input" placeholder="Возраст" min="3" max="7">
        </div>
      </div>
      
      <button type="submit" class="auth-btn">Зарегистрироваться</button>
    </form>
    
    <p class="auth-error" id="regError"></p>
    <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
  </div>
</div>
<script>
  // Определение пола по имени (простая эвристика)
  function guessGender(name) {
    const n = name.trim().toLowerCase();
    // Женские окончания
    if (n.endsWith('а') || n.endsWith('я') || n.endsWith('ия') || n === 'любовь') return 'female';
    // Мужские окончания
    if (n.endsWith('й') || n.endsWith('р') || n.endsWith('н') || n.endsWith('м') || n.endsWith('л')) return 'male';
    // Известные имена
    const femaleNames = ['анна', 'мария', 'софия', 'алиса', 'вика', 'виктория', 'лена', 'катя', 'наташа', 'света', 'оля', 'ира', 'таня', 'юля', 'вера', 'надежда', 'люба', 'мила', 'даша', 'саша'];
    const maleNames = ['петя', 'миша', 'саша', 'коля', 'ваня', 'дима', 'слава', 'рома', 'тима', 'федя', 'лёва', 'никита', 'артём', 'даня', 'кирилл', 'матвей', 'егор', 'илья', 'антон', 'марк', 'лев', 'тимофей'];
    if (femaleNames.includes(n)) return 'female';
    if (maleNames.includes(n)) return 'male';
    return 'unknown';
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const errorDiv = document.getElementById('regError');
    
    if (!email) {
      errorDiv.textContent = 'Введите email';
      errorDiv.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errorDiv.textContent = 'Пароль должен быть не менее 6 символов';
      errorDiv.style.display = 'block';
      return;
    }
    
    // Собираем детей
    const children = [];
    for (let i = 1; i <= 3; i++) {
      const nameInput = document.getElementById(`child${i}Name`);
      const ageInput = document.getElementById(`child${i}Age`);
      const name = nameInput ? nameInput.value.trim() : '';
      const age = ageInput ? parseInt(ageInput.value) || 0 : 0;
      
      if (i === 1 && !name) {
        errorDiv.textContent = 'Укажите имя первого ребёнка';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (name) {
        const gender = guessGender(name);
        // kid1 = девочка, kid2 = мальчик, lucik = по умолчанию (гость)
        const avatarRole = gender === 'female' ? 'kid1' : (gender === 'male' ? 'kid2' : 'lucik');
        children.push({
          name,
          age: age || 5,
          gender,
          avatarRole,
          index: i - 1
        });
      }
    }
    
    if (children.length === 0) {
      errorDiv.textContent = 'Добавьте хотя бы одного ребёнка';
      errorDiv.style.display = 'block';
      return;
    }
    
    errorDiv.style.display = 'none';
    const btn = e.target.querySelector('button');
    btn.textContent = 'Регистрация...';
    btn.disabled = true;
    
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('userToken', data.token);
        localStorage.setItem('userEmail', data.email);
        localStorage.setItem('children', JSON.stringify(children));
        localStorage.setItem('childrenNames', children.map(c => c.name).join(', '));
        // Инициализируем статистику для каждого ребёнка
        children.forEach(child => {
          const key = `stats_${child.name}`;
          if (!localStorage.getItem(key)) {
            localStorage.setItem(key, JSON.stringify({
              totalStories: 0,
              totalGames: 0,
              history: [],
              fearStats: {
                "темноты": 0, "врачей": 0, "одиночества": 0,
                "нового": 0, "обиды": 0, "животных": 0
              },
              lastActive: new Date().toISOString()
            }));
          }
        });
        window.location.href = '/app.html';
      } else {
        errorDiv.textContent = data.error || 'Ошибка регистрации. Возможно, email уже используется.';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      errorDiv.textContent = 'Ошибка соединения. Проверьте интернет.';
      errorDiv.style.display = 'block';
    } finally {
      btn.textContent = 'Зарегистрироваться';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
