<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Регистрация — Герой Сказок</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="/assets/images/icon-192.svg" type="image/svg+xml">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-avatar"><img src="/assets/images/avatar.svg" alt="Люцик" width="80" height="80"></div>
    <h1>Регистрация</h1>
    <p class="auth-subtitle">Создайте аккаунт и добавьте детей</p>
    
    <form id="registerForm">
      <input type="email" id="regEmail" placeholder="Ваш Email" required autocomplete="email">

      <div class="form-group promocode-group">
        <label for="parentName">👤 Ваше имя</label>
        <input type="text" id="parentName" placeholder="Анна" required autocomplete="name">
      </div>

      <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)" required autocomplete="new-password" minlength="6">
      <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль" required autocomplete="new-password" minlength="6">

      <div class="form-group promocode-group">
        <label for="promocode">🎁 Промокод (если есть)</label>
        <input type="text" id="promocode" placeholder="Например: TESTER2026" autocomplete="off">
        <span class="promocode-hint" id="promocodeHint"></span>
      </div>

      <div class="form-group promocode-group">
        <label for="parentPin">🔐 PIN для родительского кабинета (4 цифры)</label>
        <input type="password" id="parentPin" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" placeholder="1234" required autocomplete="off">
      </div>

      <!-- Ребёнок 1 (обязательно) -->
      <div class="child-block">
        <label>👶 Ребёнок 1 *</label>
        <div class="child-row">
          <input type="text" id="child1Name" placeholder="Имя" required>
          <input type="number" id="child1Age" class="age-input" placeholder="Возраст" min="3" max="14" required>
        </div>
        <div class="gender-row">
          <label><input type="radio" name="child1Gender" value="female" checked> <img src="/assets/images/kid1.svg" width="20" height="20" alt="" style="border-radius:50%;vertical-align:middle;"> Девочка</label>
          <label><input type="radio" name="child1Gender" value="male"> <img src="/assets/images/kid2.svg" width="20" height="20" alt="" style="border-radius:50%;vertical-align:middle;"> Мальчик</label>
        </div>
      </div>
      
      <!-- Ребёнок 2 (опционально) -->
      <div class="child-block">
        <label>👶 Ребёнок 2 (необязательно)</label>
        <div class="child-row">
          <input type="text" id="child2Name" placeholder="Имя">
          <input type="number" id="child2Age" class="age-input" placeholder="Возраст" min="3" max="14">
        </div>
        <div class="gender-row">
          <label><input type="radio" name="child2Gender" value="female" checked> <img src="/assets/images/kid1.svg" width="20" height="20" alt="" style="border-radius:50%;vertical-align:middle;"> Девочка</label>
          <label><input type="radio" name="child2Gender" value="male"> <img src="/assets/images/kid2.svg" width="20" height="20" alt="" style="border-radius:50%;vertical-align:middle;"> Мальчик</label>
        </div>
      </div>
      
      <!-- Ребёнок 3 (опционально) -->
      <div class="child-block">
        <label>👶 Ребёнок 3 (необязательно)</label>
        <div class="child-row">
          <input type="text" id="child3Name" placeholder="Имя">
          <input type="number" id="child3Age" class="age-input" placeholder="Возраст" min="3" max="14">
        </div>
        <div class="gender-row">
          <label><input type="radio" name="child3Gender" value="female" checked> <img src="/assets/images/kid1.svg" width="20" height="20" alt="" style="border-radius:50%;vertical-align:middle;"> Девочка</label>
          <label><input type="radio" name="child3Gender" value="male"> <img src="/assets/images/kid2.svg" width="20" height="20" alt="" style="border-radius:50%;vertical-align:middle;"> Мальчик</label>
        </div>
      </div>
      
      <button type="submit" class="auth-btn">Зарегистрироваться</button>
    </form>
    
    <p class="auth-error" id="regError"></p>
    <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    <p class="auth-link" style="margin-top:12px;font-size:0.8rem;opacity:0.6;">
      <a href="privacy.html">Конфиденциальность</a> · <a href="terms.html">Соглашение</a>
    </p>
  </div>
</div>
<script>
  const promocodeInput = document.getElementById('promocode');
  const promocodeHint = document.getElementById('promocodeHint');
  let promocodeValid = false;

  promocodeInput?.addEventListener('blur', async () => {
    const code = promocodeInput.value.trim();
    if (!code) {
      promocodeHint.textContent = '';
      promocodeValid = false;
      return;
    }
    try {
      const res = await fetch('/api/promocode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      const data = await res.json();
      if (data.valid) {
        promocodeHint.textContent = '✅ ' + data.message;
        promocodeHint.style.color = '#81c784';
        promocodeValid = true;
      } else {
        promocodeHint.textContent = '❌ ' + (data.message || 'Промокод не найден');
        promocodeHint.style.color = '#ef9a9a';
        promocodeValid = false;
      }
    } catch {
      promocodeHint.textContent = '';
    }
  });
  function getChildGender(index) {
    return document.querySelector(`input[name="child${index}Gender"]:checked`)?.value || 'male';
  }

  function saveChildrenToLocal(children) {
    localStorage.setItem('children', JSON.stringify(children));
    localStorage.setItem('childrenNames', children.map(c => c.name).join(', '));
    children.forEach(child => {
      const key = `stats_${child.name}`;
      if (!localStorage.getItem(key)) {
        localStorage.setItem(key, JSON.stringify({
          totalStories: 0,
          totalGames: 0,
          history: [],
          fearStats: {
            darkness: 0, monsters: 0, loud_noises: 0,
            strangers: 0, separation: 0, school: 0, peers: 0
          },
          lastActive: new Date().toISOString()
        }));
      }
    });
    localStorage.setItem('activeChildIndex', children.length > 1 ? '-1' : '0');
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regPasswordConfirm').value;
    const errorDiv = document.getElementById('regError');
    
    if (!email) {
      errorDiv.textContent = 'Введите email';
      errorDiv.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errorDiv.textContent = 'Пароль должен быть не менее 6 символов';
      errorDiv.style.display = 'block';
      return;
    }
    if (password !== confirmPassword) {
      errorDiv.textContent = 'Пароли не совпадают';
      errorDiv.style.display = 'block';
      return;
    }

    const parentPin = document.getElementById('parentPin')?.value.trim() || '';
    if (!/^\d{4}$/.test(parentPin)) {
      errorDiv.textContent = 'PIN: ровно 4 цифры';
      errorDiv.style.display = 'block';
      return;
    }
    
    // Собираем детей
    const children = [];
    let invalidAge = false;
    for (let i = 1; i <= 3; i++) {
      const nameInput = document.getElementById(`child${i}Name`);
      const ageInput = document.getElementById(`child${i}Age`);
      const name = nameInput ? nameInput.value.trim() : '';
      const age = ageInput ? parseInt(ageInput.value) || 0 : 0;
      
      if (i === 1 && !name) {
        errorDiv.textContent = 'Укажите имя первого ребёнка';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (name) {
        const gender = getChildGender(i);
        const avatarRole = gender === 'male' ? 'kid2' : 'kid1';
        const avatar = gender === 'male' ? 'kid2.svg' : 'kid1.svg';
        if (age && (age < 3 || age > 14)) {
          invalidAge = true;
        }
        children.push({ name, age: age || 5, gender, avatar, avatarRole, index: i - 1 });
      }
    }

    if (invalidAge) {
      errorDiv.textContent = 'Возраст ребёнка: от 3 до 14 лет';
      errorDiv.style.display = 'block';
      return;
    }
    
    if (children.length === 0) {
      errorDiv.textContent = 'Добавьте хотя бы одного ребёнка';
      errorDiv.style.display = 'block';
      return;
    }
    
    const parentName = document.getElementById('parentName')?.value.trim() || '';
    if (!parentName) {
      errorDiv.textContent = 'Введите ваше имя';
      errorDiv.style.display = 'block';
      return;
    }

    const promocode = document.getElementById('promocode')?.value.trim() || '';
    errorDiv.style.display = 'none';
    const btn = e.target.querySelector('button');
    btn.textContent = 'Регистрация...';
    btn.disabled = true;
    
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, parentName, children, promocode, parentPin })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('userToken', data.token);
        localStorage.setItem('userEmail', data.user?.email || email);
        localStorage.setItem('isAuth', 'true');
        localStorage.setItem('guestMode', 'false');
        localStorage.setItem('userPlan', data.user?.plan || 'free');
        if (data.user?.planExpiry) localStorage.setItem('planExpiry', data.user.planExpiry);
        if (data.user?.promocodeUsed) localStorage.setItem('promocodeUsed', data.user.promocodeUsed);
        if (data.promoMessage) localStorage.setItem('promoMessage', data.promoMessage);
        if (data.user?.role) localStorage.setItem('userRole', data.user.role);
        if (data.user?.parentName) localStorage.setItem('parentName', data.user.parentName);
        const savedChildren = data.user?.children?.length ? data.user.children : children;
        saveChildrenToLocal(savedChildren);
        window.location.href = '/app.html';
      } else {
        const errMap = {
          'User already exists': 'Этот email уже зарегистрирован',
          'Email and password required': 'Введите email и пароль',
          'Password must be at least 6 characters': 'Пароль должен быть не менее 6 символов',
          'Internal server error': 'Ошибка сервера'
        };
        errorDiv.textContent = errMap[data.error] || data.error || 'Ошибка регистрации. Возможно, email уже используется.';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      errorDiv.textContent = 'Ошибка соединения. Проверьте интернет.';
      errorDiv.style.display = 'block';
    } finally {
      btn.textContent = 'Зарегистрироваться';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
