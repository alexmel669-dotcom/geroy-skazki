<!DOCTYPE html>
<html>
<head>
    <title>Тест голоса Люцика</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>🎤 Тест голоса Яндекс SpeechKit</h1>
    <button id="testBtn" style="font-size: 20px; padding: 15px 30px;">🔊 Нажми, чтобы услышать Люцика</button>
    <div id="status" style="margin-top: 20px; font-size: 16px;"></div>
    
    <script>
        const btn = document.getElementById('testBtn');
        const status = document.getElementById('status');
        
        btn.onclick = async () => {
            status.innerHTML = '⏳ Отправка запроса к Яндекс SpeechKit...';
            status.style.color = 'blue';
            
            try {
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: 'Привет! Я Люцик, твой пушистый друг. Рад познакомиться!',
                        voice: 'alexander',
                        emotion: 'good'
                    })
                });
                
                status.innerHTML = '📦 Ответ получен, статус: ' + response.status;
                
                if (!response.ok) {
                    status.innerHTML = '❌ Ошибка сервера: ' + response.status;
                    status.style.color = 'red';
                    return;
                }
                
                const blob = await response.blob();
                status.innerHTML = '✅ Аудио получено! Размер: ' + blob.size + ' байт<br>';
                
                if (blob.size < 100) {
                    status.innerHTML += '❌ Файл слишком маленький, возможно ошибка';
                    status.style.color = 'red';
                    return;
                }
                
                // Пробуем воспроизвести
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                
                audio.oncanplay = () => {
                    status.innerHTML += '🎵 Аудио загружено, пробуем воспроизвести...';
                };
                
                audio.onplay = () => {
                    status.innerHTML += '<br>🔊 Голос проигрывается!';
                    status.style.color = 'green';
                };
                
                audio.onerror = (e) => {
                    status.innerHTML += '<br>❌ Ошибка воспроизведения. Возможно, формат не поддерживается браузером.';
                    status.style.color = 'red';
                    console.error('Audio error:', e);
                };
                
                await audio.play();
                
            } catch (error) {
                status.innerHTML = '❌ Ошибка: ' + error.message;
                status.style.color = 'red';
                console.error('Error:', error);
            }
        };
    </script>
</body>
</html>
