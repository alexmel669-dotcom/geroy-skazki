<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Герой Сказок</title>
    <style>
        body { font-family: system-ui; background: #1a2a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #2a3a2a; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h1 { color: #8bc34a; }
        input, button { padding: 10px 15px; border-radius: 30px; border: none; margin: 5px; }
        button { background: #4a7a4a; color: white; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Админ-панель</h1>
        <div class="card">
            <h2>Вход</h2>
            <input type="password" id="adminPass" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
        </div>
        <div id="statsPanel" style="display:none;">
            <div class="card"><h2>📊 Общая статистика</h2><div id="generalStats"></div></div>
            <div class="card"><h2>😨 Страхи</h2><div id="fearsStats"></div></div>
            <div class="card"><h2>🎮 Игры</h2><div id="gamesStats"></div></div>
            <div class="card"><h2>📅 Активность</h2><div id="activityStats"></div></div>
        </div>
    </div>
    <script>
        document.getElementById('loginBtn').onclick=async()=>{
            const pass=document.getElementById('adminPass').value;
            const res=await fetch('/api/admin-stats?password='+encodeURIComponent(pass));
            if(res.ok){
                const data=await res.json();
                document.getElementById('statsPanel').style.display='block';
                document.getElementById('generalStats').innerHTML=`<div class="stats-grid"><div>👥 Пользователей: ${data.stats.totalUsers}</div><div>📈 Событий: ${data.stats.totalEvents}</div><div>📖 Сказок: ${data.stats.totalStories}</div></div>`;
                document.getElementById('fearsStats').innerHTML=data.stats.fears.map(f=>`<div>${f.fear||'неизвестно'}: ${f.count}</div>`).join('');
                document.getElementById('gamesStats').innerHTML=data.stats.games.map(g=>`<div>${g.event_type}: ${g.count}</div>`).join('');
                document.getElementById('activityStats').innerHTML=data.stats.dailyActivity.map(a=>`<div>${a.date}: ${a.count}</div>`).join('');
            } else alert('Неверный пароль');
        };
    </script>
</body>
</html>
