<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Герой Сказок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #a0a0c0;
        }
        
        h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #c0c0e0;
        }
        
        .login-panel {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        
        .login-panel input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 16px;
            margin: 15px 0;
        }
        
        .login-panel input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .dashboard {
            display: none;
        }
        
        .dashboard.show {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 14px;
            color: #a0a0c0;
            margin-top: 5px;
        }
        
        .chart-container {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .system-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .status-badge {
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
        }
        
        .status-ok {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        
        .status-error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            color: #a0a0c0;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .fear-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .refresh-info {
            color: #a0a0c0;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #a0a0c0;
        }
        
        .error-message {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Экран входа -->
        <div id="loginScreen" class="login-panel">
            <h2>🔐 Админ-панель</h2>
            <p style="color: #a0a0c0; margin-bottom: 20px;">Герой Сказок</p>
            <input type="password" id="adminKey" placeholder="Введите ключ доступа" autocomplete="off">
            <button class="btn btn-primary" onclick="login()" style="width: 100%;">Войти</button>
            <p id="loginError" style="color: #e74c3c; margin-top: 15px; font-size: 14px;"></p>
            <p style="margin-top: 20px; font-size: 12px; color: #666;">
                Используйте ADMIN_SECRET или войдите как alexmel669@gmail.com
            </p>
        </div>
        
        <!-- Дашборд -->
        <div id="dashboard" class="dashboard">
            <div class="top-bar">
                <div>
                    <h1>🐱 Герой Сказок <span style="font-size: 14px; color: #667eea; margin-left: 10px;">Админ-панель</span></h1>
                    <p class="refresh-info" id="lastUpdate">Загрузка...</p>
                </div>
                <div>
                    <button class="btn btn-small btn-danger" onclick="logout()">Выйти</button>
                    <button class="btn btn-small btn-primary" onclick="refreshStats()" style="margin-left: 10px;">🔄 Обновить</button>
                </div>
            </div>
            
            <!-- Системный статус -->
            <div class="system-status" id="systemStatus"></div>
            
            <!-- Основные метрики -->
            <div class="stats-grid" id="mainStats"></div>
            
            <!-- График по дням -->
            <div class="chart-container">
                <h3>📊 Активность за последние 7 дней</h3>
                <div id="dailyStats"></div>
            </div>
            
            <!-- Топ страхов и последняя активность -->
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
                <div class="chart-container">
                    <h3>😨 Топ страхов</h3>
                    <div id="topFears"></div>
                </div>
                <div class="chart-container">
                    <h3>📋 Последняя активность</h3>
                    <div id="recentActivity" style="max-height: 300px; overflow-y: auto;"></div>
                </div>
            </div>
            
            <!-- Действия -->
            <div class="chart-container">
                <h3>⚙️ Действия</h3>
                <button class="btn btn-small btn-primary" onclick="clearCache()">🧹 Очистить кеш</button>
                <span style="color: #a0a0c0; margin-left: 15px; font-size: 12px;">Статистика обновляется автоматически каждые 30 секунд</span>
            </div>
        </div>
    </div>

    <script>
        let adminKey = '';
        let autoRefreshInterval = null;
        
        // Проверка сохранённого ключа
        const savedKey = localStorage.getItem('adminKey');
        if (savedKey) {
            adminKey = savedKey;
            checkAccess();
        }
        
        async function login() {
            const key = document.getElementById('adminKey').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (!key) {
                errorDiv.textContent = 'Введите ключ доступа';
                return;
            }
            
            adminKey = key;
            await checkAccess();
        }
        
        async function checkAccess() {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = 'Проверка доступа...';
            
            try {
                const response = await fetch(`/api/admin-stats?key=${encodeURIComponent(adminKey)}`);
                
                if (response.ok) {
                    localStorage.setItem('adminKey', adminKey);
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').classList.add('show');
                    loadStats();
                    autoRefreshInterval = setInterval(loadStats, 30000);
                } else {
                    errorDiv.textContent = 'Неверный ключ доступа';
                    localStorage.removeItem('adminKey');
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения';
            }
        }
        
        function logout() {
            localStorage.removeItem('adminKey');
            adminKey = '';
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').classList.remove('show');
            document.getElementById('adminKey').value = '';
        }
        
        async function refreshStats() {
            await loadStats();
        }
        
        async function loadStats() {
            try {
                const response = await fetch(`/api/admin-stats?key=${encodeURIComponent(adminKey)}`);
                
                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                    }
                    return;
                }
                
                const data = await response.json();
                renderStats(data);
                document.getElementById('lastUpdate').textContent = `Обновлено: ${new Date().toLocaleTimeString()}`;
                
            } catch (error) {
                console.error('Ошибка загрузки статистики:', error);
            }
        }
        
        function renderStats(data) {
            // Системный статус
            const systemDiv = document.getElementById('systemStatus');
            systemDiv.innerHTML = Object.entries(data.system).map(([name, status]) => {
                const isOk = status.includes('✅');
                return `<div class="status-badge ${isOk ? 'status-ok' : 'status-error'}">${name}: ${status}</div>`;
            }).join('');
            
            // Основные метрики
            const mainDiv = document.getElementById('mainStats');
            mainDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${data.totals.users || 0}</div>
                    <div class="stat-label">👥 Всего пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.totals.stories || 0}</div>
                    <div class="stat-label">📖 Всего сказок</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.online.unique_users_24h || 0}</div>
                    <div class="stat-label">🟢 Активных за 24ч</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${data.online.active_sessions_24h || 0}</div>
                    <div class="stat-label">💬 Сессий за 24ч</div>
                </div>
            `;
            
            // Статистика по дням
            const dailyDiv = document.getElementById('dailyStats');
            if (data.by_date && data.by_date.length > 0) {
                dailyDiv.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Сказок</th>
                                <th>Пользователей</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.by_date.map(day => `
                                <tr>
                                    <td>${day.date}</td>
                                    <td>${day.stories}</td>
                                    <td>${day.users}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } else {
                dailyDiv.innerHTML = '<p style="color: #a0a0c0;">Нет данных за последние 7 дней</p>';
            }
            
            // Топ страхов
            const fearsDiv = document.getElementById('topFears');
            if (data.top_fears && data.top_fears.length > 0) {
                fearsDiv.innerHTML = data.top_fears.map(fear => `
                    <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <span><span class="fear-badge">${fear.fear || 'неизвестно'}</span></span>
                        <span style="color: #667eea; font-weight: bold;">${fear.count}</span>
                    </div>
                `).join('');
            } else {
                fearsDiv.innerHTML = '<p style="color: #a0a0c0;">Нет данных о страхах</p>';
            }
            
            // Последняя активность
            const recentDiv = document.getElementById('recentActivity');
            if (data.recent_activity && data.recent_activity.length > 0) {
                recentDiv.innerHTML = data.recent_activity.map(activity => `
                    <div style="padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 3px;">
                            <span style="color: #667eea;">${activity.event_type}</span>
                            <span style="color: #a0a0c0;">${new Date(activity.created_at).toLocaleString()}</span>
                        </div>
                        <div style="color: #c0c0e0;">
                            ${activity.user_email || 'гость'} • ${activity.child_name || '—'}
                            ${activity.event_data ? `• ${JSON.stringify(activity.event_data).substring(0, 50)}` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                recentDiv.innerHTML = '<p style="color: #a0a0c0;">Нет данных об активности</p>';
            }
        }
        
        async function clearCache() {
            try {
                const response = await fetch(`/api/admin-stats?key=${encodeURIComponent(adminKey)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'clear_cache' })
                });
                
                if (response.ok) {
                    alert('✅ Кеш очищен');
                    loadStats();
                }
            } catch (error) {
                alert('❌ Ошибка очистки кеша');
            }
        }
        
        // Горячие клавиши
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('dashboard').classList.contains('show')) {
                logout();
            }
        });
    </script>
</body>
</html>
