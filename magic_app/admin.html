<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Герой Сказок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #e94560; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #0f3460;
        }
        .stat-number { font-size: 42px; font-weight: bold; color: #e94560; }
        .stat-label { font-size: 14px; opacity: 0.7; margin-top: 5px; }
        .section {
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        h2 { margin-bottom: 15px; color: #e94560; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { opacity: 0.7; font-size: 12px; text-transform: uppercase; }
        .badge {
            background: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .loader {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }
        .back-btn {
            display: inline-block;
            background: #0f3460;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← На главную</a>
        <h1>🛡️ Админ-панель</h1>

        <div id="loginBlock" class="section">
            <h2>🔐 Вход администратора</h2>
            <input type="email" id="adminEmail" placeholder="Email" style="width:100%;padding:12px;border-radius:10px;border:none;margin:10px 0;background:#0f3460;color:white;">
            <input type="password" id="adminPassword" placeholder="Пароль" style="width:100%;padding:12px;border-radius:10px;border:none;margin:10px 0;background:#0f3460;color:white;">
            <button onclick="adminLogin()" style="background:#e94560;color:white;padding:12px 30px;border:none;border-radius:10px;cursor:pointer;font-size:16px;">Войти</button>
            <div id="loginError" style="color:#e94560;margin-top:10px;"></div>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="stats-grid" id="statsCards"></div>
            
            <div class="section">
                <h2>😨 Топ страхов</h2>
                <div id="topFears"></div>
            </div>

            <div class="section">
                <h2>👥 Последние регистрации</h2>
                <table id="recentUsers">
                    <thead><tr><th>Email</th><th>Дата</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    const ADMIN_EMAIL = 'alexmel669@gmail.com';

    async function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('loginError');

        if (email !== ADMIN_EMAIL) {
            errorDiv.textContent = '❌ Доступ запрещён';
            return;
        }

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (data.token) {
                localStorage.setItem('userToken', data.token);
                localStorage.setItem('userEmail', data.email);
                loadDashboard(data.token);
            } else {
                errorDiv.textContent = '❌ ' + (data.error || 'Ошибка входа');
            }
        } catch (e) {
            errorDiv.textContent = '❌ Ошибка соединения';
        }
    }

    async function loadDashboard(token) {
        document.getElementById('loginBlock').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        try {
            const res = await fetch('/api/get-stats', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            // Карточки статистики
            document.getElementById('statsCards').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${data.totalUsers || 0}</div>
                    <div class="stat-label">👥 Всего пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.totalStories || 0}</div>
                    <div class="stat-label">📖 Всего сказок</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.totalFears || 0}</div>
                    <div class="stat-label">😨 Выявлено страхов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.todayStories || 0}</div>
                    <div class="stat-label">📅 Сказок сегодня</div>
                </div>
            `;

            // Топ страхов
            const fearsHtml = data.topFears?.map(f => 
                `<div style="display:flex;justify-content:space-between;padding:10px;background:#0f3460;border-radius:10px;margin:5px 0;">
                    <span>${f.fear || 'Неизвестно'}</span>
                    <span class="badge">${f.count}</span>
                </div>`
            ).join('') || '<p>Нет данных</p>';
            document.getElementById('topFears').innerHTML = fearsHtml;

            // Последние пользователи
            const usersHtml = data.recentUsers?.map(u =>
                `<tr><td>${u.email}</td><td>${new Date(u.created_at).toLocaleDateString('ru-RU')}</td></tr>`
            ).join('') || '<tr><td colspan="2">Нет данных</td></tr>';
            document.querySelector('#recentUsers tbody').innerHTML = usersHtml;

        } catch (e) {
            console.error('Ошибка загрузки:', e);
        }
    }

    // Авто-вход если уже есть токен
    const savedToken = localStorage.getItem('userToken');
    const savedEmail = localStorage.getItem('userEmail');
    if (savedToken && savedEmail === ADMIN_EMAIL) {
        loadDashboard(savedToken);
    }
    </script>
</body>
</html>
