<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Герой Сказок — Люцик</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦁</text></svg>">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        
        body { margin: 0; min-height: 100vh; font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif; color: #3a2a1a; background-image: url('app-bg.png'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        body.night { background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('app-bg.png'); background-size: cover; background-position: center; background-attachment: fixed; }
        
        .app-container { max-width: 500px; width: 100%; min-height: 85vh; display: flex; flex-direction: column; justify-content: space-between; }
        
        .child-name-label { text-align: center; font-size: 14px; font-weight: bold; color: #3a2a1a; margin-bottom: 5px; opacity: 0.7; }
        body.night .child-name-label { color: #f0e6d0; opacity: 0.5; }
        
        .stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); padding: 12px 16px; border-radius: 60px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .stat { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #3a2a1a; background: rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 40px; }
        body.night .stat { color: #f0e6d0; background: rgba(0,0,0,0.5); }
        .stat-bar { width: 60px; height: 8px; background: rgba(0,0,0,0.25); border-radius: 10px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 10px; transition: width 0.3s ease; }
        #moodFill { background: #ff9f4a; } #hungerFill { background: #4CAF50; } #energyFill { background: #00d2ff; } #braveryFill { background: #ffd700; }
        
        .avatar-container { display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px 0; position: relative; }
        .avatar-label { font-size: 11px; opacity: 0.6; margin-top: 8px; text-align: center; color: #3a2a1a; }
        body.night .avatar-label { color: #f0e6d0; opacity: 0.5; }
        
        .avatar { width: 220px; height: 220px; background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; transition: 0.2s; animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .avatar.premium-locked { filter: grayscale(0.7); opacity: 0.6; }
        .avatar.talking { animation: pulse 0.5s infinite, blink 4s infinite; filter: drop-shadow(0 0 15px #00d2ff); }
        .avatar.listening { animation: pulse 1s infinite, blink 4s infinite; filter: drop-shadow(0 0 15px #4CAF50); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .lock-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 10px; pointer-events: none; }
        
        .child-select-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); border-radius: 40px; padding: 24px; z-index: 3000; min-width: 250px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .child-select-menu button { display: block; width: 100%; margin: 8px 0; padding: 12px 20px; border-radius: 60px; border: none; font-size: 18px; cursor: pointer; color: white; }
        .child-select-menu .active-child { background: #8bc34a; color: #1a3a2a; font-weight: bold; }
        .child-select-menu .inactive-child { background: rgba(255,255,255,0.15); }
        .child-select-menu .close-btn { background: #ff4081; }
        
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .action-btn { background: rgba(255,255,255,0.35); backdrop-filter: blur(4px); border: none; border-radius: 60px; padding: 12px 20px; min-width: 70px; font-size: 28px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .action-btn:active { transform: scale(0.96); }
        body.night .action-btn { background: rgba(0,0,0,0.5); }
        
        .mic-container { display: flex; justify-content: center; margin: 15px 0; }
        .mic-btn { width: 100px; height: 100px; background: #ff4081; border: none; border-radius: 50%; font-size: 52px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.2s; }
        .mic-btn:active { transform: scale(0.95); }
        .mic-btn.recording { background: #4CAF50; animation: pulse 1s infinite; }
        
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); border-radius: 40px; padding: 24px; z-index: 2000; min-width: 280px; max-width: 95%; max-height: 85%; overflow-y: auto; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .modal button { margin: 8px; padding: 12px 20px; min-width: 70px; min-height: 48px; font-size: 18px; border-radius: 60px; border: none; cursor: pointer; touch-action: manipulation; }
        .modal .close-btn { background: #ff4081; color: white; }
        
        .parent-btn { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 8px 16px; border-radius: 30px; cursor: pointer; z-index: 100; color: white; font-size: 14px; }
        
        @keyframes achievementPop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 80% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        
        @media (max-width: 480px) { body { padding: 12px; } .avatar { width: 180px; height: 180px; } .action-btn { padding: 10px 16px; min-width: 60px; font-size: 24px; } .mic-btn { width: 80px; height: 80px; font-size: 44px; } .stat-bar { width: 45px; } .stat { font-size: 12px; padding: 3px 10px; } .modal button { padding: 10px 16px; font-size: 16px; } }
    </style>
</head>
<body>
    <div class="parent-btn" id="parentBtn">⚙️ Родителям</div>
    
    <div class="app-container">
        <div class="child-name-label" id="childNameLabel">👶 Загрузка...</div>
        
        <div class="stats">
            <div class="stat">😊 <div class="stat-bar"><div class="stat-fill" id="moodFill" style="width: 70%"></div></div></div>
            <div class="stat">🍽️ <div class="stat-bar"><div class="stat-fill" id="hungerFill" style="width: 60%"></div></div></div>
            <div class="stat">⚡ <div class="stat-bar"><div class="stat-fill" id="energyFill" style="width: 50%"></div></div></div>
            <div class="stat">⭐ <div class="stat-bar"><div class="stat-fill" id="braveryFill" style="width: 0%"></div></div></div>
        </div>
        
        <div class="avatar-container" id="avatarContainer">
            <div class="avatar" id="avatar" style="background-image: url('avatar.png');"></div>
            <div id="lockOverlay" class="lock-overlay" style="display: none;">🔒</div>
            <div class="avatar-label" id="avatarLabel">🖼️ Образец аватара</div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="feedBtn">🍎</button>
            <button class="action-btn" id="gamesBtn">🎮</button>
            <button class="action-btn" id="roomBtn">🏠</button>
            <button class="action-btn" id="nightStoryBtn" style="display: none;">🌙</button>
        </div>
        
        <div class="mic-container">
            <button class="mic-btn" id="micBtn">🎤</button>
        </div>
    </div>
    
    <script>
                // Шифрование пина
        const PIN_SALT = 'lucik_magic_2024';
        function encodePin(pin) { return btoa(pin.split('').reverse().join('') + ':' + PIN_SALT); }
        function decodePin(enc) { try { return atob(enc).split(':')[0].split('').reverse().join(''); } catch { return ''; } }
        
        // ========== ДАННЫЕ ДЕТЕЙ ==========
        let children = [];
        let currentChildIndex = 0;
        const GUEST_INDEX = -1;
        
        try {
            const saved = localStorage.getItem('children');
            if (saved) children = JSON.parse(saved);
            currentChildIndex = parseInt(localStorage.getItem('currentChildIndex') || '0');
            if (currentChildIndex >= children.length) currentChildIndex = 0;
        } catch { children = []; }
        
        if (children.length === 0) {
            const oldName = localStorage.getItem('childName') || 'малыш';
            const oldAge = parseInt(localStorage.getItem('childAge') || '5');
            children = [{ name: oldName, age: oldAge, gender: 'boy' }];
            currentChildIndex = 0;
            localStorage.setItem('children', JSON.stringify(children));
            localStorage.setItem('currentChildIndex', '0');
            const oldFear = localStorage.getItem('fearStats'), oldHistory = localStorage.getItem('storyHistory');
            if (oldFear) localStorage.setItem('fearStats_0', oldFear);
            if (oldHistory) localStorage.setItem('storyHistory_0', oldHistory);
        }
        
        function getCurrentChild() {
            if (currentChildIndex === GUEST_INDEX) return { name: 'гость', age: 5, gender: 'unknown' };
            if (currentChildIndex >= children.length) currentChildIndex = 0;
            return children[currentChildIndex] || { name: 'малыш', age: 5, gender: 'boy' };
        }
        
        function updateChildNameLabel() {
            if (currentChildIndex === GUEST_INDEX) {
                document.getElementById('childNameLabel').textContent = '🐱 Кто здесь?';
                return;
            }
            const child = getCurrentChild();
            document.getElementById('childNameLabel').textContent = child.name + ', ' + child.age + ' лет';
        }
        
        function updateAvatarLabel() {
            const label = document.getElementById('avatarLabel');
            if (currentChildIndex === GUEST_INDEX) {
                label.innerHTML = '🐱 Гость — назови себя!';
            } else if (currentChar === 'kid1' || currentChar === 'kid2') {
                label.innerHTML = '🖼️ Образец аватара<br><small style="opacity:0.7;">🌟 Премиум: загрузка фото</small>';
            } else if (currentChar === 'mom' || currentChar === 'dad') {
                label.innerHTML = '🌟 Премиум-аватар';
            } else {
                label.innerHTML = '🖼️ Образец аватара';
            }
        }
        
        function loadChildData(index) {
            if (index === GUEST_INDEX) {
                window.fearStats = { "темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0 };
                window.conversationHistory = [];
                window.mood = 70; window.hunger = 60; window.energy = 50; window.bravery = 0;
                window.fishScore = 0; window.storyCount = 0;
                return;
            }
            const idx = index || 0;
            window.fearStats = JSON.parse(localStorage.getItem(`fearStats_${idx}`) || '{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
            window.conversationHistory = JSON.parse(localStorage.getItem(`storyHistory_${idx}`) || '[]');
            window.mood = parseInt(localStorage.getItem(`lucik_mood_${idx}`) || '70');
            window.hunger = parseInt(localStorage.getItem(`lucik_hunger_${idx}`) || '60');
            window.energy = parseInt(localStorage.getItem(`lucik_energy_${idx}`) || '50');
            window.bravery = parseInt(localStorage.getItem(`lucik_bravery_${idx}`) || '0');
            window.fishScore = parseInt(localStorage.getItem(`fishScore_${idx}`) || '0');
            window.storyCount = parseInt(localStorage.getItem(`storyCount_${idx}`) || '0');
        }
        
        function saveChildData(index) {
            if (index === GUEST_INDEX) return;
            const idx = index || 0;
            localStorage.setItem(`fearStats_${idx}`, JSON.stringify(window.fearStats));
            localStorage.setItem(`storyHistory_${idx}`, JSON.stringify(window.conversationHistory));
            localStorage.setItem(`lucik_mood_${idx}`, window.mood);
            localStorage.setItem(`lucik_hunger_${idx}`, window.hunger);
            localStorage.setItem(`lucik_energy_${idx}`, window.energy);
            localStorage.setItem(`lucik_bravery_${idx}`, window.bravery);
            localStorage.setItem(`fishScore_${idx}`, window.fishScore);
            localStorage.setItem(`storyCount_${idx}`, window.storyCount);
        }
        
        // ========== СМЕНА РЕБЁНКА ==========
        function applyChildSwitch() {
            if (currentChildIndex === GUEST_INDEX) {
                window.childName = 'гость';
                window.childAge = 5;
                currentChar = 'lucik';
                localStorage.setItem('currentCharacter', 'lucik');
                loadChildData(GUEST_INDEX);
                document.getElementById('avatar').style.backgroundImage = "url('avatar.png')";
                updateAvatarLock(); updateAvatarLabel(); updateChildNameLabel(); updateStatsUI();
                setTimeout(() => speak("Мурр... А ты кто? Давай знакомиться!"), 300);
            } else {
                localStorage.setItem('currentChildIndex', currentChildIndex);
                const child = getCurrentChild();
                window.childName = child.name;
                window.childAge = child.age;
                localStorage.setItem('childName', window.childName);
                localStorage.setItem('childAge', window.childAge);
                loadChildData(currentChildIndex);
                setAvatarByGender();
                updateChildNameLabel(); updateStatsUI(); updateAvatarLock(); updateAvatarLabel();
                setTimeout(() => speak(`Привет, ${window.childName}!`), 300);
            }
        }
        
        function switchChild(index) {
            if (children.length <= 1 && index !== GUEST_INDEX) return;
            saveChildData(currentChildIndex);
            currentChildIndex = index;
            applyChildSwitch();
        }
        
        function showChildSelectMenu() {
            if (children.length <= 1) return;
            const menu = document.createElement('div');
            menu.className = 'child-select-menu';
            let btns = '';
            children.forEach((child, i) => {
                const cls = (i === currentChildIndex) ? 'active-child' : 'inactive-child';
                const icon = child.gender === 'girl' ? '👧' : '👦';
                btns += `<button class="${cls}" data-index="${i}">${icon} ${child.name}, ${child.age} лет</button>`;
            });
            const guestCls = (currentChildIndex === GUEST_INDEX) ? 'active-child' : 'inactive-child';
            btns += `<button class="${guestCls}" data-index="-1">🐱 Гость (Люцик)</button>`;
            menu.innerHTML = `<h3 style="margin-bottom:15px;">Кто играет?</h3>${btns}<button class="close-btn" style="margin-top:10px;">Закрыть</button>`;
            document.body.appendChild(menu);
            menu.querySelectorAll('button[data-index]').forEach(btn => {
                btn.onclick = () => { const idx = parseInt(btn.dataset.index); menu.remove(); if (idx !== currentChildIndex) switchChild(idx); };
            });
            menu.querySelector('.close-btn').onclick = () => menu.remove();
        }
        
        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        async function checkAuthAndRedirect() {
            const token = localStorage.getItem('userToken');
            const guestMode = localStorage.getItem('guestMode') === 'true';
            if (guestMode) return true;
            if (!token) { window.location.href = '/'; return false; }
            try {
                const r = await fetch('/api/verify-token', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                const d = await r.json();
                if (!d.valid) {
                    localStorage.removeItem('userToken');
                    localStorage.removeItem('userEmail');
                    localStorage.removeItem('guestMode');
                    window.location.href = '/';
                    return false;
                }
                return true;
            } catch (e) { return true; }
        }
        checkAuthAndRedirect();
        
        // ========== АНАЛИТИКА ==========
        function sendAnalytics(et, ed = {}) {
            const ut = localStorage.getItem('userToken'), ue = localStorage.getItem('userEmail'), gm = localStorage.getItem('guestMode') === 'true';
            fetch('/api/analytics', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event_type: et, user_id: ut ? ut.slice(0, 50) : (gm ? 'guest_' + Date.now() : null), user_email: ue && !ue.startsWith('guest_') ? ue : null, child_name: window.childName, child_age: parseInt(window.childAge), event_data: ed }) }).catch(() => {});
        }
        
        // ========== ЗВУКИ ==========
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playSound(s) { 
            try { 
                const ctx = initAudio(), o = ctx.createOscillator(), g = ctx.createGain(); 
                o.connect(g); g.connect(ctx.destination); 
                const ss = { 'eat': { f: 523.25, d: 0.2, t: 'sine' }, 'purr': { f: 130.81, d: 0.5, t: 'sine' }, 'laugh': { f: 659.25, d: 0.15, t: 'square' }, 'click': { f: 880, d: 0.05, t: 'sine' }, 'success': { f: 523.25, d: 0.2, t: 'sine' }, 'fail': { f: 220, d: 0.3, t: 'sawtooth' }, 'victory': { f: 783.99, d: 0.3, t: 'sine' }, 'achievement': { f: 1046.50, d: 0.4, t: 'sine' }, 'paint': { f: 440, d: 0.03, t: 'sine' } }, 
                sd = ss[s] || ss['click']; 
                o.type = sd.t; o.frequency.value = sd.f; g.gain.value = 0.25; 
                o.start(); 
                g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + sd.d); 
                o.stop(ctx.currentTime + sd.d); 
            } catch(e) {}
        }
        
        // ========== ДОСТИЖЕНИЯ ==========
        function getAchKey() { return `achievements_${currentChildIndex === GUEST_INDEX ? 'guest' : currentChildIndex}`; }
        function initAchievements() { 
            const k = getAchKey(); 
            if (!localStorage.getItem(k)) { 
                const d = { 'first_talk': { name: '🎤 Первый разговор', desc: 'Первый разговор', earned: false }, 'brave_kid': { name: '🦁 Храбрый малыш', desc: 'Победил страх', earned: false }, 'story_lover': { name: '🌙 Сказочник', desc: '10 сказок', earned: false, progress: 0, target: 10 }, 'game_master': { name: '🎮 Игроман', desc: 'Все игры', earned: false }, 'fish_catcher': { name: '🐟 Рыболов', desc: '30 рыбок', earned: false, progress: 0, target: 30 }, 'memory_champion': { name: '🧠 Чемпион', desc: 'Мемори', earned: false }, 'puzzle_solver': { name: '🧩 Собиратель', desc: 'Пазл', earned: false }, 'artist': { name: '🎨 Художник', desc: 'Раскраска', earned: false }, 'emotion_master': { name: '😊 Мастер эмоций', desc: 'Все эмоции', earned: false } }; 
                localStorage.setItem(k, JSON.stringify(d)); 
            } 
        }
        
        function updateAchievement(id, p = null) { 
            const k = getAchKey(), a = JSON.parse(localStorage.getItem(k)); 
            if (a[id] && !a[id].earned) { 
                if (p !== null) { 
                    a[id].progress = (a[id].progress || 0) + p; 
                    if (a[id].progress >= a[id].target) { 
                        a[id].earned = true; 
                        a[id].date = new Date().toISOString(); 
                        playSound('achievement'); 
                        showAchievementNotification(a[id].name); 
                    } 
                } else { 
                    a[id].earned = true; 
                    a[id].date = new Date().toISOString(); 
                    playSound('achievement'); 
                    showAchievementNotification(a[id].name); 
                } 
                localStorage.setItem(k, JSON.stringify(a)); 
            } 
        }
        
        function showAchievementNotification(n) { 
            const el = document.createElement('div'); 
            el.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,#ffd700,#ff9f4a); color:#3a2a1a; padding:20px 30px; border-radius:60px; z-index:5000; text-align:center; animation:achievementPop 0.5s ease-out; font-weight:bold;'; 
            el.innerHTML = `<strong>🏆 НАГРАДА!</strong><br>${n}`; 
            document.body.appendChild(el); 
            setTimeout(() => el.remove(), 3000); 
        }
        
        // ========== ОСНОВНЫЕ ДАННЫЕ ==========
        let isPremium = localStorage.getItem('isPremium') === 'true';
        const curChild = getCurrentChild();
        window.childName = curChild.name;
        window.childAge = curChild.age;
        let savedPin = localStorage.getItem('parentPin');
        loadChildData(currentChildIndex);
        if (window.conversationHistory.length > 50) window.conversationHistory = window.conversationHistory.slice(0, 50);
        
        const characters = { lucik: { name: 'Люцик', icon: 'avatar.png', premium: false }, mom: { name: 'Мама', icon: 'mom.png', premium: true }, dad: { name: 'Папа', icon: 'dad.png', premium: true }, kid1: { name: 'Ребёнок 1', icon: 'kid1.png', premium: false }, kid2: { name: 'Ребёнок 2', icon: 'kid2.png', premium: false } };
        let currentChar = localStorage.getItem('currentCharacter') || 'lucik';
        
        function setAvatarByGender() {
            const child = getCurrentChild();
            if (currentChildIndex === GUEST_INDEX) { currentChar = 'lucik'; }
            else if (currentChar === 'kid1' || currentChar === 'kid2' || currentChar === 'lucik') {
                if (child.gender === 'girl') currentChar = 'kid1';
                else if (child.gender === 'boy') currentChar = 'kid2';
            }
            localStorage.setItem('currentCharacter', currentChar);
            document.getElementById('avatar').style.backgroundImage = `url('${characters[currentChar].icon}')`;
            updateAvatarLock(); updateAvatarLabel();
        }
        setAvatarByGender();
        
        initAchievements();
        updateChildNameLabel();
        sendAnalytics('app_open');
        window.addEventListener('beforeunload', () => { saveChildData(currentChildIndex); sendAnalytics('session_end'); });
        
        function updateStatsUI() { 
            document.getElementById('moodFill').style.width = window.mood + '%'; 
            document.getElementById('hungerFill').style.width = window.hunger + '%'; 
            document.getElementById('energyFill').style.width = window.energy + '%'; 
            document.getElementById('braveryFill').style.width = window.bravery + '%'; 
        }
        
        function updateUI() { updateStatsUI(); }
        
        function saveHistory(t) { 
            window.conversationHistory.unshift(new Date().toLocaleTimeString() + ": " + t); 
            if (window.conversationHistory.length > 50) window.conversationHistory.pop(); 
            if (currentChildIndex !== GUEST_INDEX) localStorage.setItem(`storyHistory_${currentChildIndex}`, JSON.stringify(window.conversationHistory)); 
        }
        
        function updateFear(f) { 
            if (currentChildIndex === GUEST_INDEX) return; 
            if (window.fearStats[f] !== undefined) { 
                window.fearStats[f]++; 
                localStorage.setItem(`fearStats_${currentChildIndex}`, JSON.stringify(window.fearStats)); 
                window.bravery = Math.min(100, window.bravery + 10); 
                localStorage.setItem(`lucik_bravery_${currentChildIndex}`, window.bravery); 
                updateAchievement('brave_kid'); 
                sendAnalytics('fear_detected', { fear: f }); 
                updateUI(); 
            } 
        }
        
        function updateAvatarLock() { 
            const av = document.getElementById('avatar'), lo = document.getElementById('lockOverlay'), locked = characters[currentChar].premium && !isPremium; 
            if (locked) { av.classList.add('premium-locked'); lo.style.display = 'flex'; } 
            else { av.classList.remove('premium-locked'); lo.style.display = 'none'; } 
        }

        function unlockAudio() {

        function fallbackSpeak(t) { 
            const ct = t.replace(/[\*\_\#]/g, ''); 
            const u = new SpeechSynthesisUtterance(ct); 
            u.lang = 'ru-RU'; 
            u.rate = 0.9; 
            u.onstart = () => document.getElementById('avatar').classList.add('talking');

            window.speechSynthesis.speak(u);

        async function speakWithYandex(txt, voice = 'lucik', emotion = 'good') { 
            return new Promise(async (resolve) => { 
                try { 
                    if (!audioUnlocked) { 
                        await new Promise(r => setTimeout(r, 500)); 
                        if (!audioUnlocked) { 
                            fallbackSpeak(txt); 
                            resolve(); 
                            return; 
                        } 
                    } 
                    if (currentAudio) { 
                        currentAudio.pause(); 
                        currentAudio = null; 
                    } 
                    
                    const tok = localStorage.getItem('userToken'); 
                    const headers = { 'Content-Type': 'application/json' }; 
                    if (tok && tok !== 'null' && tok !== 'undefined') { 
                        headers['Authorization'] = `Bearer ${tok}`; 
                    } 
                    
                    const resp = await fetch('/api/tts', { 
                        method: 'POST', 
                        headers, 
                        body: JSON.stringify({ 
                            text: txt, 
                            voice: voice, 
                            emotion: emotion, 
                            speed: 1.0 
                        }) 
                    });
                    
                    const contentType = resp.headers.get('content-type');
                    if (!resp.ok || (contentType && contentType.includes('application/json'))) {
                        const errorData = await resp.json().catch(() => ({}));
                        if (errorData.useFallback) {
                            console.log('TTS fallback triggered');
                            fallbackSpeak(txt);
                            resolve();
                            return;
                        }
                        throw new Error(`TTS error: ${resp.status}`);
                    }
                    
                    const blob = await resp.blob(); 
                    if (!blob || blob.size < 100) throw new Error('Small audio'); 
                    
                    const url = URL.createObjectURL(blob); 
                    const a = new Audio(url); 
                    currentAudio = a; 
                    
                    a.onplay = () => { 
                        isAudioPlaying = true; 
                        document.getElementById('avatar').classList.add('talking'); 
                    }; 
                    
                    a.onended = () => { 
                        isAudioPlaying = false; 
                        document.getElementById('avatar').classList.remove('talking'); 
                        URL.revokeObjectURL(url); 
                        resolve(); 
                    }; 
                    
                    a.onerror = (err) => { 
                        console.error('Audio playback error:', err);
                        isAudioPlaying = false; 
                        document.getElementById('avatar').classList.remove('talking'); 
                        URL.revokeObjectURL(url); 
                        fallbackSpeak(txt); 
                        resolve(); 
                    }; 
                    
                    await a.play(); 
                } catch(e) { 
                    console.error('TTS exception:', e);
                    fallbackSpeak(txt); 
                    resolve(); 
                } 
            }); 
        }

                    })

                document.getElementById('micBtn').classList.remove('recording'); 
                document.getElementById('avatar').classList.remove('listening'); 
                isListening = false; 
                speak("Не расслышал, скажи ещё раз!"); 
            }; 
        }
        
        document.getElementById('parentBtn').onclick = () => { 
            if (!savedPin) { 
                const pin = prompt('Создайте пароль (4-6 цифр):'); 
                if (pin && pin.length >= 4 && /^\d+$/.test(pin)) { 
                    localStorage.setItem('parentPin', encodePin(pin)); 
                    savedPin = encodePin(pin); 
                    alert('Пароль создан!'); 
                    window.location.href = '/parent.html'; 
                } else alert('4-6 цифр!'); 
            } else { 
                const pin = prompt('Введите пароль:'); 
                if (pin === decodePin(savedPin)) window.location.href = '/parent.html'; 
                else if (pin !== null) alert('Неверный пароль!'); 
            } 
        };
        
        updateAvatarLock(); 
        updateAvatarLabel(); 
        updateStatsUI(); 
        updateChildNameLabel();
        
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('/sw.js').catch(() => {}); 
        }
        
        function updateTimeTheme() { 
            document.body.classList.toggle('night', new Date().getHours() >= 18 || new Date().getHours() < 6); 
        }
        updateTimeTheme(); 
        setInterval(updateTimeTheme, 60000);
        
        // Приветствие только в консоли, без звука (избегаем ошибки AudioContext)
        console.log(`✅ Приложение готово! Привет, ${window.childName}! Нажми на микрофон.`);
    </script>
</body>
</html>
