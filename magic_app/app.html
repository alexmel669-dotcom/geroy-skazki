<style>
* { user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh;
  font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
  color: #3a2a1a;
  background-image: url('app-bg.png');
  background-size: cover; background-position: center; background-attachment: fixed;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}
body.night {
  background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('app-bg.png');
  background-size: cover; background-position: center; background-attachment: fixed;
}
.app-container { max-width: 500px; width: 100%; min-height: 85vh; display: flex; flex-direction: column; justify-content: space-between; }
.child-name-label { text-align: center; font-size: 14px; font-weight: bold; color: #3a2a1a; margin-bottom: 5px; opacity: 0.7; }
body.night .child-name-label { color: #f0e6d0; opacity: 0.5; }
.stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); padding: 12px 16px; border-radius: 60px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.stat { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #3a2a1a; background: rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 40px; }
body.night .stat { color: #f0e6d0; background: rgba(0,0,0,0.5); }
.stat-bar { width: 60px; height: 8px; background: rgba(0,0,0,0.25); border-radius: 10px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 10px; transition: width 0.3s ease; }
#moodFill { background: #ff9f4a; } #hungerFill { background: #4CAF50; } #energyFill { background: #00d2ff; } #braveryFill { background: #ffd700; }
.avatar-container { display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px 0; position: relative; }
.avatar-label { font-size: 11px; opacity: 0.6; margin-top: 8px; text-align: center; color: #3a2a1a; }
body.night .avatar-label { color: #f0e6d0; opacity: 0.5; }
.avatar { width: 220px; height: 220px; background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; transition: 0.2s; animation: blink 4s infinite; }
@keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
.avatar.premium-locked { filter: grayscale(0.7); opacity: 0.6; }
.avatar.talking { animation: pulse 0.5s infinite, blink 4s infinite; filter: drop-shadow(0 0 15px #00d2ff); }
.avatar.listening { animation: pulse 1s infinite, blink 4s infinite; filter: drop-shadow(0 0 15px #4CAF50); }
.avatar.thinking { animation: thinking 1.5s infinite; filter: drop-shadow(0 0 15px #ffd700); }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes thinking { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.7; } }
.lock-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 10px; pointer-events: none; }
.child-select-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); border-radius: 40px; padding: 24px; z-index: 3000; min-width: 250px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
.child-select-menu button { display: block; width: 100%; margin: 8px 0; padding: 12px 20px; border-radius: 60px; border: none; font-size: 18px; cursor: pointer; color: white; }
.child-select-menu .active-child { background: #8bc34a; color: #1a3a2a; font-weight: bold; }
.child-select-menu .inactive-child { background: rgba(255,255,255,0.15); }
.child-select-menu .close-btn { background: #ff4081; }
.action-buttons { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
.action-btn { background: rgba(255,255,255,0.35); backdrop-filter: blur(4px); border: none; border-radius: 60px; padding: 12px 20px; min-width: 70px; font-size: 28px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.action-btn:active { transform: scale(0.96); }
body.night .action-btn { background: rgba(0,0,0,0.5); }
.mic-container { display: flex; justify-content: center; margin: 15px 0; }
.mic-btn { width: 100px; height: 100px; background: #ff4081; border: none; border-radius: 50%; font-size: 52px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.2s; }
.mic-btn:active { transform: scale(0.95); }
.mic-btn.recording { background: #4CAF50; animation: pulse 1s infinite; }
.modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); border-radius: 40px; padding: 24px; z-index: 2000; min-width: 280px; max-width: 95%; max-height: 85%; overflow-y: auto; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
.modal button { margin: 8px; padding: 12px 20px; min-width: 70px; min-height: 48px; font-size: 18px; border-radius: 60px; border: none; cursor: pointer; touch-action: manipulation; }
.modal .close-btn { background: #ff4081; color: white; }
.parent-btn { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 8px 16px; border-radius: 30px; cursor: pointer; z-index: 100; color: white; font-size: 14px; }
@keyframes achievementPop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 80% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
@media (max-width: 480px) {
  body { padding: 12px; }
  .avatar { width: 180px; height: 180px; }
  .action-btn { padding: 10px 16px; min-width: 60px; font-size: 24px; }
  .mic-btn { width: 80px; height: 80px; font-size: 44px; }
  .stat-bar { width: 45px; }
  .stat { font-size: 12px; padding: 3px 10px; }
  .modal button { padding: 10px 16px; font-size: 16px; }
}
</style>

<div class="parent-btn" id="parentBtn">⚙️ Родителям</div>
<div class="app-container">
  <div class="child-name-label" id="childNameLabel">👶 Загрузка...</div>
  <div class="stats">
    <div class="stat">😊 <div class="stat-bar"><div class="stat-fill" id="moodFill" style="width: 70%"></div></div></div>
    <div class="stat">🍽️ <div class="stat-bar"><div class="stat-fill" id="hungerFill" style="width: 60%"></div></div></div>
    <div class="stat">⚡ <div class="stat-bar"><div class="stat-fill" id="energyFill" style="width: 50%"></div></div></div>
    <div class="stat">⭐ <div class="stat-bar"><div class="stat-fill" id="braveryFill" style="width: 0%"></div></div></div>

  <div class="action-buttons">
    <button class="action-btn" id="feedBtn" aria-label="Покормить">🍎</button>

    <button class="action-btn" id="roomBtn" aria-label="Комната">🏠</button>
  </div>
  <div class="mic-container">
    <button class="mic-btn" id="micBtn" aria-label="Голосовой ввод">🎤</button>
  </div>
</div>
<script>
// ========== БЕЗОПАСНОЕ ХРАНЕНИЕ PIN-кода (ИСПРАВЛЕНО: SHA-256 вместо btoa) ==========
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin + '_lucik_salt_2024');
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function verifyPin(inputPin) {
  const storedHash = localStorage.getItem('parentPinHash');
  if (!storedHash) return false;
  const inputHash = await hashPin(inputPin);
  return inputHash === storedHash;
}

async function createPin(pin) {
  const hash = await hashPin(pin);
  localStorage.setItem('parentPinHash', hash);
  return hash;
}

// ========== СОСТОЯНИЕ ПРИЛОЖЕНИЯ (ИСПРАВЛЕНО: единый объект вместо window.*) ==========
const appState = {
  children: [],
  currentChildIndex: 0,
  mood: 70,
  hunger: 60,
  energy: 50,
  bravery: 0,
  fishScore: 0,
  storyCount: 0,
  fearStats: {"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0},
  conversationHistory: [],
  currentChar: 'lucik',
  isPremium: localStorage.getItem('isPremium') === 'true',
  isListening: false,
  isWaiting: false,
  gameActive: false,
  gameInterval: null,
  gameTimerInterval: null,
  memoryCards: [],
  memoryFlipped: [],
  memoryLocked: false,
  memoryMatches: 0
};

const GUEST_INDEX = -1;

// ========== ДАННЫЕ ДЕТЕЙ (ИСПРАВЛЕНО: миграция старого формата) ==========
try {
  const saved = localStorage.getItem('children');
  if (saved) appState.children = JSON.parse(saved);
  appState.currentChildIndex = parseInt(localStorage.getItem('currentChildIndex') || '0');
  if (appState.currentChildIndex >= appState.children.length) appState.currentChildIndex = 0;
} catch {
  appState.children = [];
}

if (appState.children.length === 0) {
  const oldName = localStorage.getItem('childName') || 'малыш';
  const oldAge = parseInt(localStorage.getItem('childAge') || '5');
  appState.children = [{ name: oldName, age: oldAge, gender: 'boy' }];
  appState.currentChildIndex = 0;
  localStorage.setItem('children', JSON.stringify(appState.children));
  localStorage.setItem('currentChildIndex', '0');
  const oldFear = localStorage.getItem('fearStats'), oldHistory = localStorage.getItem('storyHistory');
  if (oldFear) localStorage.setItem('fearStats_0', oldFear);
  if (oldHistory) localStorage.setItem('storyHistory_0', oldHistory);
}

function getCurrentChild() {
  if (appState.currentChildIndex === GUEST_INDEX) return { name: 'гость', age: 5, gender: 'unknown' };
  if (appState.currentChildIndex >= appState.children.length) appState.currentChildIndex = 0;
  return appState.children[appState.currentChildIndex] || { name: 'малыш', age: 5, gender: 'boy' };
}

function updateChildNameLabel() {
  if (appState.currentChildIndex === GUEST_INDEX) {
    document.getElementById('childNameLabel').textContent = '🐱 Кто здесь?';
    return;
  }
  const child = getCurrentChild();
  document.getElementById('childNameLabel').textContent = child.name + ', ' + child.age + ' лет';
}

function updateAvatarLabel() {
  const label = document.getElementById('avatarLabel');
  if (appState.currentChildIndex === GUEST_INDEX) {
    label.innerHTML = '🐱 Гость — назови себя!';
  } else if (appState.currentChar === 'kid1' || appState.currentChar === 'kid2') {
    label.innerHTML = '🖼️ Образец аватара<br><small style="opacity:0.7;">🌟 Премиум: загрузка фото</small>';
  } else if (appState.currentChar === 'mom' || appState.currentChar === 'dad') {
    label.innerHTML = '🌟 Премиум-аватар';
  } else {
    label.innerHTML = '🖼️ Образец аватара';
  }
}

// ========== ЗАГРУЗКА/СОХРАНЕНИЕ ДАННЫХ РЕБЁНКА (ИСПРАВЛЕНО: формат истории) ==========
function loadChildData(index) {
  if (index === GUEST_INDEX) {
    appState.fearStats = {"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0};
    appState.conversationHistory = [];
    appState.mood = 70;
    appState.hunger = 60;
    appState.energy = 50;
    appState.bravery = 0;
    appState.fishScore = 0;
    appState.storyCount = 0;
    return;
  }
  const idx = index || 0;
  appState.fearStats = JSON.parse(localStorage.getItem(`fearStats_${idx}`) || '{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
  
  // ИСПРАВЛЕНО: загружаем историю в новом формате {role, content}
  const rawHistory = JSON.parse(localStorage.getItem(`storyHistory_${idx}`) || '[]');
  if (rawHistory.length > 0 && typeof rawHistory[0] === 'string') {
    // Миграция старого формата (строки) в новый (объекты)
    appState.conversationHistory = rawHistory.map(item => {
      const isUser = item.includes('👶');
      return {
        role: isUser ? 'user' : 'assistant',
        content: item.replace(/^[^:]+:\s*/, '').trim()
      };
    });
    localStorage.setItem(`storyHistory_${idx}`, JSON.stringify(appState.conversationHistory));
  } else {
    appState.conversationHistory = rawHistory;
  }
  
  appState.mood = parseInt(localStorage.getItem(`lucik_mood_${idx}`) || '70');
  appState.hunger = parseInt(localStorage.getItem(`lucik_hunger_${idx}`) || '60');
  appState.energy = parseInt(localStorage.getItem(`lucik_energy_${idx}`) || '50');
  appState.bravery = parseInt(localStorage.getItem(`lucik_bravery_${idx}`) || '0');
  appState.fishScore = parseInt(localStorage.getItem(`fishScore_${idx}`) || '0');
  appState.storyCount = parseInt(localStorage.getItem(`storyCount_${idx}`) || '0');
}

function saveChildData(index) {
  if (index === GUEST_INDEX) return;
  const idx = index || 0;
  localStorage.setItem(`fearStats_${idx}`, JSON.stringify(appState.fearStats));
  localStorage.setItem(`storyHistory_${idx}`, JSON.stringify(appState.conversationHistory));
  localStorage.setItem(`lucik_mood_${idx}`, appState.mood);
  localStorage.setItem(`lucik_hunger_${idx}`, appState.hunger);
  localStorage.setItem(`lucik_energy_${idx}`, appState.energy);
  localStorage.setItem(`lucik_bravery_${idx}`, appState.bravery);
  localStorage.setItem(`fishScore_${idx}`, appState.fishScore);
  localStorage.setItem(`storyCount_${idx}`, appState.storyCount);
}

// ========== СЕРВЕРНАЯ СИНХРОНИЗАЦИЯ (ИСПРАВЛЕНО: новая функция) ==========
async function syncToServer() {
  const token = localStorage.getItem('userToken');
  if (!token || token === 'null' || localStorage.getItem('guestMode') === 'true') return;
  if (appState.currentChildIndex === GUEST_INDEX) return;
  
  try {
    const child = getCurrentChild();
    await fetch('/api/sync-child-data', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        childName: child.name,
        childAge: child.age,
        fearStats: appState.fearStats,
        bravery: appState.bravery,
        fishScore: appState.fishScore,
        storyCount: appState.storyCount,
        conversationHistory: appState.conversationHistory.slice(-20)
      })
    });
  } catch(e) {
    console.error('Sync failed:', e);
  }
}
  // ========== СМЕНА РЕБЁНКА ==========
function applyChildSwitch() {
  if (appState.currentChildIndex === GUEST_INDEX) {
    window.childName = 'гость';
    window.childAge = 5;
    appState.currentChar = 'lucik';
    localStorage.setItem('currentCharacter', 'lucik');
    loadChildData(GUEST_INDEX);
    document.getElementById('avatar').style.backgroundImage = "url('avatar.png')";
    updateAvatarLock();
    updateAvatarLabel();
    updateChildNameLabel();
    updateStatsUI();
    setTimeout(() => speak("Мурр... А ты кто? Давай знакомиться!"), 300);
  } else {
    localStorage.setItem('currentChildIndex', appState.currentChildIndex);
    const child = getCurrentChild();
    window.childName = child.name;
    window.childAge = child.age;
    localStorage.setItem('childName', window.childName);
    localStorage.setItem('childAge', window.childAge);
    loadChildData(appState.currentChildIndex);
    setAvatarByGender();
    updateChildNameLabel();
    updateStatsUI();
    updateAvatarLock();
    updateAvatarLabel();
    setTimeout(() => speak(`Привет, ${window.childName}!`), 300);
    syncToServer();
  }
}

function switchChild(index) {
  if (appState.children.length <= 1 && index !== GUEST_INDEX) return;
  saveChildData(appState.currentChildIndex);
  appState.currentChildIndex = index;
  applyChildSwitch();
}

function showChildSelectMenu() {
  if (appState.children.length <= 1) return;
  const menu = document.createElement('div');
  menu.className = 'child-select-menu';
  let btns = '';
  appState.children.forEach((child, i) => {
    const cls = (i === appState.currentChildIndex) ? 'active-child' : 'inactive-child';
    const icon = child.gender === 'girl' ? '👧' : '👦';
    btns += `<button class="${cls}" data-index="${i}">${icon} ${child.name}, ${child.age} лет</button>`;
  });
  const guestCls = (appState.currentChildIndex === GUEST_INDEX) ? 'active-child' : 'inactive-child';
  btns += `<button class="${guestCls}" data-index="-1">🐱 Гость (Люцик)</button>`;
  menu.innerHTML = `<h3 style="margin-bottom:15px;">Кто играет?</h3>${btns}<button class="close-btn" style="margin-top:10px;">Закрыть</button>`;
  document.body.appendChild(menu);
  menu.querySelectorAll('button[data-index]').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.index);
      menu.remove();
      if (idx !== appState.currentChildIndex) switchChild(idx);
    };
  });
  menu.querySelector('.close-btn').onclick = () => menu.remove();
}

// ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
async function checkAuthAndRedirect() {
  const token = localStorage.getItem('userToken');
  const guestMode = localStorage.getItem('guestMode') === 'true';
  if (guestMode) return true;
  if (!token) {
    window.location.href = '/';
    return false;
  }
  try {
    const r = await fetch('/api/verify-token', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
    const d = await r.json();
    if (!d.valid) {
      localStorage.removeItem('userToken');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('guestMode');
      window.location.href = '/';
      return false;
    }
    return true;
  } catch (e) {
    return true;
  }
}

// ========== БЕЗОПАСНАЯ АНАЛИТИКА (ИСПРАВЛЕНО: userId из payload токена) ==========
function getUserIdFromToken() {
  const token = localStorage.getItem('userToken');
  if (!token) return null;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    return payload.userId || payload.id || payload.sub || null;
  } catch {
    return null;
  }
}

function sendAnalytics(eventType, eventData = {}) {
  const userEmail = localStorage.getItem('userEmail');
  const guestMode = localStorage.getItem('guestMode') === 'true';
  const userId = guestMode ? 'guest_' + Date.now() : getUserIdFromToken();
  
  fetch('/api/analytics', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      event_type: eventType,
      user_id: userId,
      user_email: userEmail && !userEmail.startsWith('guest_') ? userEmail : null,
      child_name: window.childName,
      child_age: window.childAge,
      event_data: eventData
    })
  }).catch(() => {});
}

// ========== ЗВУКИ ==========
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(s) {
  try {
    const ctx = initAudio(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const sounds = {
      'eat': { f: 523.25, d: 0.2, t: 'sine' },
      'purr': { f: 130.81, d: 0.5, t: 'sine' },
      'laugh': { f: 659.25, d: 0.15, t: 'square' },
      'click': { f: 880, d: 0.05, t: 'sine' },
      'success': { f: 523.25, d: 0.2, t: 'sine' },
      'fail': { f: 220, d: 0.3, t: 'sawtooth' },
      'victory': { f: 783.99, d: 0.3, t: 'sine' },
      'achievement': { f: 1046.50, d: 0.4, t: 'sine' },
      'paint': { f: 440, d: 0.03, t: 'sine' }
    };
    const sound = sounds[s] || sounds['click'];
    o.type = sound.t; o.frequency.value = sound.f; g.gain.value = 0.25;
    o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + sound.d);
    o.stop(ctx.currentTime + sound.d);
  } catch(e) {}
}

// ========== ДОСТИЖЕНИЯ ==========
function getAchKey() {
  return `achievements_${appState.currentChildIndex === GUEST_INDEX ? 'guest' : appState.currentChildIndex}`;
}

function initAchievements() {
  const k = getAchKey();
  if (!localStorage.getItem(k)) {
    const achievements = {
      'first_talk': { name: '🎤 Первый разговор', desc: 'Первый разговор', earned: false },
      'brave_kid': { name: '🦁 Храбрый малыш', desc: 'Победил страх', earned: false },
      'story_lover': { name: '🌙 Сказочник', desc: '10 сказок', earned: false, progress: 0, target: 10 },
      'game_master': { name: '🎮 Игроман', desc: 'Все игры', earned: false },
      'fish_catcher': { name: '🐟 Рыболов', desc: '30 рыбок', earned: false, progress: 0, target: 30 },
      'memory_champion': { name: '🧠 Чемпион', desc: 'Мемори', earned: false },
      'puzzle_solver': { name: '🧩 Собиратель', desc: 'Пазл', earned: false },
      'artist': { name: '🎨 Художник', desc: 'Раскраска', earned: false },
      'emotion_master': { name: '😊 Мастер эмоций', desc: 'Все эмоции', earned: false }
    };

let currentAudio = null, isAudioPlaying = false, audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume().then(() => {
    audioUnlocked = true;
    console.log('Аудио разблокировано');
  }).catch(() => {});
}

function fallbackSpeak(t) {
  const cleanText = t.replace(/[*_#]/g, '');
  const u = new SpeechSynthesisUtterance(cleanText);
  u.lang = 'ru-RU';
  u.rate = 0.9;
  u.onstart = () => document.getElementById('avatar').classList.add('talking');
  u.onend = () => document.getElementById('avatar').classList.remove('talking');
  window.speechSynthesis.speak(u);
}

async function speakWithYandex(txt, voice = 'lucik', emotion = 'good') {
  return new Promise(async (resolve) => {
    try {
      if (!audioUnlocked) {
        await new Promise(r => setTimeout(r, 500));
        if (!audioUnlocked) {
          fallbackSpeak(txt);
          resolve();
          return;
        }
      }
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      const token = localStorage.getItem('userToken');
      const headers = { 'Content-Type': 'application/json' };
      if (token && token !== 'null' && token !== 'undefined') {
        headers['Authorization'] = `Bearer ${token}`;
      }
      const resp = await fetch('/api/tts', {
        method: 'POST',
        headers,
        body: JSON.stringify({ text: txt, voice: voice, emotion: emotion, speed: 1.0 })
      });
      const contentType = resp.headers.get('content-type');
      if (!resp.ok || (contentType && contentType.includes('application/json'))) {
        const errorData = await resp.json().catch(() => ({}));
        if (errorData.useFallback) {
          console.log('TTS fallback triggered');
          fallbackSpeak(txt);
          resolve();
          return;
        }
        throw new Error(`TTS error: ${resp.status}`);
      }
      const blob = await resp.blob();
      if (!blob || blob.size < 100) throw new Error('Small audio');
      const url = URL.createObjectURL(blob);
      const a = new Audio(url);
      currentAudio = a;
      a.onplay = () => {
        isAudioPlaying = true;
        document.getElementById('avatar').classList.add('talking');
      };
      a.onended = () => {
        isAudioPlaying = false;
        document.getElementById('avatar').classList.remove('talking');
        URL.revokeObjectURL(url);
        resolve();
      };
      a.onerror = (err) => {
        console.error('Audio playback error:', err);
        isAudioPlaying = false;
        document.getElementById('avatar').classList.remove('talking');
        URL.revokeObjectURL(url);
        fallbackSpeak(txt);
        resolve();
      };
      await a.play();
    } catch(e) {
      console.error('TTS exception:', e);
      fallbackSpeak(txt);
      resolve();
    }
  });
}

async function speak(t) {
  const cleanText = t.replace(/[*_#]/g, '');
  try {
    await speakWithYandex(cleanText, appState.currentChar, 'good');
  } catch(e) {
    fallbackSpeak(cleanText);
  }
}

async function askDeepSeek(text, isLong = false) {
  if (containsBadWords(text)) return "Мяу! Давай говорить добрые слова!";
  
  // ИСПРАВЛЕНО: индикатор загрузки
  const avatar = document.getElementById('avatar');
  avatar.classList.add('thinking');
  
  try {
    // ИСПРАВЛЕНО: история в формате {role, content}
    const historyForAPI = (appState.conversationHistory || []).slice(-12);
    
    const token = localStorage.getItem('userToken');
    const headers = { 'Content-Type': 'application/json' };
    if (token && token !== 'null') headers['Authorization'] = `Bearer ${token}`;
    
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        message: text,
        history: historyForAPI,
        character: appState.currentChar,
        childName: window.childName,
        childAge: window.childAge,
        isLong: isLong,  // ИСПРАВЛЕНО: передача isLong
        fearStats: appState.fearStats || {}  // ИСПРАВЛЕНО: передача fearStats
      })
    });
    
    const data = await res.json();
    if (data.detectedFear) updateFear(data.detectedFear);
    
    // ИСПРАВЛЕНО: только reply, без story
    let story = data.reply;
    const badPatterns = ['Люцик 31', 'Люцик 02', 'ошибка', 'error', 'Error', 'undefined', 'null', 'NaN'];
    
    if (!story || badPatterns.some(p => story.includes(p)) || story.length < 2) {
      const clientFallbacks = {
        lucik: "Мурр... Я немного задумался. Давай ещё раз?",
        mom: "Ой, задумалась... Давай ещё раз, солнышко?",
        dad: "Хм, задумался. Повтори?",
        kid1: "Ой, я задумался! Давай ещё разок?",
        kid2: "Я задумалась... Давай ещё раз?"
      };
      story = clientFallbacks[appState.currentChar] || clientFallbacks.lucik;
    }
    return story;
  } catch(e) {
    console.error('Ошибка DeepSeek:', e);
    const catchFallbacks = {
      lucik: "Мурр... Давай ещё раз?",
      mom: "Ой, что-то пошло не так. Давай ещё раз, солнышко?",
      dad: "Хм, повтори ещё раз?",
      kid1: "Ой, давай ещё раз!",
      kid2: "Давай ещё раз?"
    };
    return catchFallbacks[appState.currentChar] || catchFallbacks.lucik;
  } finally {
    avatar.classList.remove('thinking');
  }
}

    appState.memoryFlipped[idx] = true;
    card.textContent = appState.memoryCards[idx];
    card.style.background = '#6c6caa';
    
    if (firstIndex === null) {
      firstIndex = idx;
      firstCard = card;
    } else {
      if (appState.memoryCards[firstIndex] === appState.memoryCards[idx]) {
        appState.memoryMatches++;
        scoreDisplay.textContent = `Найдено пар: ${appState.memoryMatches} / 6`;
        firstIndex = null;
        firstCard = null;
        playSound('success');

          }, 500);

        appState.memoryLocked = true;
        setTimeout(() => {
          appState.memoryFlipped[firstIndex] = false;

          firstCard.textContent = '?';
          card.textContent = '?';
          firstCard.style.background = '#4a4a6a';
          card.style.background = '#4a4a6a';
          firstIndex = null;
          firstCard = null;
          appState.memoryLocked = false;
        }, 1000);
      }
    }
  }

// ========== РАСКРАСКА ==========
function startColoringGame() {
  sendAnalytics('game_coloring');
  
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center;';
  
  const title = document.createElement('h2');
  title.textContent = '🎨 Раскрась Люцика';
  title.style.cssText = 'color:white; margin-bottom:20px;';
  
  const canvas = document.createElement('canvas');
  canvas.width = 300;
  canvas.height = 300;
  canvas.style.cssText = 'background:white; border-radius:15px; cursor:crosshair; max-width:90%;';
  
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, 300, 300);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(150, 150, 80, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(110, 120, 15, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(190, 120, 15, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(130, 160); ctx.lineTo(170, 160); ctx.stroke();
  
  let currentColor = '#ff4081';
  let isDrawing = false;
  
  canvas.onmousedown = () => { isDrawing = true; };
  canvas.onmouseup = () => { isDrawing = false; playSound('paint'); };
  canvas.onmouseleave = () => { isDrawing = false; };
  canvas.onmousemove = (e) => {
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ctx.fillStyle = currentColor;
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI*2);
    ctx.fill();
  };
  
  canvas.ontouchstart = (e) => { e.preventDefault(); isDrawing = true; };
  canvas.ontouchend = () => { isDrawing = false; playSound('paint'); };
  canvas.ontouchmove = (e) => {
    if (!isDrawing) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    ctx.fillStyle = currentColor;
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI*2);
    ctx.fill();
  };
  
  const colors = document.createElement('div');
  colors.style.cssText = 'display:flex; gap:10px; margin:15px 0; flex-wrap:wrap; justify-content:center;';
  ['#ff4081','#4CAF50','#00d2ff','#ffd700','#9b59b6','#ff9f4a'].forEach(color => {
    const btn = document.createElement('button');
    btn.style.cssText = `width:40px; height:40px; border-radius:50%; background:${color}; border:3px solid ${currentColor === color ? 'white' : 'transparent'}; cursor:pointer;`;
    btn.onclick = () => {
      currentColor = color;
      Array.from(colors.children).forEach(b => b.style.border = '3px solid transparent');
      btn.style.border = '3px solid white';
    };
    colors.appendChild(btn);
  });
  
  const doneBtn = document.createElement('button');
  doneBtn.textContent = 'Готово!';
  doneBtn.style.cssText = 'margin-top:10px; padding:10px 20px; border-radius:30px; background:#4CAF50; color:white; border:none;';
  doneBtn.onclick = () => {
    updateAchievement('artist');
    alert('🎨 Отличная работа!');
    playSound('victory');
    container.remove();
  };
  
  container.appendChild(title);
  container.appendChild(canvas);
  container.appendChild(colors);
  container.appendChild(doneBtn);
  document.body.appendChild(container);
}

// ========== ЭМОЦИИ ==========
function startEmotionGame() {
  sendAnalytics('game_emotion');
  
  const emotions = [
    { emoji: '😊', name: 'радость' },
    { emoji: '😢', name: 'грусть' },
    { emoji: '😨', name: 'страх' },
    { emoji: '😡', name: 'злость' },
    { emoji: '😴', name: 'сонливость' },
    { emoji: '😍', name: 'любовь' }
  ];
  
  let score = 0;
  let currentEmotion = emotions[Math.floor(Math.random() * emotions.length)];
  
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center;';
  
  const emojiDisplay = document.createElement('div');
  emojiDisplay.style.cssText = 'font-size:100px; margin:20px 0;';
  emojiDisplay.textContent = currentEmotion.emoji;
  
  const question = document.createElement('div');
  question.style.cssText = 'color:white; font-size:24px; margin:10px 0;';
  question.textContent = 'Что я чувствую?';
  
  const scoreDisplay = document.createElement('div');
  scoreDisplay.style.cssText = 'color:white; font-size:20px; margin:10px 0;';
  scoreDisplay.textContent = `Правильно: ${score}/5`;
  
  const options = document.createElement('div');
  options.style.cssText = 'display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:400px;';
  
  function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
  }
  
  function updateQuestion() {
    if (score >= 5) {
      updateAchievement('emotion_master');
      alert('🎉 Ты угадал все эмоции!');
      playSound('victory');
      container.remove();
      return;
    }
    currentEmotion = emotions[Math.floor(Math.random() * emotions.length)];
    emojiDisplay.textContent = currentEmotion.emoji;
    
    const answers = shuffleArray([...emotions]).slice(0, 3);
    if (!answers.includes(currentEmotion)) {
      answers[Math.floor(Math.random() * 3)] = currentEmotion;
    }
    
    options.innerHTML = '';
    answers.forEach(em => {
      const btn = document.createElement('button');
      btn.textContent = em.name;
      btn.style.cssText = 'padding:15px 25px; border-radius:30px; background:#4a4a6a; color:white; border:none; font-size:18px; cursor:pointer;';
      btn.onclick = () => {
        if (em.name === currentEmotion.name) {
          score++;
          scoreDisplay.textContent = `Правильно: ${score}/5`;
          playSound('success');
          speak('Правильно! Молодец!');
          updateQuestion();
        } else {
          playSound('fail');
          speak('Попробуй ещё раз!');
        }
      };
      options.appendChild(btn);
    });
  }
  
  updateQuestion();
  
  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'Закрыть';
  closeBtn.style.cssText = 'margin-top:20px; padding:10px 20px; border-radius:30px; background:#ff4081; color:white; border:none;';
  closeBtn.onclick = () => container.remove();
  
  container.appendChild(emojiDisplay);
  container.appendChild(question);
  container.appendChild(options);
  container.appendChild(scoreDisplay);
  container.appendChild(closeBtn);
  document.body.appendChild(container);
}

// ========== ФИЛЬТР ПЛОХИХ СЛОВ ==========
const badWords = ['мат', 'дурак', 'идиот', 'тупой', 'заткнись', 'пошёл', 'уйди', 'убирайся', 'хрен', 'фиг', 'блин', 'черт'];
function containsBadWords(t) {
  return t && badWords.some(w => t.toLowerCase().includes(w));
}

// ========== МИКРОФОН ==========
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
if (SpeechRec) {
  rec = new SpeechRec();
  rec.lang = 'ru-RU';
  rec.continuous = false;
}

document.getElementById('micBtn').onclick = () => {
  if (!rec) {
    speak("Голос не поддерживается");
    return;
  }
  if (appState.isListening) return;
  if (appState.isWaiting) {
    speak("Подожди...");
    return;
  }
  appState.isListening = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('avatar').classList.add('listening');
  rec.start();
  sendAnalytics('talk_start');
};

if (rec) {
  rec.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('avatar').classList.remove('listening');
    appState.isListening = false;
    const lowerText = text.toLowerCase();
    
    // ИСПРАВЛЕНО: формат saveHistory
    saveHistory('user', text);
    updateAchievement('first_talk');
    
    // Перехват: гость находит свое имя
    if (appState.currentChildIndex === GUEST_INDEX) {
      const foundIndex = appState.children.findIndex(child => lowerText.includes(child.name.toLowerCase()));
      if (foundIndex >= 0) {
        saveChildData(GUEST_INDEX);
        appState.currentChildIndex = foundIndex;
        const child = appState.children[foundIndex];
        window.childName = child.name;
        window.childAge = child.age;
        localStorage.setItem('currentChildIndex', appState.currentChildIndex);
        localStorage.setItem('childName', window.childName);
        localStorage.setItem('childAge', window.childAge);
        loadChildData(appState.currentChildIndex);
        setAvatarByGender();
        updateChildNameLabel();
        updateStatsUI();
        updateAvatarLock();
        updateAvatarLabel();
        const answer = `${window.childName}! Точно, как я мог перепутать? Мурр... Привет, ${window.childName}! Как у тебя дела?`;
        saveHistory('assistant', answer);
        speak(answer);
        return;
      }
    }
    
    // Перехват: «Я не Маша, я Саша»
    if (appState.currentChildIndex >= 0) {
      const switchMatch = lowerText.match(/я не (\w+)[,\s]*я (\w+)/i);
      if (switchMatch) {
        const newName = switchMatch[2].toLowerCase();
        const foundIndex = appState.children.findIndex(child => child.name.toLowerCase() === newName);
        if (foundIndex >= 0 && foundIndex !== appState.currentChildIndex) {
          saveChildData(appState.currentChildIndex);
          appState.currentChildIndex = foundIndex;
          const child = appState.children[foundIndex];
          window.childName = child.name;
          window.childAge = child.age;
          localStorage.setItem('currentChildIndex', appState.currentChildIndex);
          localStorage.setItem('childName', window.childName);
          localStorage.setItem('childAge', window.childAge);
          loadChildData(appState.currentChildIndex);
          setAvatarByGender();
          updateChildNameLabel();
          updateStatsUI();
          const answer = `Ой, ${window.childName}, прости! Я перепутал. Так о чём мы говорили?`;
          saveHistory('assistant', answer);
          speak(answer);
          return;
        }
      }
    }
    
    // Детекция страхов
    if (lowerText.includes('темнот')) updateFear('темноты');
    else if (lowerText.includes('врач')) updateFear('врачей');
    else if (lowerText.includes('один') || lowerText.includes('одна')) updateFear('одиночества');
    else if (lowerText.includes('обид')) updateFear('обиды');
    else if (lowerText.includes('нов') && (lowerText.includes('боюсь') || lowerText.includes('страш'))) updateFear('нового');
    else if (lowerText.includes('собака') || lowerText.includes('кошка') || lowerText.includes('животн')) updateFear('животных');
    
    appState.isWaiting = true;
    const answer = await askDeepSeek(text, false);
    appState.isWaiting = false;
    
    // ИСПРАВЛЕНО: формат saveHistory
    saveHistory('assistant', answer);
    speak(answer);
    if (appState.currentChar === 'lucik') purr();
  };
  
  rec.onerror = () => {
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('avatar').classList.remove('listening');
    appState.isListening = false;
    speak("Не расслышал, скажи ещё раз!");
  };
}
