<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Герой Сказок — Люцик</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦁</text></svg>">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
            color: #3a2a1a;
            background-image: url('app-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        body.night {
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('app-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .app-container {
            max-width: 500px;
            width: 100%;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .child-indicator {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #3a2a1a;
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 30px;
            margin-bottom: 15px;
            display: inline-block;
            align-self: center;
            cursor: pointer;
        }
        
        body.night .child-indicator {
            color: #f0e6d0;
            background: rgba(0,0,0,0.5);
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #3a2a1a;
            background: rgba(255,255,255,0.3);
            padding: 5px 12px;
            border-radius: 40px;
        }
        
        body.night .stat {
            color: #f0e6d0;
            background: rgba(0,0,0,0.5);
        }
        
        .stat-bar {
            width: 60px;
            height: 8px;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        #moodFill { background: #ff9f4a; }
        #hungerFill { background: #4CAF50; }
        #energyFill { background: #00d2ff; }
        #braveryFill { background: #ffd700; }
        
        .avatar-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }
        
        .avatar {
            width: 220px;
            height: 220px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: 0.2s;
            animation: blink 4s infinite;
        }
        
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        
        .avatar.premium-locked {
            filter: grayscale(0.7);
            opacity: 0.6;
        }
        
        .avatar.talking {
            animation: pulse 0.5s infinite, blink 4s infinite;
            filter: drop-shadow(0 0 15px #00d2ff);
        }
        
        .avatar.listening {
            animation: pulse 1s infinite, blink 4s infinite;
            filter: drop-shadow(0 0 15px #4CAF50);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .lock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            padding: 10px;
            pointer-events: none;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            min-width: 70px;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .action-btn:active {
            transform: scale(0.96);
        }
        
        body.night .action-btn {
            background: rgba(0,0,0,0.5);
        }
        
        .mic-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        
        .mic-btn {
            width: 100px;
            height: 100px;
            background: #ff4081;
            border: none;
            border-radius: 50%;
            font-size: 52px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        
        .mic-btn:active {
            transform: scale(0.95);
        }
        
        .mic-btn.recording {
            background: #4CAF50;
            animation: pulse 1s infinite;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 24px;
            z-index: 2000;
            min-width: 280px;
            max-width: 95%;
            max-height: 85%;
            overflow-y: auto;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal button {
            margin: 8px;
            padding: 12px 20px;
            min-width: 70px;
            min-height: 48px;
            font-size: 18px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        .modal .close-btn {
            background: #ff4081;
            color: white;
        }
        
        .parent-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            color: white;
            font-size: 14px;
        }
        
        @keyframes achievementPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .avatar { width: 180px; height: 180px; }
            .action-btn { padding: 10px 16px; min-width: 60px; font-size: 24px; }
            .mic-btn { width: 80px; height: 80px; font-size: 44px; }
            .stat-bar { width: 45px; }
            .stat { font-size: 12px; padding: 3px 10px; }
            .modal button { padding: 10px 16px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="parent-btn" id="parentBtn">⚙️ Родителям</div>
    
    <div class="app-container">
        <div class="child-indicator" id="childIndicator">👶 Ваня, 5 лет ◀ ▶</div>
        
        <div class="stats">
            <div class="stat">😊 <div class="stat-bar"><div class="stat-fill" id="moodFill" style="width: 70%"></div></div></div>
            <div class="stat">🍽️ <div class="stat-bar"><div class="stat-fill" id="hungerFill" style="width: 60%"></div></div></div>
            <div class="stat">⚡ <div class="stat-bar"><div class="stat-fill" id="energyFill" style="width: 50%"></div></div></div>
            <div class="stat">⭐ <div class="stat-bar"><div class="stat-fill" id="braveryFill" style="width: 0%"></div></div></div>
        </div>
        
        <div class="avatar-container" id="avatarContainer">
            <div class="avatar" id="avatar" style="background-image: url('avatar.png');"></div>
            <div id="lockOverlay" class="lock-overlay" style="display: none;">🔒</div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="feedBtn">🍎</button>
            <button class="action-btn" id="gamesBtn">🎮</button>
            <button class="action-btn" id="roomBtn">🏠</button>
            <button class="action-btn" id="nightStoryBtn" style="display: none;">🌙</button>
        </div>
        
        <div class="mic-container">
            <button class="mic-btn" id="micBtn">🎤</button>
        </div>
    </div>
    
    <script>
        // Шифрование пина
        const PIN_SALT = 'lucik_magic_2024';
        function encodePin(pin) { return btoa(pin.split('').reverse().join('') + ':' + PIN_SALT); }
        function decodePin(enc) { try { return atob(enc).split(':')[0].split('').reverse().join(''); } catch { return ''; } }
        
        // ========== ДАННЫЕ ДЕТЕЙ ==========
        let children = [];
        let currentChildIndex = 0;
        
        try {
            const saved = localStorage.getItem('children');
            if (saved) children = JSON.parse(saved);
            currentChildIndex = parseInt(localStorage.getItem('currentChildIndex') || '0');
        } catch { children = []; }
        
        // Если детей нет (старый аккаунт) — создаём из старых данных
        if (children.length === 0) {
            const oldName = localStorage.getItem('childName') || 'малыш';
            const oldAge = parseInt(localStorage.getItem('childAge') || '5');
            children = [{ name: oldName, age: oldAge }];
            localStorage.setItem('children', JSON.stringify(children));
        }
        
        function getCurrentChild() {
            if (currentChildIndex >= children.length) currentChildIndex = 0;
            return children[currentChildIndex] || { name: 'малыш', age: 5 };
        }
        
        function switchChild(direction) {
            if (children.length <= 1) return;
            currentChildIndex += direction;
            if (currentChildIndex < 0) currentChildIndex = children.length - 1;
            if (currentChildIndex >= children.length) currentChildIndex = 0;
            localStorage.setItem('currentChildIndex', currentChildIndex);
            
            const child = getCurrentChild();
            childName = child.name;
            childAge = child.age;
            localStorage.setItem('childName', childName);
            localStorage.setItem('childAge', childAge);
            
            // Загружаем данные этого ребёнка
            loadChildData(currentChildIndex);
            updateChildIndicator();
            updateStatsUI();
            speak(`Привет, ${childName}!`);
        }
        
        function updateChildIndicator() {
            const child = getCurrentChild();
            const arrow = children.length > 1 ? ' ◀ ▶' : '';
            document.getElementById('childIndicator').innerHTML = `👶 ${child.name}, ${child.age} лет${arrow}`;
        }
        
        function loadChildData(index) {
            // Страхи
            const fearData = localStorage.getItem(`fearStats_${index}`);
            if (fearData) {
                fearStats = JSON.parse(fearData);
                localStorage.setItem('fearStats', fearData);
            } else {
                fearStats = JSON.parse('{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
            }
            
            // История
            const historyData = localStorage.getItem(`storyHistory_${index}`);
            if (historyData) {
                conversationHistory = JSON.parse(historyData);
                localStorage.setItem('storyHistory', historyData);
            } else {
                conversationHistory = [];
            }
            
            // Настроение и т.д.
            mood = parseInt(localStorage.getItem(`lucik_mood_${index}`) || localStorage.getItem('lucik_mood') || '70');
            hunger = parseInt(localStorage.getItem(`lucik_hunger_${index}`) || localStorage.getItem('lucik_hunger') || '60');
            energy = parseInt(localStorage.getItem(`lucik_energy_${index}`) || localStorage.getItem('lucik_energy') || '50');
            bravery = parseInt(localStorage.getItem(`lucik_bravery_${index}`) || localStorage.getItem('lucik_bravery') || '0');
        }
        
        function saveChildData(index) {
            localStorage.setItem(`fearStats_${index}`, JSON.stringify(fearStats));
            localStorage.setItem(`storyHistory_${index}`, JSON.stringify(conversationHistory));
            localStorage.setItem(`lucik_mood_${index}`, mood);
            localStorage.setItem(`lucik_hunger_${index}`, hunger);
            localStorage.setItem(`lucik_energy_${index}`, energy);
            localStorage.setItem(`lucik_bravery_${index}`, bravery);
        }
                
        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        async function checkAuthAndRedirect() {
            const token = localStorage.getItem('userToken');
            const guestMode = localStorage.getItem('guestMode') === 'true';
            
            if (guestMode) return true;
            
            if (!token) {
                window.location.href = '/';
                return false;
            }
            
            try {
                const response = await fetch('/api/verify-token', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.valid) {
                    localStorage.removeItem('userToken');
                    localStorage.removeItem('userEmail');
                    localStorage.removeItem('guestMode');
                    window.location.href = '/';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Auth check error:', error);
                return true;
            }
        }
        
        checkAuthAndRedirect();
        
        // ========== АНАЛИТИКА ==========
        function sendAnalytics(eventType, eventData = {}) {
            const userToken = localStorage.getItem('userToken');
            const userEmail = localStorage.getItem('userEmail');
            const guestMode = localStorage.getItem('guestMode') === 'true';
            
            fetch('/api/analytics', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    event_type: eventType,
                    user_id: userToken ? userToken.slice(0, 50) : (guestMode ? 'guest_' + Date.now() : null),
                    user_email: userEmail && !userEmail.startsWith('guest_') ? userEmail : null,
                    child_name: childName,
                    child_age: parseInt(childAge),
                    event_data: eventData
                })
            }).catch(e => console.log('Analytics error:', e));
        }
        
        // ========== ЗВУКИ ==========
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        
        function playSound(soundName) {
            try {
                const ctx = initAudio();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                const sounds = {
                    'eat': { freq: 523.25, duration: 0.2, type: 'sine' },
                    'purr': { freq: 130.81, duration: 0.5, type: 'sine' },
                    'laugh': { freq: 659.25, duration: 0.15, type: 'square' },
                    'click': { freq: 880, duration: 0.05, type: 'sine' },
                    'success': { freq: 523.25, duration: 0.2, type: 'sine' },
                    'fail': { freq: 220, duration: 0.3, type: 'sawtooth' },
                    'victory': { freq: 783.99, duration: 0.3, type: 'sine' },
                    'achievement': { freq: 1046.50, duration: 0.4, type: 'sine' },
                    'paint': { freq: 440, duration: 0.03, type: 'sine' }
                };
                const sound = sounds[soundName] || sounds['click'];
                oscillator.type = sound.type;
                oscillator.frequency.value = sound.freq;
                gainNode.gain.value = 0.25;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + sound.duration);
                oscillator.stop(ctx.currentTime + sound.duration);
            } catch(e) { console.log('Audio error:', e); }
        }
        
        // ========== ДОСТИЖЕНИЯ ==========
        function initAchievements() {
            let achievements = localStorage.getItem(`achievements_${currentChildIndex}`);
            if (!achievements) {
                const defaultAchievements = {
                    'first_talk': { name: '🎤 Первый разговор', desc: 'Первый разговор с Люциком', earned: false, date: null },
                    'brave_kid': { name: '🦁 Храбрый малыш', desc: 'Победил первый страх', earned: false, date: null },
                    'story_lover': { name: '🌙 Сказочник', desc: '10 сказок на ночь', earned: false, date: null, progress: 0, target: 10 },
                    'game_master': { name: '🎮 Игроман', desc: 'Сыграл во все игры', earned: false, date: null },
                    'fish_catcher': { name: '🐟 Рыболов', desc: 'Поймал 30 рыбок', earned: false, date: null, progress: 0, target: 30 },
                    'memory_champion': { name: '🧠 Чемпион памяти', desc: 'Выиграл в Мемори', earned: false, date: null },
                    'puzzle_solver': { name: '🧩 Собиратель пазлов', desc: 'Собрал пазл', earned: false, date: null },
                    'artist': { name: '🎨 Художник', desc: 'Раскрасил Люцика', earned: false, date: null },
                    'emotion_master': { name: '😊 Мастер эмоций', desc: 'Угадал все эмоции', earned: false, date: null },
                    '7_days': { name: '📅 Друг на неделю', desc: '7 дней с Люциком', earned: false, date: null }
                };
                localStorage.setItem(`achievements_${currentChildIndex}`, JSON.stringify(defaultAchievements));
            }
            return JSON.parse(localStorage.getItem(`achievements_${currentChildIndex}`));
        }
        
        function updateAchievement(achievementId, progress = null) {
            const key = `achievements_${currentChildIndex}`;
            const achievements = JSON.parse(localStorage.getItem(key));
            if (achievements[achievementId] && !achievements[achievementId].earned) {
                if (progress !== null) {
                    achievements[achievementId].progress = (achievements[achievementId].progress || 0) + progress;
                    if (achievements[achievementId].progress >= achievements[achievementId].target) {
                        achievements[achievementId].earned = true;
                        achievements[achievementId].date = new Date().toISOString();
                        playSound('achievement');
                        showAchievementNotification(achievements[achievementId].name);
                        sendAnalytics('achievement_earned', { achievement: achievements[achievementId].name });
                    }
                } else {
                    achievements[achievementId].earned = true;
                    achievements[achievementId].date = new Date().toISOString();
                    playSound('achievement');
                    showAchievementNotification(achievements[achievementId].name);
                    sendAnalytics('achievement_earned', { achievement: achievements[achievementId].name });
                }
                localStorage.setItem(key, JSON.stringify(achievements));
            }
        }
        
        function showAchievementNotification(achievementName) {
            const notification = document.createElement('div');
            notification.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,#ffd700,#ff9f4a); color:#3a2a1a; padding:20px 30px; border-radius:60px; z-index:5000; text-align:center; animation:achievementPop 0.5s ease-out; box-shadow:0 0 30px rgba(0,0,0,0.3); font-weight:bold;';
            notification.innerHTML = `<strong>🏆 НАГРАДА!</strong><br>${achievementName}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // ========== НЕДЕЛЬНАЯ ПАМЯТЬ ==========
        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff)).toISOString().split('T')[0];
        }
        
        function getWeeklyMemory() {
            const key = `weeklyMemory_${currentChildIndex}`;
            let memory = localStorage.getItem(key);
            if (!memory) {
                const now = new Date();
                const weekStart = getWeekStart(now);
                memory = {
                    weekStart: weekStart,
                    fears: {},
                    positiveTopics: {},
                    mood: { happy: 0, sad: 0, scared: 0 },
                    victories: [],
                    lastUpdated: new Date().toISOString()
                };
                localStorage.setItem(key, JSON.stringify(memory));
                return memory;
            }
            memory = JSON.parse(memory);
            const now = new Date();
            const currentWeekStart = getWeekStart(now);
            if (memory.weekStart !== currentWeekStart) {
                localStorage.setItem(`${key}_${memory.weekStart}`, JSON.stringify(memory));
                const newMemory = {
                    weekStart: currentWeekStart,
                    fears: {},
                    positiveTopics: {},
                    mood: { happy: 0, sad: 0, scared: 0 },
                    victories: [],
                    lastUpdated: new Date().toISOString()
                };
                localStorage.setItem(key, JSON.stringify(newMemory));
                return newMemory;
            }
            return memory;
        }
        
        function updateWeeklyMemory(fear, topic, moodType, victory = null) {
            const memory = getWeeklyMemory();
            if (fear && memory.fears) {
                if (!memory.fears[fear]) memory.fears[fear] = { count: 0, resolved: false };
                memory.fears[fear].count++;
                memory.fears[fear].lastMention = new Date().toISOString();
            }
            if (topic && memory.positiveTopics) memory.positiveTopics[topic] = (memory.positiveTopics[topic] || 0) + 1;
            if (moodType && memory.mood) memory.mood[moodType] = (memory.mood[moodType] || 0) + 1;
            if (victory && memory.victories) {
                memory.victories.push(victory);
                if (memory.victories.length > 5) memory.victories.shift();
            }
            memory.lastUpdated = new Date().toISOString();
            localStorage.setItem(`weeklyMemory_${currentChildIndex}`, JSON.stringify(memory));
        }
        
        // ========== ОСНОВНЫЕ ДАННЫЕ ==========
        let isPremium = localStorage.getItem('isPremium') === 'true';
        const currentChild = getCurrentChild();
        let childName = currentChild.name;
        let childAge = currentChild.age;
        let savedPin = localStorage.getItem('parentPin');
        let mood = parseInt(localStorage.getItem(`lucik_mood_${currentChildIndex}`) || '70');
        let hunger = parseInt(localStorage.getItem(`lucik_hunger_${currentChildIndex}`) || '60');
        let energy = parseInt(localStorage.getItem(`lucik_energy_${currentChildIndex}`) || '50');
        let bravery = parseInt(localStorage.getItem(`lucik_bravery_${currentChildIndex}`) || '0');
        let fearStats = JSON.parse(localStorage.getItem(`fearStats_${currentChildIndex}`) || '{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
        let conversationHistory = JSON.parse(localStorage.getItem(`storyHistory_${currentChildIndex}`) || '[]');
        let fishScore = parseInt(localStorage.getItem(`fishScore_${currentChildIndex}`) || '0');
        let storyCount = parseInt(localStorage.getItem(`storyCount_${currentChildIndex}`) || '0');
        
        if (conversationHistory.length > 50) conversationHistory = conversationHistory.slice(0, 50);
        
        const characters = {
            lucik: { name: 'Люцик', icon: 'avatar.png', premium: false },
            mom: { name: 'Мама', icon: 'mom.png', premium: true },

        function fallbackSpeak(text) {
            const cleanText = text.replace(/[\*\_\#]/g, '');
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ru-RU';
            utter.rate = 0.9;
            utter.onstart = () => document.getElementById('avatar').classList.add('talking');

        async function speakWithYandex(text, voice = 'lucik', emotion = 'good') {
            return new Promise(async (resolve) => {
                try {
                    if (!audioUnlocked) {
                        await new Promise(r => setTimeout(r, 500));
                        if (!audioUnlocked) {
                            fallbackSpeak(text);
                            resolve();
                            return;
                        }
                    }
                    
                    if (currentAudio) {
                        currentAudio.pause();
                        currentAudio = null;
                    }
                    
                    const token = localStorage.getItem('userToken');
                    const headers = { 'Content-Type': 'application/json' };
                    if (token) {
                        headers['Authorization'] = `Bearer ${token}`;
                    }
                    
                    const response = await fetch('/api/tts', {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({ text, voice, emotion, speed: 1.0 })
                    });
                    
                    if (!response.ok) throw new Error('TTS API error: ' + response.status);
                    
                    const audioBlob = await response.blob();
                    if (audioBlob.size < 100) throw new Error('Audio too small');
                    
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    currentAudio = audio;
                    
                    audio.onplay = () => {
                        isAudioPlaying = true;
                        document.getElementById('avatar').classList.add('talking');
                    };
                    
                    audio.onended = () => {
                        isAudioPlaying = false;
                        document.getElementById('avatar').classList.remove('talking');
                        URL.revokeObjectURL(audioUrl);
                        resolve();
                    };
                    
                    audio.onerror = () => {
                        isAudioPlaying = false;
                        document.getElementById('avatar').classList.remove('talking');
                        URL.revokeObjectURL(audioUrl);
                        fallbackSpeak(text);
                        resolve();
                    };
                    
                    await audio.play();
                } catch (error) {
                    console.error('Yandex TTS error:', error);
                    fallbackSpeak(text);
                    resolve();
                }
            });
        }

        const emotionsList = [
            { emoji: '😊', name: 'радость', desc: 'Когда тебе весело и хорошо' },
            { emoji: '😢', name: 'грусть', desc: 'Когда тебе немного грустно' },
            { emoji: '😨', name: 'страх', desc: 'Когда тебе страшно' },
            { emoji: '😡', name: 'злость', desc: 'Когда ты сердишься' },
            { emoji: '😴', name: 'сонливость', desc: 'Когда ты хочешь спать' },
            { emoji: '😍', name: 'любовь', desc: 'Когда ты кого-то очень любишь' }
        ];
        
        function startEmotionGame() {
            sendAnalytics('game_emotion');
            emotionScore = 0;
            emotionQuestion = 0;
            showEmotionQuestion();
        }
        
        function showEmotionQuestion() {
            if (emotionQuestion >= 6) {
                alert(`🎉 Молодец! Ты угадал ${emotionScore} из 6 эмоций!`);
                if (emotionScore >= 5) {
                    updateAchievement('emotion_master');
                    playSound('victory');
                }
                return;
            }
            const emotion = emotionsList[emotionQuestion];
            const options = emotionsList.map(e => e.name);
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <h3>😊 Угадай эмоцию</h3>
                <div style="font-size:80px; margin:20px;">${emotion.emoji}</div>
                <p style="margin-bottom:15px;">${emotion.desc}</p>
                <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">
                    ${options.map(opt => `<button class="emotion-option" data-emotion="${opt}">${opt}</button>`).join('')}
                </div>
                <div style="margin-top:20px;">
                    <button class="close-btn" id="closeEmotionGame">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.querySelectorAll('.emotion-option').forEach(btn => {
                btn.onclick = () => {
                    const selected = btn.dataset.emotion;
                    if (selected === emotion.name) {
                        emotionScore++;
                        playSound('success');
                        alert('✅ Правильно! Молодец!');
                    } else {
                        playSound('fail');
                        alert(`❌ Неправильно. Это ${emotion.name}. Запомни!`);
                    }
                    modal.remove();
                    emotionQuestion++;
                    showEmotionQuestion();
                };
            });
            document.getElementById('closeEmotionGame').onclick = () => modal.remove();
        }
        
        function showGameMenu() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <h3 style="margin-bottom: 20px;">🎮 Выбери игру</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                    <button id="gameFishBtn" style="background:#4aa3df;">🐟 Поймай рыбку</button>
                    <button id="gameMemoryBtn" style="background:#9b59b6;">🧠 Мемори</button>
                    <button id="gamePuzzleBtn" style="background:#e67e22;">🧩 Пазл</button>
                    <button id="gameColorBtn" style="background:#2ecc71;">🎨 Раскраска</button>
                    <button id="gameEmotionBtn" style="background:#f1c40f;">😊 Угадай эмоцию</button>
                    <button id="gamePlayBtn" style="background:#ff9f4a;">🎾 Поиграть с Люциком</button>
                </div>
                <div style="margin-top: 20px;">
                    <button class="close-btn" id="closeGameMenu">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('gameFishBtn').onclick = () => { modal.remove(); startFishGame(); updateAchievement('game_master'); };
            document.getElementById('gameMemoryBtn').onclick = () => { modal.remove(); startMemoryGame(); updateAchievement('game_master'); };
            document.getElementById('gamePuzzleBtn').onclick = () => { modal.remove(); startPuzzleGame(); updateAchievement('game_master'); };
            document.getElementById('gameColorBtn').onclick = () => { modal.remove(); startColoringGame(); updateAchievement('game_master'); };
            document.getElementById('gameEmotionBtn').onclick = () => { modal.remove(); startEmotionGame(); updateAchievement('game_master'); };
            document.getElementById('gamePlayBtn').onclick = () => {
                modal.remove();
                if (energy >= 20) {
                    energy = Math.max(0, energy - 20);
                    mood = Math.min(100, mood + 15);
                    localStorage.setItem(`lucik_energy_${currentChildIndex}`, energy);
                    localStorage.setItem(`lucik_mood_${currentChildIndex}`, mood);
                    updateStatsUI();
                    speak("Ура! Весело играть!");
                    playSound('laugh');
                } else {
                    speak("Я устал. Дай отдохнуть.");
                }
                saveHistory(`🎾 Поиграл с ${characters[currentChar].name}`);
            };
            document.getElementById('closeGameMenu').onclick = () => modal.remove();
        }
        
        function showRoomMenu() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <h3 style="margin-bottom: 20px;">🏠 Моя комната</h3>
                <button id="cleanRoomBtn" style="background:#4CAF50;">🧸 Уборка комнаты</button>
                <button id="dressUpBtn" style="background:#ff9f4a;">👕 Переодеть персонажа</button>
                <div style="margin-top: 20px;">
                    <button class="close-btn" id="closeRoomMenu">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('cleanRoomBtn').onclick = () => {
                modal.remove();
                sendAnalytics('room_clean');
                energy = Math.min(100, energy + 10);
                mood = Math.min(100, mood + 5);
                localStorage.setItem(`lucik_energy_${currentChildIndex}`, energy);
                localStorage.setItem(`lucik_mood_${currentChildIndex}`, mood);
                updateStatsUI();
                speak("Мурр! Комната стала чистой!");
                playSound('purr');
                saveHistory(`🧸 Убрал комнату ${characters[currentChar].name}`);
            };
            document.getElementById('dressUpBtn').onclick = () => {
                modal.remove();
                sendAnalytics('dress_up');
                if (!isPremium) {
                    alert('🌟 Оформите подписку, чтобы переодевать персонажа!');
                    return;
                }
                const dressModal = document.createElement('div');
                dressModal.className = 'modal';
                dressModal.innerHTML = `
                    <h3>👕 Выбери образ</h3>
                    <button id="dressDefault">🦁 Обычный</button>
                    <button id="dressHat">🎩 В шляпе</button>
                    <button id="dressGlasses">🕶️ В очках</button>
                    <button id="dressCrown">👑 С короной</button>
                    <div><button class="close-btn" id="closeDressMenu">Закрыть</button></div>
                `;
                document.body.appendChild(dressModal);
                document.getElementById('dressDefault').onclick = () => {
                    document.getElementById('avatar').style.filter = 'none';
                    dressModal.remove();
                    speak("Вернулся к обычному виду!");
                };
                document.getElementById('dressHat').onclick = () => {
                    document.getElementById('avatar').style.filter = 'drop-shadow(0 0 5px gold)';
                    dressModal.remove();
                    speak("Какая стильная шляпа!");
                };
                document.getElementById('dressGlasses').onclick = () => {
                    document.getElementById('avatar').style.filter = 'brightness(1.1)';
                    dressModal.remove();
                    speak("Очки делают меня умным!");
                };
                document.getElementById('dressCrown').onclick = () => {
                    document.getElementById('avatar').style.filter = 'drop-shadow(0 0 8px #ffd700)';
                    dressModal.remove();
                    speak("Я король! Мур-мяу!");
                };
                document.getElementById('closeDressMenu').onclick = () => dressModal.remove();
            };
            document.getElementById('closeRoomMenu').onclick = () => modal.remove();
        }
        
        document.getElementById('nightStoryBtn').onclick = async () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<h3>🌙 Люцик готовит сказку...</h3><p>Пожалуйста, подожди</p>`;
            document.body.appendChild(modal);
            speak("Мяу! Сейчас я расскажу тебе длинную, уютную сказку на ночь...");
            const longStory = await askDeepSeek("Расскажи длинную, спокойную сказку на ночь для ребёнка 3-7 лет.", true);
            modal.remove();
            storyCount++;
            localStorage.setItem(`storyCount_${currentChildIndex}`, storyCount);
            updateAchievement('story_lover', 1);
            sendAnalytics('story_night');
            const storyModal = document.createElement('div');
            storyModal.className = 'modal';
            storyModal.style.maxWidth = '90%';
            storyModal.style.maxHeight = '70%';
            storyModal.style.overflow = 'auto';
            storyModal.innerHTML = `<h3>🌙 Сказка на ночь</h3><p style="margin:15px 0; line-height:1.4;">${longStory.replace(/\n/g, '<br>')}</p><button class="close-btn" onclick="this.parentElement.remove()">Закрыть</button>`;
            document.body.appendChild(storyModal);
            speak(longStory);
            saveHistory(`🌙 Люцик рассказал длинную сказку на ночь`);
        };
        
        const badWords = ['мат', 'дурак', 'идиот', 'тупой', 'заткнись', 'пошёл', 'уйди', 'убирайся', 'хрен', 'фиг', 'блин', 'черт'];
        function containsBadWords(text) {
            if (!text) return false;
            const lowerText = text.toLowerCase();
            return badWords.some(word => lowerText.includes(word));
        }
        
        document.getElementById('feedBtn').onclick = () => {
            sendAnalytics('feed');
            hunger = Math.min(100, hunger + 15);
            mood = Math.min(100, mood + 5);
            localStorage.setItem(`lucik_mood_${currentChildIndex}`, mood);
            localStorage.setItem(`lucik_hunger_${currentChildIndex}`, hunger);
            updateStatsUI();
            playSound('eat');
            saveHistory(`🍎 Покормил ${characters[currentChar].name}`);
        };
        document.getElementById('gamesBtn').onclick = () => showGameMenu();
        document.getElementById('roomBtn').onclick = () => showRoomMenu();
        
        let isListening = false, isWaiting = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec = null;
        if (SpeechRec) {
            rec = new SpeechRec();
            rec.lang = 'ru-RU';
            rec.continuous = false;
        }
        document.getElementById('micBtn').onclick = () => {
            if (!rec) { speak("Голос не поддерживается"); return; }
            if (isListening) return;
            if (isWaiting) { speak("Подожди, я ещё отвечаю..."); return; }
            isListening = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('avatar').classList.add('listening');
            rec.start();
            sendAnalytics('talk_start');
        };
        
        if (rec) {
            rec.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('avatar').classList.remove('listening');
                isListening = false;
                saveHistory(`👶 ${childName}: ${text}`);
                updateAchievement('first_talk');
                const lower = text.toLowerCase();
                if (lower.includes('темнот')) updateFear('темноты');
                else if (lower.includes('врач')) updateFear('врачей');
                else if (lower.includes('один')) updateFear('одиночества');
                else if (lower.includes('обид')) updateFear('обиды');
                else if (lower.includes('новое')) updateFear('нового');
                else if (lower.includes('собака') || lower.includes('кошка')) updateFear('животных');
                isWaiting = true;
                const answer = await askDeepSeek(text);
                isWaiting = false;
                saveHistory(`🦁 ${characters[currentChar].name}: ${answer}`);
                speak(answer);
                purr();
            };
            rec.onerror = () => {
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('avatar').classList.remove('listening');
                isListening = false;
                speak("Не расслышал, скажи ещё раз!");
            };
        }
        
        document.getElementById('parentBtn').onclick = () => {
            if (!savedPin) {
                const pin = prompt('Создайте пароль для входа в Штаб (4-6 цифр):');
                if (pin && pin.length >= 4 && /^\d+$/.test(pin)) {
                    localStorage.setItem('parentPin', encodePin(pin));
                    savedPin = encodePin(pin);
                    alert('Пароль создан! Теперь вы можете войти в Штаб.');
                    window.location.href = '/parent.html';
                } else {
                    alert('Пароль должен содержать 4-6 цифр!');
                }
            } else {
                const pin = prompt('Введите пароль для входа в Штаб:');
                if (pin === decodePin(savedPin)) {
                    window.location.href = '/parent.html';
                } else if (pin !== null) {
                    alert('Неверный пароль!');
                }
            }
        };
        
        updateAvatarLock();
        updateStatsUI();
        changeCharacter(currentChar);
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error', e));
        }
        
        function updateTimeTheme() {
            const hour = new Date().getHours();
            if (hour >= 18 || hour < 6) document.body.classList.add('night');
            else document.body.classList.remove('night');
        }
        updateTimeTheme();
        setInterval(updateTimeTheme, 60000);
        
        speak(`Мяу! Привет, ${childName}! Нажми на микрофон, и мы подружимся!`);
        
        // Сохраняем данные при уходе
        window.addEventListener('beforeunload', () => {
            saveChildData(currentChildIndex);
        });
    </script>
</body>
</html>
