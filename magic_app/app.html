<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Люцик — герой сказок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #f9e7b3 0%, #f5d99b 100%);
            font-family: 'Segoe UI', 'Comic Neue', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 56px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), inset 0 1px 2px rgba(255,255,255,0.6);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .header {
            background: #ffb347;
            padding: 20px;
            text-align: center;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 2rem; }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff6e5;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 28px;
            line-height: 1.4;
            font-size: 1rem;
        }
        .user {
            background: #ffd966;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .bot {
            background: #e5e5ea;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .input-area {
            display: flex;
            padding: 16px;
            gap: 12px;
            background: white;
            border-top: 1px solid #ffe0b5;
        }
        input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ffd9a5;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        button {
            background: #ff9f4a;
            border: none;
            padding: 0 20px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); }
        .microphone {
            background: #ff7b2c;
            font-size: 1.5rem;
            padding: 0 18px;
        }
        .game-btn {
            background: #6c63ff;
            margin: 8px 16px 16px;
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            text-decoration: none;
        }
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(145deg, #2c2c2c, #1e1e1e); }
            .app-container { background: rgba(30,30,40,0.96); }
            .chat-area { background: #262630; }
            .bot { background: #3a3a44; color: #eee; }
            .user { background: #ffb347; color: #1e1e1e; }
            .input-area { background: #1c1c24; border-top-color: #444; }
            input { background: #2c2c34; color: white; border-color: #ffb347; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>✨ Люцик ✨</h1>
        <p>Твой друг и волшебник</p>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message bot">Привет! Я Люцик. Расскажи, что тебя тревожит?</div>
    </div>
    <input type="text" id="messageInput" placeholder="Напиши или скажи..." autocomplete="off">
    <div style="display: flex; gap: 8px; padding: 0 16px 16px;">
        <button id="sendBtn">📨 Отправить</button>
        <button id="micBtn" class="microphone">🎤 Голос</button>
    </div>
    <a href="#" id="gameLink" class="game-btn">🐟 Поймай рыбку (игра)</a>
</div>

<script>
    (function() {
        // -------- Безопасный код без циклов --------
        let isGenerating = false;
        let lastMessage = '';
        const chatArea = document.getElementById('chatArea');
        const inputField = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const gameLink = document.getElementById('gameLink');
        
        // Получаем токен из localStorage
        const token = localStorage.getItem('token');
        if (!token) {
            // Не делаем редирект мгновенно — даём шанс
            console.warn('Нет токена, но страница работает в демо-режиме');
        }
        
        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        async function callDeepSeek(userText) {
            if (isGenerating) return;
            isGenerating = true;
            addMessage(userText, true);
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token || ''}` },
                    body: JSON.stringify({ message: userText, history: [] })
                });
                if (!response.ok) throw new Error('Ошибка сети');
                const data = await response.json();
                addMessage(data.reply || 'Люцик задумался... Попробуй ещё раз!');
            } catch (err) {
                console.error(err);
                addMessage('🌙 Ой, связь пропала. Давай ещё разок!');
            } finally {
                isGenerating = false;
            }
        }
        
        function sendMessage() {
            const text = inputField.value.trim();
            if (text === '' || text === lastMessage) return;
            lastMessage = text;
            callDeepSeek(text);
            inputField.value = '';
        }
        
        // Голос (без циклов)
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputField.value = transcript;
                sendMessage();
            };
            micBtn.onclick = () => {
                try {
                    recognition.start();
                } catch(e) { console.warn(e); }
            };
        } else {
            micBtn.disabled = true;
            micBtn.style.opacity = '0.5';
        }
        
        sendBtn.onclick = sendMessage;
        inputField.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        
        // Игра — безопасный переход без перезагрузки
        gameLink.onclick = (e) => {
            e.preventDefault();
            if (typeof window.triggerFishGame === 'function') {
                window.triggerFishGame();
            } else {
                alert('🐟 Игра: лови рыбку пальцем! (демо)');
            }
        };
        
        // Рыбная игра (простая, без циклов)
        window.triggerFishGame = function() {
            const gameHtml = `
                <div id="fishGame" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#4aa3df; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <h2 style="color:white;">🐟 Лови рыбку!</h2>
                    <canvas id="gameCanvas" width="300" height="400" style="border-radius:20px; background:#1e6eb5;"></canvas>
                    <button id="closeGame" style="margin-top:20px; padding:12px 24px; border-radius:40px;">✖ Закрыть</button>
                </div>
            `;
            const div = document.createElement('div');
            div.innerHTML = gameHtml;
            document.body.appendChild(div);
            const canvas = div.querySelector('#gameCanvas');
            const ctx = canvas.getContext('2d');
            let fish = { x: 150, y: 200, r: 15 };
            let score = 0;
            function draw() {
                ctx.clearRect(0, 0, 300, 400);
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(fish.x, fish.y, fish.r, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.font = '20px sans-serif';
                ctx.fillText('🐟 '+score, 10, 30);
            }
            canvas.onmousemove = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * 300 / rect.width;
                const my = (e.clientY - rect.top) * 400 / rect.height;
                if (Math.hypot(mx - fish.x, my - fish.y) < fish.r) {
                    score++;
                    fish.x = Math.random() * 270 + 15;
                    fish.y = Math.random() * 370 + 15;
                    draw();
                }
            };
            canvas.ontouchmove = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const tx = (e.touches[0].clientX - rect.left) * 300 / rect.width;
                const ty = (e.touches[0].clientY - rect.top) * 400 / rect.height;
                if (Math.hypot(tx - fish.x, ty - fish.y) < fish.r) {
                    score++;
                    fish.x = Math.random() * 270 + 15;
                    fish.y = Math.random() * 370 + 15;
                    draw();
                }
            };
            draw();
            div.querySelector('#closeGame').onclick = () => div.remove();
        };
        
        // Никаких useEffect, никаких автоматических вызовов — 0 циклов
        console.log('✅ Приложение загружено стабильно');
    })();
</script>
</body>
</html>
