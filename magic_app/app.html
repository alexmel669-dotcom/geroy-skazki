<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Герой Сказок — Люцик</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
            color: #3a2a1a;
            background: linear-gradient(135deg, #e8d5a8 0%, #d4c08c 30%, #c8b078 60%, #b89c68 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        body.night {
            background: linear-gradient(135deg, #1a2a3a 0%, #2a3a4a 30%, #1a2a3a 100%);
        }
        
        .app-container {
            max-width: 500px;
            width: 100%;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.2);
            padding: 12px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #3a2a1a;
            background: rgba(255,255,255,0.3);
            padding: 5px 12px;
            border-radius: 40px;
        }
        
        body.night .stat {
            color: #f0e6d0;
            background: rgba(0,0,0,0.4);
        }
        
        .stat-bar {
            width: 60px;
            height: 8px;
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        #moodFill { background: #ff9f4a; }
        #hungerFill { background: #4CAF50; }
        #energyFill { background: #00d2ff; }
        #braveryFill { background: #ffd700; }
        
        .avatar-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }
        
        .avatar {
            width: 220px;
            height: 220px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .avatar.premium-locked {
            filter: grayscale(0.7);
            opacity: 0.6;
        }
        
        .avatar.talking {
            animation: pulse 0.5s infinite;
            filter: drop-shadow(0 0 15px #00d2ff);
        }
        
        .avatar.listening {
            animation: pulse 1s infinite;
            filter: drop-shadow(0 0 15px #4CAF50);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .lock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            padding: 10px;
            pointer-events: none;
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            min-width: 70px;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .action-btn:active {
            transform: scale(0.96);
        }
        
        body.night .action-btn {
            background: rgba(0,0,0,0.4);
        }
        
        .mic-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        
        .mic-btn {
            width: 100px;
            height: 100px;
            background: #ff4081;
            border: none;
            border-radius: 50%;
            font-size: 52px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        
        .mic-btn:active {
            transform: scale(0.95);
        }
        
        .mic-btn.recording {
            background: #4CAF50;
            animation: pulse 1s infinite;
        }
        
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 24px;
            z-index: 2000;
            min-width: 280px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal button {
            margin: 10px;
            padding: 12px 24px;
            border-radius: 60px;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        
        .modal .close-btn {
            background: #ff4081;
            color: white;
        }
        
        .parent-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            color: white;
            font-size: 14px;
        }
        
        @media (max-width: 480px) {
            body { padding: 12px; }
            .avatar { width: 180px; height: 180px; }
            .action-btn { padding: 10px 16px; min-width: 60px; font-size: 24px; }
            .mic-btn { width: 80px; height: 80px; font-size: 44px; }
            .stat-bar { width: 45px; }
            .stat { font-size: 12px; padding: 3px 10px; }
        }
    </style>
</head>
<body>
    <div class="parent-btn" id="parentBtn">⚙️ Родителям</div>
    
    <div class="app-container">
        <div class="stats">
            <div class="stat">😊 <div class="stat-bar"><div class="stat-fill" id="moodFill" style="width: 70%"></div></div></div>
            <div class="stat">🍽️ <div class="stat-bar"><div class="stat-fill" id="hungerFill" style="width: 60%"></div></div></div>
            <div class="stat">⚡ <div class="stat-bar"><div class="stat-fill" id="energyFill" style="width: 50%"></div></div></div>
            <div class="stat">⭐ <div class="stat-bar"><div class="stat-fill" id="braveryFill" style="width: 0%"></div></div></div>
        </div>
        
        <div class="avatar-container" id="avatarContainer">
            <div class="avatar" id="avatar" style="background-image: url('avatar.png');"></div>
            <div id="lockOverlay" class="lock-overlay" style="display: none;">🔒</div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="feedBtn">🍎</button>
            <button class="action-btn" id="gamesBtn">🎮</button>
            <button class="action-btn" id="roomBtn">🏠</button>
            <button class="action-btn" id="nightStoryBtn" style="display: none;">🌙</button>
        </div>
        
        <div class="mic-container">
            <button class="mic-btn" id="micBtn">🎤</button>
        </div>
    </div>
    
    <script>
        let isPremium = localStorage.getItem('isPremium') === 'true';
        
        let childName = localStorage.getItem('childName') || 'малыш';
        let childAge = localStorage.getItem('childAge') || 5;
        let savedPin = localStorage.getItem('parentPin');
        let mood = parseInt(localStorage.getItem('lucik_mood')) || 70;
        let hunger = parseInt(localStorage.getItem('lucik_hunger')) || 60;
        let energy = parseInt(localStorage.getItem('lucik_energy')) || 50;
        let bravery = parseInt(localStorage.getItem('lucik_bravery')) || 0;
        let fearStats = JSON.parse(localStorage.getItem('fearStats') || '{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
        let conversationHistory = JSON.parse(localStorage.getItem('storyHistory') || '[]');
        if (conversationHistory.length > 30) conversationHistory = conversationHistory.slice(0, 30);
        
        const characters = {
            lucik: { name: 'Люцик', icon: 'avatar.png', premium: false },
            mom: { name: 'Мама', icon: 'mom.png', premium: true },
            dad: { name: 'Папа', icon: 'dad.png', premium: true },
            kid: { name: 'Ребёнок', icon: 'kid.png', premium: true }
        };
        let currentChar = localStorage.getItem('currentCharacter') || 'lucik';
        
        function updateStatsUI() {
            document.getElementById('moodFill').style.width = mood + '%';
            document.getElementById('hungerFill').style.width = hunger + '%';
            document.getElementById('energyFill').style.width = energy + '%';
            document.getElementById('braveryFill').style.width = bravery + '%';
        }
        
        function updateUI() {
            updateStatsUI();
        }
        
        function saveHistory(text) {
            conversationHistory.unshift(new Date().toLocaleTimeString() + ": " + text);
            if (conversationHistory.length > 30) conversationHistory.pop();
            localStorage.setItem('storyHistory', JSON.stringify(conversationHistory));
        }
        
        function updateFear(fear) {
            if (fearStats[fear] !== undefined) {
                fearStats[fear]++;
                localStorage.setItem('fearStats', JSON.stringify(fearStats));
                bravery = Math.min(100, bravery + 10);
                localStorage.setItem('lucik_bravery', bravery);
                
                const fearMessages = {
                    темноты: 'боюсь темноты',
                    врачей: 'боюсь врачей и уколов',
                    одиночества: 'боюсь оставаться один',
                    нового: 'боюсь нового',
                    обиды: 'меня обидели',
                    животных: 'боюсь животных'
                };
                const alertText = fearMessages[fear] || fear;
                localStorage.setItem('pendingFearAlert', 'true');
                localStorage.setItem('pendingFearText', alertText);
                
                updateUI();
            }
        }
        
        function updateAvatarLock() {
            const avatar = document.getElementById('avatar');
            const lockOverlay = document.getElementById('lockOverlay');
            const isLocked = characters[currentChar].premium && !isPremium;
            if (isLocked) {
                avatar.classList.add('premium-locked');
                lockOverlay.style.display = 'flex';
            } else {
                avatar.classList.remove('premium-locked');
                lockOverlay.style.display = 'none';
            }
        }
        
        function changeCharacter(charId) {
            if (characters[charId].premium && !isPremium) {
                alert('🌟 Оформите подписку, чтобы играть за этого персонажа!');
                return;
            }
            currentChar = charId;
            document.getElementById('avatar').style.backgroundImage = `url('${characters[charId].icon}')`;
            localStorage.setItem('currentCharacter', charId);
            updateAvatarLock();
            speak(`Теперь я ${characters[charId].name}!`);
        }
        
        let touchStart = 0;
        const avatarEl = document.getElementById('avatar');
        avatarEl.addEventListener('touchstart', (e) => {
            touchStart = e.changedTouches[0].screenX;
        });
        avatarEl.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].screenX - touchStart;
            if (Math.abs(diff) > 50) {
                const chars = ['lucik', 'mom', 'dad', 'kid'];
                let idx = chars.indexOf(currentChar);
                if (diff > 0) idx = (idx - 1 + chars.length) % chars.length;
                else idx = (idx + 1) % chars.length;
                const newChar = chars[idx];
                if (characters[newChar].premium && !isPremium) {
                    alert('🌟 Оформите подписку, чтобы играть за этого персонажа!');
                    return;
                }
                changeCharacter(newChar);
            }
        });
        
        function updateMoonButton() {
            const hour = new Date().getHours();
            const moonBtn = document.getElementById('nightStoryBtn');
            if (hour >= 20 || hour < 6) {
                moonBtn.style.display = 'flex';
            } else {
                moonBtn.style.display = 'none';
            }
        }
        updateMoonButton();
        setInterval(updateMoonButton, 60000);
        
        async function askDeepSeek(text, isLong = false) {
            if (containsBadWords(text)) {
                return "Мяу! Давай говорить добрые слова!";
            }
            try {
                const historyForAPI = conversationHistory.slice(-6).map(item => {
                    const isUser = item.includes(`👶 ${childName}:`);
                    const cleanContent = item.replace(/^[^:]+:/, '').trim();
                    return { role: isUser ? "user" : "assistant", content: cleanContent };
                });
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        childName, childAge, userSpeech: text, isLong,
                        history: historyForAPI
                    })
                });
                const data = await res.json();
                return data.story;
            } catch(e) {
                return "Мяу! Давай ещё раз?";
            }
        }
        
        function showGameMenu() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <h3 style="margin-bottom: 20px;">🎮 Выбери игру</h3>
                <button id="fishGameBtn" style="background:#4aa3df;">🐟 Поймай рыбку</button>
                <button id="playGameBtn" style="background:#ff9f4a;">🎾 Поиграть с Люциком</button>
                <div style="margin-top: 20px;">
                    <button class="close-btn" id="closeGameMenu">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('fishGameBtn').onclick = () => {
                modal.remove();
                startFishGame();
            };
            document.getElementById('playGameBtn').onclick = () => {
                modal.remove();
                if (energy >= 20) {
                    energy -= 20;
                    mood = Math.min(100, mood + 15);
                    localStorage.setItem('lucik_energy', energy);
                    localStorage.setItem('lucik_mood', mood);
                    updateStatsUI();
                    speak("Ура! Весело играть!");
                } else {
                    speak("Я устал. Дай отдохнуть.");
                }
                purr();
                saveHistory(`🎾 Поиграл с ${characters[currentChar].name}`);
            };
            document.getElementById('closeGameMenu').onclick = () => modal.remove();
        }
        
        let gameActive = false, gameInterval = null, gameTimerInterval = null;
        function startFishGame() {
            if (gameActive) return;
            gameActive = true;
            let gameScore = 0, timeLeft = 30;
            
            const gameContainer = document.createElement('div');
            gameContainer.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:space-between;';
            
            const fishArea = document.createElement('div');
            fishArea.style.cssText = 'flex:1; position:relative; width:100%;';
            const fish = document.createElement('div');
            fish.innerText = '🐟';
            fish.style.cssText = 'font-size:60px; position:absolute; cursor:pointer;';
            
            const bottomBar = document.createElement('div');
            bottomBar.style.cssText = 'padding:20px; text-align:center; width:100%;';
            const scoreDiv = document.createElement('div');
            scoreDiv.style.cssText = 'color:white; font-size:24px; margin-bottom:10px;';
            scoreDiv.innerText = `🐟 Счёт: 0 | ⏱️ Осталось: ${timeLeft} сек`;
            const closeBtn = document.createElement('button');
            closeBtn.innerText = 'Закрыть';
            closeBtn.style.cssText = 'padding:10px 20px; border-radius:30px; background:#ff4081; color:white; border:none;';
            closeBtn.onclick = () => {
                clearInterval(gameInterval); clearInterval(gameTimerInterval);
                document.body.removeChild(gameContainer);
                gameActive = false;
            };
            
            bottomBar.appendChild(scoreDiv);
            bottomBar.appendChild(closeBtn);
            fishArea.appendChild(fish);
            gameContainer.appendChild(fishArea);
            gameContainer.appendChild(bottomBar);
            document.body.appendChild(gameContainer);
            
            function moveFish() {
                const maxX = fishArea.clientWidth - 80;
                const maxY = fishArea.clientHeight - 80;
                if (maxX > 0 && maxY > 0) {
                    fish.style.left = Math.random() * maxX + 'px';
                    fish.style.top = Math.random() * maxY + 'px';
                }
            }
            fish.onclick = () => {
                if (!gameActive) return;
                gameScore++;
                scoreDiv.innerText = `🐟 Счёт: ${gameScore} | ⏱️ Осталось: ${timeLeft} сек`;
                moveFish();
                purr();
                hunger = Math.min(100, hunger + 3);
                mood = Math.min(100, mood + 3);
                updateStatsUI();
            };
            moveFish();
            gameTimerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(gameTimerInterval); clearInterval(gameInterval);
                    gameActive = false;
                    scoreDiv.innerText = `🎉 Игра окончена! Ты поймал ${gameScore} рыбок! 🎉`;
                    fish.style.display = 'none';
                    speak(`Игра окончена! Ты поймал ${gameScore} рыбок! Молодец!`);
                } else {
                    scoreDiv.innerText = `🐟 Счёт: ${gameScore} | ⏱️ Осталось: ${timeLeft} сек`;
                }
            }, 1000);
            gameInterval = setInterval(() => { if (gameActive) moveFish(); }, 1500);
        }
        
        function showRoomMenu() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <h3 style="margin-bottom: 20px;">🏠 Моя комната</h3>
                <button id="cleanRoomBtn" style="background:#4CAF50;">🧸 Уборка комнаты</button>
                <button id="dressUpBtn" style="background:#ff9f4a;">👕 Переодеть персонажа</button>
                <div style="margin-top: 20px;">
                    <button class="close-btn" id="closeRoomMenu">Закрыть</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('cleanRoomBtn').onclick = () => {
                modal.remove();
                energy = Math.min(100, energy + 10);
                mood = Math.min(100, mood + 5);
                localStorage.setItem('lucik_energy', energy);
                localStorage.setItem('lucik_mood', mood);
                updateStatsUI();
                speak("Мурр! Комната стала чистой!");
                purr();
                saveHistory(`🧸 Убрал комнату ${characters[currentChar].name}`);
            };
            document.getElementById('dressUpBtn').onclick = () => {
                modal.remove();
                if (!isPremium) {
                    alert('🌟 Оформите подписку, чтобы переодевать персонажа!');
                    return;
                }
                const dressModal = document.createElement('div');
                dressModal.className = 'modal';
                dressModal.innerHTML = `
                    <h3>👕 Выбери образ</h3>
                    <button id="dressDefault">🦁 Обычный</button>
                    <button id="dressHat">🎩 В шляпе</button>
                    <button id="dressGlasses">🕶️ В очках</button>
                    <button id="dressCrown">👑 С короной</button>
                    <div style="margin-top: 20px;">
                        <button class="close-btn" id="closeDressMenu">Закрыть</button>
                    </div>
                `;
                document.body.appendChild(dressModal);
                document.getElementById('dressDefault').onclick = () => {
                    document.getElementById('avatar').style.filter = 'none';
                    dressModal.remove();
                    speak("Вернулся к обычному виду!");
                };
                document.getElementById('dressHat').onclick = () => {
                    document.getElementById('avatar').style.filter = 'drop-shadow(0 0 5px gold)';
                    dressModal.remove();
                    speak("Какая стильная шляпа!");
                };
                document.getElementById('dressGlasses').onclick = () => {
                    document.getElementById('avatar').style.filter = 'brightness(1.1)';
                    dressModal.remove();
                    speak("Очки делают меня умным!");
                };
                document.getElementById('dressCrown').onclick = () => {
                    document.getElementById('avatar').style.filter = 'drop-shadow(0 0 8px #ffd700)';
                    dressModal.remove();
                    speak("Я король! Мур-мяу!");
                };
                document.getElementById('closeDressMenu').onclick = () => dressModal.remove();
            };
            document.getElementById('closeRoomMenu').onclick = () => modal.remove();
        }
        
        document.getElementById('nightStoryBtn').onclick = async () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<h3>🌙 Люцик готовит сказку...</h3><p>Пожалуйста, подожди</p>`;
            document.body.appendChild(modal);
            speak("Мяу! Сейчас я расскажу тебе длинную, уютную сказку на ночь...");
            const longStory = await askDeepSeek("Расскажи длинную, спокойную сказку на ночь для ребёнка 3-7 лет. Сказка должна быть уютной, с хорошим концом.", true);
            modal.remove();
            const storyModal = document.createElement('div');
            storyModal.className = 'modal';
            storyModal.style.maxWidth = '90%';
            storyModal.style.maxHeight = '70%';
            storyModal.style.overflow = 'auto';
            storyModal.innerHTML = `<h3>🌙 Сказка на ночь</h3><p style="margin:15px 0; line-height:1.4;">${longStory.replace(/\n/g, '<br>')}</p><button class="close-btn" onclick="this.parentElement.remove()">Закрыть</button>`;
            document.body.appendChild(storyModal);
            speak(longStory);
            saveHistory(`🌙 Люцик рассказал длинную сказку на ночь`);
        };
        
        function speak(text) {
            let clean = text.replace(/[\*\_\#]/g, '');
            const utter = new SpeechSynthesisUtterance(clean);
            utter.lang = 'ru-RU';
            utter.rate = 0.9;
            utter.onstart = () => document.getElementById('avatar').classList.add('talking');
            utter.onend = () => document.getElementById('avatar').classList.remove('talking');
            window.speechSynthesis.speak(utter);
        }
        
        function purr() {
            const audio = new Audio('purr.mp3');
            audio.play().catch(e => console.log('no purr'));
        }
        
        const badWords = ['мат', 'дурак', 'идиот', 'тупой', 'заткнись', 'пошёл', 'уйди', 'убирайся', 'хрен', 'фиг', 'блин', 'черт'];
        function containsBadWords(text) {
            if (!text) return false;
            const lowerText = text.toLowerCase();
            return badWords.some(word => lowerText.includes(word));
        }
        
        document.getElementById('feedBtn').onclick = () => {
            hunger = Math.min(100, hunger + 15);
            mood = Math.min(100, mood + 5);
            localStorage.setItem('lucik_mood', mood);
            localStorage.setItem('lucik_hunger', hunger);
            updateStatsUI();
            purr();
            saveHistory(`🍎 Покормил ${characters[currentChar].name}`);
        };
        document.getElementById('gamesBtn').onclick = () => showGameMenu();
        document.getElementById('roomBtn').onclick = () => showRoomMenu();
        
        let isListening = false, isWaiting = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec = null;
        if (SpeechRec) {
            rec = new SpeechRec();
            rec.lang = 'ru-RU';
            rec.continuous = false;
        }
        document.getElementById('micBtn').onclick = () => {
            if (!rec) { speak("Голос не поддерживается"); return; }
            if (isListening) return;
            if (isWaiting) { speak("Подожди, я ещё отвечаю..."); return; }
            isListening = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('avatar').classList.add('listening');
            rec.start();
        };
        if (rec) {
            rec.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('avatar').classList.remove('listening');
                isListening = false;
                saveHistory(`👶 ${childName}: ${text}`);
                const lower = text.toLowerCase();
                if (lower.includes('темнот')) updateFear('темноты');
                else if (lower.includes('врач')) updateFear('врачей');
                else if (lower.includes('один')) updateFear('одиночества');
                else if (lower.includes('обид')) updateFear('обиды');
                else if (lower.includes('новое')) updateFear('нового');
                else if (lower.includes('собака') || lower.includes('кошка')) updateFear('животных');
                isWaiting = true;
                const answer = await askDeepSeek(text);
                isWaiting = false;
                saveHistory(`🦁 ${characters[currentChar].name}: ${answer}`);
                speak(answer);
                purr();
            };
            rec.onerror = () => {
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('avatar').classList.remove('listening');
                isListening = false;
                speak("Не расслышал, скажи ещё раз!");
            };
        }
        
        document.getElementById('parentBtn').onclick = () => {
            if (!savedPin) {
                const pin = prompt('Создайте пароль для входа в Штаб (4-6 цифр):');
                if (pin && pin.length >= 4 && /^\d+$/.test(pin)) {
                    localStorage.setItem('parentPin', pin);
                    savedPin = pin;
                    alert('Пароль создан! Теперь вы можете войти в Штаб.');
                    window.location.href = '/parent.html';
                } else {
                    alert('Пароль должен содержать 4-6 цифр!');
                }
            } else {
                const pin = prompt('Введите пароль для входа в Штаб:');
                if (pin === savedPin) {
                    window.location.href = '/parent.html';
                } else if (pin !== null) {
                    alert('Неверный пароль!');
                }
            }
        };
        
        updateAvatarLock();
        updateStatsUI();
        changeCharacter(currentChar);
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error', e));
        }
        
        function updateTimeTheme() {
            const hour = new Date().getHours();
            if (hour >= 18 || hour < 6) document.body.classList.add('night');
            else document.body.classList.remove('night');
        }
        updateTimeTheme();
        setInterval(updateTimeTheme, 60000);
        
        speak(`Мяу! Привет, ${childName}! Нажми на микрофон, и мы подружимся!`);
    </script>
</body>
</html>
