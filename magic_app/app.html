    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;

            max-width: 500px;
            width: 100%;

        }

            flex-wrap: wrap;

        .stat {

            animation: pulse 1s infinite;

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 24px;
            z-index: 2000;
            min-width: 280px;
            max-width: 95%;
            max-height: 85%;
            overflow-y: auto;
            text-align: center;
            color: white;

            border: none;
            font-size: 16px;
            cursor: pointer;

        }

            right: 20px;

            padding: 8px 16px;

            cursor: pointer;

            pointer-events: none;

        }
        @keyframes floatUp {

    // ========== АУДИО ==========
    var audioCtx = null;
    var audioUnlocked = false;

    function initAudio() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch(e) {
                console.log('AudioContext error:', e);
            }
        }
        return audioCtx;
    }

    function playSound(soundName) {
        try {
            var ctx = initAudio();
            if (ctx.state === 'suspended') {
                ctx.resume();
            }
            var oscillator = ctx.createOscillator();
            var gainNode = ctx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            var sounds = {
                'eat': { freq: 523.25, duration: 0.2, type: 'sine' },
                'click': { freq: 880, duration: 0.05, type: 'sine' }
            };
            var sound = sounds[soundName] || sounds['click'];
            oscillator.type = sound.type;
            oscillator.frequency.value = sound.freq;
            gainNode.gain.value = 0.25;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + sound.duration);
            oscillator.stop(ctx.currentTime + sound.duration);
        } catch(e) {
            console.log('Audio play error:', e);
        }
    }

    var today = new Date().toDateString();
    if (lastStoryDate !== today) {

function saveHistory(text) {

    }

    // ========== ПЕРСОНАЖИ И ГОЛОСА (ПО ПАСПОРТУ) ==========
    var characterVoiceMap = {
        lucik: 'zahar',
        mom: 'jane',
        dad: 'ermil',

    };

    function getCharacterPrompt(charId, childName, childAge, weeklyMemory) {
        var prompts = {
            lucik: 'Ты Люцик — дружелюбный волшебный котик. Ты помогаешь ребёнку чувствовать себя смелее. Отвечай кратко, по-доброму, мурлыкай.',

  async function askDeepSeek(text, isLong = false) {
    // Проверка на плохие слова
    const badWords = ['мат', 'дурак', 'идиот', 'тупой', 'заткнись'];
    const lowerText = text ? text.toLowerCase() : '';
    for (let i = 0; i < badWords.length; i++) {
        if (lowerText.includes(badWords[i])) {
            return "Мяу! Давай говорить добрые слова!";
        }
    }

    // Проверка лимита
    const todayStories = parseInt(localStorage.getItem('todayStoriesCount') || '0');
    const limit = getDailyStoryLimit();

    if (!isDeveloperMode() && todayStories >= limit) {
        return "Мурр... Я сегодня уже много рассказывал. Давай завтра продолжим? А сейчас поиграем!";
    }

    try {
        // Получаем недельную память
        const weeklyMemory = getWeeklyMemory();
        
        // ========== ИСТОРИЯ ДИАЛОГА (ВАЖНО!) ==========
        // Берём последние 10 сообщений из сохранённой истории
        const storedHistory = JSON.parse(localStorage.getItem('storyHistory') || '[]');
        
        const historyForAPI = storedHistory.slice(-10).map(item => {
            // Определяем, кто сказал: ребёнок или Люцик
            const isUser = item.includes('👶') || item.includes(currentChild || childName);
            // Очищаем от времени и имени
            let cleanContent = item.replace(/^\d{1,2}:\d{2}:\d{2}:\s*/, '');
            cleanContent = cleanContent.replace(/^👶\s*[^:]+:\s*/, '');
            cleanContent = cleanContent.replace(/^🦁\s*[^:]+:\s*/, '');
            cleanContent = cleanContent.replace(/^🐱\s*[^:]+:\s*/, '');
            cleanContent = cleanContent.trim();
            
            if (!cleanContent) return null;
            
            return { 
                role: isUser ? "user" : "assistant", 
                content: cleanContent 
            };
        }).filter(msg => msg !== null);
        
        console.log(`📜 История для API: ${historyForAPI.length} сообщений`);
        
        const systemPrompt = getCharacterPrompt(currentChar, currentChild || childName, childAge, weeklyMemory);
        const token = localStorage.getItem('userToken') || 'guest_token';
        
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'Authorization': 'Bearer ' + token 
            },
            body: JSON.stringify({ 
                childName: currentChild || childName, 
                childAge: childAge, 
                userSpeech: text, 
                isLong: isLong, 
                history: historyForAPI,
                weeklyMemory: weeklyMemory, 
                systemPrompt: systemPrompt, 
                character: currentChar 
            })
        });
        
        const data = await res.json();
        
        if (data.detectedFear) {
            updateFear(data.detectedFear);
            
            // Сохраняем страх в недельную память
            const weekly = getWeeklyMemory();
            weekly.fears[data.detectedFear] = (weekly.fears[data.detectedFear] || 0) + 1;
            weekly.lastUpdated = new Date().toISOString();
            localStorage.setItem('weeklyMemory', JSON.stringify(weekly));
        }
        
        // Обновляем счётчик сказок
        const newCount = todayStories + 1;
        localStorage.setItem('todayStoriesCount', newCount.toString());
        
        let responseText = data.story;
        
        // Очистка ответа от мусора
        if (responseText) {
            responseText = responseText.replace(/^\d+\s*/, '');
            responseText = responseText.replace(/люцик\s*мур\s*мяу/gi, '');
            responseText = responseText.trim();
        }
        
        if (!responseText || responseText.length < 3 || /^\d+$/.test(responseText.trim())) {
            responseText = "Мурр... Я тебя слушаю! Расскажи ещё что-нибудь?";
        }
        
        return responseText;
        
    } catch(e) { 
        console.error('DeepSeek error:', e);
        return "Мурр... Что-то я задумался. Давай ещё раз?"; 
    }
}

    var currentAudio = null;
    var isSpeaking = false;

    async function speakWithYandex(text, voice) {
        if (voice === undefined) voice = 'zahar';

        return new Promise(async function(resolve) {
            if (isSpeaking) {
                resolve();
                return;
            }

            try {
                // Останавливаем предыдущее аудио
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.src = '';
                    currentAudio = null;
                }

                isSpeaking = true;
                var avatar = document.getElementById('avatar');
                if (avatar) avatar.classList.add('talking');

                // Очищаем текст
                var cleanText = text.replace(/[^\w\s\.,!?а-яА-ЯёЁ-]/g, '').substring(0, 500);

                // Запрос к TTS с токеном
                var token = localStorage.getItem('userToken') || 'guest_token';
                var response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ text: cleanText, voice: voice, speed: 0.9 })
                });

                if (!response.ok) {
                    throw new Error('TTS API error: ' + response.status);
                }

                var audioBlob = await response.blob();
                var audioUrl = URL.createObjectURL(audioBlob);
                var audio = new Audio();
                currentAudio = audio;

                audio.src = audioUrl;

                audio.onended = function() {
                    isSpeaking = false;
                    if (avatar) avatar.classList.remove('talking');
                    URL.revokeObjectURL(audioUrl);
                    if (currentAudio === audio) currentAudio = null;
                    resolve();
                };

                audio.onerror = function(e) {
                    console.error('Audio play error:', e);
                    isSpeaking = false;
                    if (avatar) avatar.classList.remove('talking');
                    URL.revokeObjectURL(audioUrl);
                    if (currentAudio === audio) currentAudio = null;
                    resolve();
                };

                // Пробуем воспроизвести
                try {
                    await audio.play();
                } catch (playError) {
                    console.log('Audio play blocked, waiting for user gesture...');
                    // Ждём следующего касания
                    var retryPlay = function() {
                        audio.play().catch(function() {});
                        document.removeEventListener('touchend', retryPlay);
                        document.removeEventListener('click', retryPlay);
                    };
                    document.addEventListener('touchend', retryPlay, { once: true });
                    document.addEventListener('click', retryPlay, { once: true });
                    resolve();
                }

            } catch (error) {
                console.error('Yandex TTS error:', error);
                isSpeaking = false;
                var avatarEl = document.getElementById('avatar');
                if (avatarEl) avatarEl.classList.remove('talking');
                resolve();
            }
        });
    }

    async function speak(text) {
        var voice = getVoiceForCharacter(currentChar);
        await speakWithYandex(text, voice);
    }
                // ========== СВАЙП ДЛЯ СМЕНЫ ПЕРСОНАЖА ==========
    var touchStartX = 0;
    var avatarForSwipe = document.getElementById('avatar');

    avatarForSwipe.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
    });

    avatarForSwipe.addEventListener('touchend', function(e) {
        var diff = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(diff) > 50) {
            var chars = ['lucik', 'mom', 'dad', 'kid1', 'kid2'];
            var idx = chars.indexOf(currentChar);
            if (diff > 0) {
                idx = (idx - 1 + chars.length) % chars.length;
            } else {
                idx = (idx + 1) % chars.length;
            }
            changeCharacter(chars[idx]);
        }
    });

    // ========== НОЧНАЯ ТЕМА ==========
    function updateTimeTheme() {
        var hour = new Date().getHours();
        
        if (hour >= 18 || hour < 6) {
            document.body.classList.add('night');
        } else {
            document.body.classList.remove('night');
        }
        
        var moonBtn = document.getElementById('nightStoryBtn');
        if (moonBtn) {
            if (hour >= 20 || hour < 6) {
                moonBtn.style.display = 'block';
            } else {
                moonBtn.style.display = 'none';
            }
        }
    }

    updateTimeTheme();
    setInterval(updateTimeTheme, 60000);

    // ========== ИГРЫ ==========
    var gameActive = false;

    function startFishGame() {
        if (gameActive) return;
        gameActive = true;

        var gameScore = 0;
        var timeLeft = 30;

        var gameContainer = document.createElement('div');
        gameContainer.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:space-between;';

        var fishArea = document.createElement('div');
        fishArea.style.cssText = 'flex:1; position:relative; width:100%;';

        var fish = document.createElement('div');
        fish.innerText = '🐟';
        fish.style.cssText = 'font-size:60px; position:absolute; cursor:pointer;';

        var scoreDiv = document.createElement('div');
        scoreDiv.style.cssText = 'color:white; font-size:24px; margin:20px;';
        scoreDiv.innerText = '🐟 Счёт: 0 | ⏱️ ' + timeLeft + ' сек';

        var closeBtn = document.createElement('button');
        closeBtn.innerText = 'Закрыть';
        closeBtn.style.cssText = 'padding:10px 20px; margin:20px; border-radius:30px; background:#ff4081; color:white; border:none;';

        fishArea.appendChild(fish);
        gameContainer.appendChild(scoreDiv);
        gameContainer.appendChild(fishArea);
        gameContainer.appendChild(closeBtn);
        document.body.appendChild(gameContainer);

        function moveFish() {
            var maxX = fishArea.clientWidth - 80;
            var maxY = fishArea.clientHeight - 80;
            if (maxX > 0 && maxY > 0) {
                fish.style.left = Math.random() * maxX + 'px';
                fish.style.top = Math.random() * maxY + 'px';
            }
        }

        fish.onclick = function() {
            if (!gameActive) return;
            gameScore++;
            fishScore++;
            localStorage.setItem('fishScore', fishScore);
            scoreDiv.innerText = '🐟 Счёт: ' + gameScore + ' | ⏱️ ' + timeLeft + ' сек';
            moveFish();
            playSound('click');
        };

        moveFish();

        var timer = setInterval(function() {
            if (!gameActive) return;
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timer);
                gameActive = false;
                scoreDiv.innerText = '🎉 Игра окончена! ' + gameScore + ' рыбок!';
                fish.style.display = 'none';
                speak('Ты поймал ' + gameScore + ' рыбок! Молодец!');
            } else {
                scoreDiv.innerText = '🐟 Счёт: ' + gameScore + ' | ⏱️ ' + timeLeft + ' сек';
            }
        }, 1000);

        var moveInterval = setInterval(function() {
            if (gameActive) moveFish();
        }, 1500);

        closeBtn.onclick = function() {
            clearInterval(timer);
            clearInterval(moveInterval);
            document.body.removeChild(gameContainer);
            gameActive = false;
        };
    }

    function showGameMenu() {
        var modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = '<h3>🎮 Выбери игру</h3><button id="gameFishBtn" style="background:#4aa3df;">🐟 Поймай рыбку</button><button class="close-btn">Закрыть</button>';
        document.body.appendChild(modal);
        document.getElementById('gameFishBtn').onclick = function() {
            modal.remove();
            startFishGame();
        };
        modal.querySelector('.close-btn').onclick = function() {
            modal.remove();
        };
    }

    function showRoomMenu() {
        var modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = '<h3>🏠 Моя комната</h3><button id="cleanRoomBtn" style="background:#4CAF50;">🧸 Уборка</button><button id="dressUpBtn" style="background:#ff9f4a;">👕 Переодеть</button><button class="close-btn">Закрыть</button>';
        document.body.appendChild(modal);
        
        document.getElementById('cleanRoomBtn').onclick = function() {
            modal.remove();
            showVisualEffect('🧹✨');
            speak("Мурр! Комната стала чистой!");
            energy = Math.min(100, energy + 10);
            localStorage.setItem('lucik_energy', energy);
            updateStatsUI();
        };
        
        document.getElementById('dressUpBtn').onclick = function() {
            modal.remove();
            showVisualEffect('🎩✨');
            speak("Какая стильная шляпа!");
        };
        
        modal.querySelector('.close-btn').onclick = function() {
            modal.remove();
        };
    }
                // ========== МИКРОФОН ==========
    var isListening = false;
    var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    var rec = null;

    if (SpeechRec) {
        rec = new SpeechRec();
        rec.lang = 'ru-RU';
        rec.continuous = false;
        rec.interimResults = false;
    }

    function startListening() {
        if (!rec) {
            speak("Твой браузер не умеет слушать.");
            return;
        }
        if (isListening || isSpeaking) return;

        isListening = true;
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('avatar').classList.add('listening');
        
        try {
            rec.start();
        } catch(e) {
            isListening = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('avatar').classList.remove('listening');
        }
    }

    if (rec) {
        rec.onresult = async function(e) {
            var text = e.results[0][0].transcript;
            document.getElementById('micBtn').classList.remove('recording');
            isListening = false;

            saveHistory('👶 ' + (currentChild || childName) + ': ' + text);

            showThinkingIndicator(true);
            var answer = await askDeepSeek(text);
            showThinkingIndicator(false);

            saveHistory('🦁 ' + characters[currentChar].name + ': ' + answer);
            await speak(answer);
        };

        rec.onerror = function(e) {
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('avatar').classList.remove('listening');
            showThinkingIndicator(false);
            isListening = false;
            
            if (e.error === 'not-allowed') {
                speak("Нужно разрешить микрофон.");
            } else {
                speak("Не расслышал, скажи ещё раз!");
            }
        };

        rec.onend = function() {
            document.getElementById('micBtn').classList.remove('recording');
            if (!isSpeaking) {
                document.getElementById('avatar').classList.remove('listening');
            }
            isListening = false;
        };
    }

    // ========== ПРИВЯЗКА ОБРАБОТЧИКОВ ==========
    safeOn('feedBtn', function() {
        showVisualEffect('🍎🥣');
        hunger = Math.min(100, hunger + 15);
        mood = Math.min(100, mood + 5);
        localStorage.setItem('lucik_mood', mood);
        localStorage.setItem('lucik_hunger', hunger);
        updateStatsUI();
        playSound('eat');
        speak("Мурр! Вкусно! Спасибо!");
    });

    safeOn('gamesBtn', function() {
        showGameMenu();
    });

    safeOn('roomBtn', function() {
        showRoomMenu();
    });

    safeOn('nightStoryBtn', async function() {
        var modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = '<h3>🌙 Люцик готовит сказку...</h3>';
        document.body.appendChild(modal);
        
        speak("Сейчас расскажу сказку на ночь...");
        var longStory = await askDeepSeek("Расскажи длинную, спокойную сказку на ночь", true);
        
        modal.remove();
        
        var storyModal = document.createElement('div');
        storyModal.className = 'modal';
        storyModal.innerHTML = '<h3>🌙 Сказка на ночь</h3><p>' + longStory + '</p><button class="close-btn" onclick="this.parentElement.remove()">Закрыть</button>';
        document.body.appendChild(storyModal);
        
        speak(longStory);
    });

    safeOn('micBtn', function() {
        startListening();
    });

    safeOn('parentBtn', function() {
        window.location.href = '/parent.html';
    });

    // ========== ЗАПУСК ==========
    updateStatsUI();
    changeCharacter(currentChar);

    // Service Worker для PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function(e) {
            console.log('SW error', e);
        });
    }

    // Приветствие при загрузке
    setTimeout(function() {
        if (childrenNames.length > 1 && !currentChild) {
            showChildSelector();
        } else {
            var greetingVoice = getVoiceForCharacter(currentChar);
            var greetingText = 'Привет, ' + (currentChild || childName) + '!';
            if (currentChar === 'lucik') {
                greetingText = 'Мяу! Привет, ' + (currentChild || childName) + '! Я Люцик!';
            }
            speakWithYandex(greetingText, greetingVoice);
        }
    }, 1000);

    </script>
