<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Герой Сказок — Люцик</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8d5a8, #d4c08c, #c8b078);
            font-family: 'Segoe UI', sans-serif;
            color: #3a2a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }
        .glass {
            background: rgba(255,248,235,0.25);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .avatar {
            width: 220px;
            height: 220px;
            background-image: url('avatar.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 20px auto;
            cursor: pointer;
            transition: 0.2s;
        }
        .avatar.talking { animation: pulse 0.5s infinite; filter: drop-shadow(0 0 15px #00d2ff); }
        .avatar.listening { animation: pulse 1s infinite; filter: drop-shadow(0 0 15px #4CAF50); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .mic-btn {
            width: 85px;
            height: 85px;
            background: #ff4081;
            border: none;
            border-radius: 50%;
            font-size: 45px;
            margin: 20px auto;
            cursor: pointer;
        }
        .mic-btn.recording { background: #4CAF50; }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
        }
        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        .stat {
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
        }
        .parent-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
        }
        .parent-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 30px;
            overflow-y: auto;
            color: white;
        }
        .close-panel {
            background: #ff4081;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            margin-top: 20px;
        }
        .footer {
            font-size: 10px;
            margin-top: 20px;
            opacity: 0.5;
        }
        @media (max-width: 480px) {
            .avatar { width: 180px; height: 180px; }
            .mic-btn { width: 75px; height: 75px; font-size: 40px; }
            .action-btn { width: 55px; height: 55px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="parent-btn" id="parentBtn">⚙️ Родителям</div>

    <div class="stats">
        <div class="stat">😊 <span id="moodVal">70</span>%</div>
        <div class="stat">🍽️ <span id="hungerVal">60</span>%</div>
        <div class="stat">⚡ <span id="energyVal">50</span>%</div>
        <div class="stat">⭐ <span id="braveryVal">0</span></div>
    </div>

    <div class="avatar" id="avatar"></div>
    <button class="mic-btn" id="micBtn">🎤</button>

    <div class="action-buttons">
        <button class="action-btn" id="feedBtn">🍎</button>
        <button class="action-btn" id="playBtn">🎾</button>
        <button class="action-btn" id="dressBtn">🧸</button>
        <button class="action-btn" id="roomBtn">🏠</button>
    </div>

    <div class="footer">
        <a href="/privacy.html">Политика</a> | <a href="/terms.html">Соглашение</a>
    </div>

    <div id="parentPanel" class="parent-panel">
        <h2>🚀 Штаб Создателя</h2>
        <div id="pinStatus"></div>
        <input type="password" id="pinInput" placeholder="Пароль" style="width:100%; padding:10px; margin:10px 0;">
        <button id="pinSaveBtn">Создать пароль</button>
        <button id="pinCheckBtn">Войти</button>
        <hr>
        <h3>📊 Дневник страхов</h3>
        <div id="fearStats">😨 Темнота: 0<br>🏥 Врачи: 0<br>🧸 Одиночество: 0<br>🌟 Новое: 0<br>💔 Обиды: 0<br>🐕 Животные: 0</div>
        <h3>📒 История разговоров</h3>
        <div id="historyList">Пока тишина...</div>
        <button class="close-panel" id="closePanelBtn">Закрыть</button>
    </div>

    <script>
        let childName = localStorage.getItem('childName') || 'малыш';
        let childAge = localStorage.getItem('childAge') || 5;
        let savedPin = localStorage.getItem('parentPin');
        let mood = 70, hunger = 60, energy = 50, bravery = 0;
        let fearStats = JSON.parse(localStorage.getItem('fearStats') || '{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
        let conversationHistory = JSON.parse(localStorage.getItem('storyHistory') || '[]');
        let isListening = false, isWaiting = false;

        function updateUI() {
            document.getElementById('moodVal').innerText = mood;
            document.getElementById('hungerVal').innerText = hunger;
            document.getElementById('energyVal').innerText = energy;
            document.getElementById('braveryVal').innerText = bravery;
            document.getElementById('fearStats').innerHTML = `
                😨 Темнота: ${fearStats.темноты}<br>
                🏥 Врачи: ${fearStats.врачей}<br>
                🧸 Одиночество: ${fearStats.одиночества}<br>
                🌟 Новое: ${fearStats.нового}<br>
                💔 Обиды: ${fearStats.обиды}<br>
                🐕 Животные: ${fearStats.животных}
            `;
            const h = JSON.parse(localStorage.getItem('storyHistory') || '[]');
            document.getElementById('historyList').innerHTML = h.slice(-10).map(i => `<div style="padding:5px; border-bottom:1px solid rgba(255,255,255,0.1);">${i}</div>`).join('') || "Пока тишина...";
        }

        function saveHistory(text) {
            let h = JSON.parse(localStorage.getItem('storyHistory') || '[]');
            h.unshift(new Date().toLocaleTimeString() + ": " + text);
            if (h.length > 30) h.pop();
            localStorage.setItem('storyHistory', JSON.stringify(h));
            updateUI();
        }

        function updateFear(fear) {
            if (fearStats[fear] !== undefined) {
                fearStats[fear]++;
                localStorage.setItem('fearStats', JSON.stringify(fearStats));
                bravery = Math.min(100, bravery + 10);
                localStorage.setItem('lucik_bravery', bravery);
                updateUI();
            }
        }

        function speak(text) {
            let clean = text.replace(/[\*\_\#]/g, '');
            const utter = new SpeechSynthesisUtterance(clean);
            utter.lang = 'ru-RU';
            utter.rate = 0.9;
            utter.onstart = () => document.getElementById('avatar').classList.add('talking');
            utter.onend = () => document.getElementById('avatar').classList.remove('talking');
            window.speechSynthesis.speak(utter);
        }

        function purr() {
            const audio = new Audio('purr.mp3');
            audio.play().catch(e => console.log('no purr'));
        }

        async function askDeepSeek(text) {
            if (isWaiting) return "Мяу! Подожди чуть-чуть...";
            isWaiting = true;
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        childName: childName,
                        childAge: childAge,
                        userSpeech: text,
                        history: conversationHistory.slice(-6)
                    })
                });
                const data = await res.json();
                return data.story;
            } catch(e) {
                return "Мяу! Давай ещё раз?";
            } finally { isWaiting = false; }
        }

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec = null;
        if (SpeechRec) {
            rec = new SpeechRec();
            rec.lang = 'ru-RU';
            rec.continuous = false;
        }

        document.getElementById('micBtn').onclick = () => {
            if (!rec) { speak("Голос не поддерживается"); return; }
            if (isListening) return;
            isListening = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('avatar').classList.add('listening');
            rec.start();
        };

        if (rec) {
            rec.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('avatar').classList.remove('listening');
                isListening = false;
                saveHistory(`👶 ${childName}: ${text}`);
                
                const lower = text.toLowerCase();
                if (lower.includes('темнот')) updateFear('темноты');
                else if (lower.includes('врач')) updateFear('врачей');
                else if (lower.includes('один')) updateFear('одиночества');
                else if (lower.includes('обид')) updateFear('обиды');
                else if (lower.includes('новое')) updateFear('нового');
                else if (lower.includes('собака') || lower.includes('кошка')) updateFear('животных');
                
                const answer = await askDeepSeek(text);
                saveHistory(`🦁 Люцик: ${answer}`);
                speak(answer);
                purr();
            };
            rec.onerror = () => {
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('avatar').classList.remove('listening');
                isListening = false;
                speak("Не расслышал, скажи ещё раз!");
            };
        }

        document.getElementById('feedBtn').onclick = () => {
            hunger = Math.min(100, hunger + 15);
            mood = Math.min(100, mood + 5);
            localStorage.setItem('lucik_mood', mood);
            localStorage.setItem('lucik_hunger', hunger);
            updateUI();
            purr();
            saveHistory(`🍎 Покормил Люцика`);
        };
        document.getElementById('playBtn').onclick = () => {
            if (energy >= 20) {
                energy -= 20;
                mood = Math.min(100, mood + 15);
                localStorage.setItem('lucik_energy', energy);
                localStorage.setItem('lucik_mood', mood);
                updateUI();
                speak("Ура! Весело играть!");
            } else {
                speak("Я устал. Дай отдохнуть.");
            }
            purr();
            saveHistory(`🎾 Поиграл с Люциком`);
        };
        document.getElementById('dressBtn').onclick = () => { purr(); saveHistory(`🧸 Переодел Люцика`); };
        document.getElementById('roomBtn').onclick = () => { purr(); saveHistory(`🏠 Зашёл в комнату Люцика`); };
        document.getElementById('avatar').onclick = () => {
            mood = Math.min(100, mood + 10);
            localStorage.setItem('lucik_mood', mood);
            updateUI();
            purr();
            speak(`Мурр, как приятно!`);
            saveHistory(`🤚 Погладил Люцика`);
        };

        // Штаб
        const parentPanel = document.getElementById('parentPanel');
        document.getElementById('parentBtn').onclick = () => {
            if (!savedPin) {
                parentPanel.style.display = 'block';
            } else {
                const pin = prompt('Введите пароль:');
                if (pin === savedPin) parentPanel.style.display = 'block';
                else if (pin !== null) alert('Неверный пароль!');
            }
        };
        document.getElementById('closePanelBtn').onclick = () => parentPanel.style.display = 'none';
        document.getElementById('pinSaveBtn').onclick = () => {
            const pin = document.getElementById('pinInput').value;
            if (pin.length >= 4 && /^\d+$/.test(pin)) {
                localStorage.setItem('parentPin', pin);
                savedPin = pin;
                alert('Пароль сохранён!');
                parentPanel.style.display = 'none';
            } else alert('4-6 цифр');
        };
        document.getElementById('pinCheckBtn').onclick = () => {
            if (document.getElementById('pinInput').value === savedPin) alert('Вход выполнен!');
            else alert('Неверный пароль!');
        };

        updateUI();
        speak(`Мяу! Привет, ${childName}! Расскажи, как дела?`);
    </script>
</body>
</html>
