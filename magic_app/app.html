<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Герой Сказок — Люцик</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦁</text></svg>">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0; min-height: 100vh; font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
            color: #3a2a1a; background-image: url('app-bg.png'); background-size: cover; background-position: center;
            background-attachment: fixed; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        body.night {
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('app-bg.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        
        .app-container { max-width: 500px; width: 100%; min-height: 85vh; display: flex; flex-direction: column; justify-content: space-between; }
        
        .child-indicator { text-align: center; font-size: 18px; font-weight: bold; color: #3a2a1a; background: rgba(255,255,255,0.35); backdrop-filter: blur(4px); padding: 8px 20px; border-radius: 30px; margin-bottom: 15px; display: inline-block; align-self: center; cursor: pointer; }
        body.night .child-indicator { color: #f0e6d0; background: rgba(0,0,0,0.5); }
        
        .stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.25); backdrop-filter: blur(8px); padding: 12px 16px; border-radius: 60px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .stat { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; color: #3a2a1a; background: rgba(255,255,255,0.3); padding: 5px 12px; border-radius: 40px; }
        body.night .stat { color: #f0e6d0; background: rgba(0,0,0,0.5); }
        .stat-bar { width: 60px; height: 8px; background: rgba(0,0,0,0.25); border-radius: 10px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 10px; transition: width 0.3s ease; }
        #moodFill { background: #ff9f4a; } #hungerFill { background: #4CAF50; } #energyFill { background: #00d2ff; } #braveryFill { background: #ffd700; }
        
        .avatar-container { display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px 0; position: relative; }
        .avatar-label { font-size: 11px; opacity: 0.6; margin-top: 8px; text-align: center; color: #3a2a1a; }
        body.night .avatar-label { color: #f0e6d0; opacity: 0.5; }
        
        .avatar { width: 220px; height: 220px; background-size: contain; background-repeat: no-repeat; background-position: center; cursor: pointer; transition: 0.2s; animation: blink 4s infinite; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .avatar.premium-locked { filter: grayscale(0.7); opacity: 0.6; }
        .avatar.talking { animation: pulse 0.5s infinite, blink 4s infinite; filter: drop-shadow(0 0 15px #00d2ff); }
        .avatar.listening { animation: pulse 1s infinite, blink 4s infinite; filter: drop-shadow(0 0 15px #4CAF50); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .lock-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; background: rgba(0,0,0,0.6); border-radius: 50%; padding: 10px; pointer-events: none; }
        
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .action-btn { background: rgba(255,255,255,0.35); backdrop-filter: blur(4px); border: none; border-radius: 60px; padding: 12px 20px; min-width: 70px; font-size: 28px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .action-btn:active { transform: scale(0.96); }
        body.night .action-btn { background: rgba(0,0,0,0.5); }
        
        .mic-container { display: flex; justify-content: center; margin: 15px 0; }
        .mic-btn { width: 100px; height: 100px; background: #ff4081; border: none; border-radius: 50%; font-size: 52px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: 0.2s; }
        .mic-btn:active { transform: scale(0.95); }
        .mic-btn.recording { background: #4CAF50; animation: pulse 1s infinite; }
        
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); border-radius: 40px; padding: 24px; z-index: 2000; min-width: 280px; max-width: 95%; max-height: 85%; overflow-y: auto; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .modal button { margin: 8px; padding: 12px 20px; min-width: 70px; min-height: 48px; font-size: 18px; border-radius: 60px; border: none; cursor: pointer; touch-action: manipulation; }
        .modal .close-btn { background: #ff4081; color: white; }
        
        .parent-btn { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 8px 16px; border-radius: 30px; cursor: pointer; z-index: 100; color: white; font-size: 14px; }
        
        @keyframes achievementPop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 80% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        
        @media (max-width: 480px) { body { padding: 12px; } .avatar { width: 180px; height: 180px; } .action-btn { padding: 10px 16px; min-width: 60px; font-size: 24px; } .mic-btn { width: 80px; height: 80px; font-size: 44px; } .stat-bar { width: 45px; } .stat { font-size: 12px; padding: 3px 10px; } .modal button { padding: 10px 16px; font-size: 16px; } }
    </style>
</head>
<body>
    <div class="parent-btn" id="parentBtn">⚙️ Родителям</div>
    
    <div class="app-container">
        <div class="child-indicator" id="childIndicator">👶 Загрузка...</div>
        
        <div class="stats">
            <div class="stat">😊 <div class="stat-bar"><div class="stat-fill" id="moodFill" style="width: 70%"></div></div></div>
            <div class="stat">🍽️ <div class="stat-bar"><div class="stat-fill" id="hungerFill" style="width: 60%"></div></div></div>
            <div class="stat">⚡ <div class="stat-bar"><div class="stat-fill" id="energyFill" style="width: 50%"></div></div></div>
            <div class="stat">⭐ <div class="stat-bar"><div class="stat-fill" id="braveryFill" style="width: 0%"></div></div></div>
        </div>
        
        <div class="avatar-container" id="avatarContainer">
            <div class="avatar" id="avatar" style="background-image: url('avatar.png');"></div>
            <div id="lockOverlay" class="lock-overlay" style="display: none;">🔒</div>
            <div class="avatar-label" id="avatarLabel">🖼️ Образец аватара</div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="feedBtn">🍎</button>
            <button class="action-btn" id="gamesBtn">🎮</button>
            <button class="action-btn" id="roomBtn">🏠</button>
            <button class="action-btn" id="nightStoryBtn" style="display: none;">🌙</button>
        </div>
        
        <div class="mic-container">
            <button class="mic-btn" id="micBtn">🎤</button>
        </div>
    </div>
    
    <script>
        // Шифрование пина
        const PIN_SALT = 'lucik_magic_2024';
        function encodePin(pin) { return btoa(pin.split('').reverse().join('') + ':' + PIN_SALT); }
        function decodePin(enc) { try { return atob(enc).split(':')[0].split('').reverse().join(''); } catch { return ''; } }
        
        // ========== ДАННЫЕ ДЕТЕЙ ==========
        let children = [];
        let currentChildIndex = 0;
        
        try {
            const saved = localStorage.getItem('children');
            if (saved) children = JSON.parse(saved);
            currentChildIndex = parseInt(localStorage.getItem('currentChildIndex') || '0');
            if (currentChildIndex >= children.length) currentChildIndex = 0;
        } catch { children = []; }
        
        if (children.length === 0) {
            const oldName = localStorage.getItem('childName') || 'малыш';
            const oldAge = parseInt(localStorage.getItem('childAge') || '5');
            children = [{ name: oldName, age: oldAge, gender: 'boy' }];
            currentChildIndex = 0;
            localStorage.setItem('children', JSON.stringify(children));
            localStorage.setItem('currentChildIndex', '0');
            const oldFear = localStorage.getItem('fearStats');
            const oldHistory = localStorage.getItem('storyHistory');
            if (oldFear) localStorage.setItem('fearStats_0', oldFear);
            if (oldHistory) localStorage.setItem('storyHistory_0', oldHistory);
        }
        
        function getCurrentChild() {
            if (currentChildIndex >= children.length) currentChildIndex = 0;
            return children[currentChildIndex] || { name: 'малыш', age: 5, gender: 'boy' };
        }
        
        function updateChildIndicator() {
            const child = getCurrentChild();
            const arrow = children.length > 1 ? ' ◀ ▶' : '';
            document.getElementById('childIndicator').innerHTML = `👶 ${child.name}, ${child.age} лет${arrow}`;
        }
        
        function updateAvatarLabel() {
            const label = document.getElementById('avatarLabel');
            if (isPremium) {
                label.innerHTML = '🖼️ Образец аватара<br><small style="opacity:0.7;">Скоро: загрузка фото ребёнка</small>';
            } else {
                label.innerHTML = '🖼️ Образец аватара<br><small style="opacity:0.7;">🌟 В премиуме — фото ребёнка</small>';
            }
        }
        
        function loadChildData(index) {
            const idx = index || 0;
            const fearData = localStorage.getItem(`fearStats_${idx}`);
            fearStats = fearData ? JSON.parse(fearData) : JSON.parse('{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');
            const historyData = localStorage.getItem(`storyHistory_${idx}`);
            conversationHistory = historyData ? JSON.parse(historyData) : [];
            mood = parseInt(localStorage.getItem(`lucik_mood_${idx}`) || '70');
            hunger = parseInt(localStorage.getItem(`lucik_hunger_${idx}`) || '60');
            energy = parseInt(localStorage.getItem(`lucik_energy_${idx}`) || '50');
            bravery = parseInt(localStorage.getItem(`lucik_bravery_${idx}`) || '0');
            fishScore = parseInt(localStorage.getItem(`fishScore_${idx}`) || '0');
            storyCount = parseInt(localStorage.getItem(`storyCount_${idx}`) || '0');
        }
        
        function saveChildData(index) {
            const idx = index || 0;
            localStorage.setItem(`fearStats_${idx}`, JSON.stringify(fearStats));
            localStorage.setItem(`storyHistory_${idx}`, JSON.stringify(conversationHistory));
            localStorage.setItem(`lucik_mood_${idx}`, mood); localStorage.setItem(`lucik_hunger_${idx}`, hunger);
            localStorage.setItem(`lucik_energy_${idx}`, energy); localStorage.setItem(`lucik_bravery_${idx}`, bravery);
            localStorage.setItem(`fishScore_${idx}`, fishScore); localStorage.setItem(`storyCount_${idx}`, storyCount);
        }
        
        function switchChild(direction) {
            if (children.length <= 1) return;
            saveChildData(currentChildIndex);
            currentChildIndex += direction;
            if (currentChildIndex < 0) currentChildIndex = children.length - 1;
            if (currentChildIndex >= children.length) currentChildIndex = 0;
            localStorage.setItem('currentChildIndex', currentChildIndex);
            const child = getCurrentChild();
            childName = child.name; childAge = child.age;
            localStorage.setItem('childName', childName); localStorage.setItem('childAge', childAge);
            loadChildData(currentChildIndex);
            updateChildIndicator();
            updateStatsUI();
            setAvatarByGender();
            speak(`Привет, ${childName}!`);
        }
                
        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        async function checkAuthAndRedirect() {
            const token = localStorage.getItem('userToken');
            const guestMode = localStorage.getItem('guestMode') === 'true';
            if (guestMode) return true;
            if (!token) { window.location.href = '/'; return false; }
            try {
                const response = await fetch('/api/verify-token', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (!data.valid) { localStorage.removeItem('userToken'); localStorage.removeItem('userEmail'); localStorage.removeItem('guestMode'); window.location.href = '/'; return false; }
                return true;
            } catch (error) { console.error('Auth check error:', error); return true; }
        }
        checkAuthAndRedirect();
        
        // ========== АНАЛИТИКА ==========
        function sendAnalytics(eventType, eventData = {}) {
            const userToken = localStorage.getItem('userToken'), userEmail = localStorage.getItem('userEmail'), guestMode = localStorage.getItem('guestMode') === 'true';
            fetch('/api/analytics', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event_type: eventType, user_id: userToken ? userToken.slice(0, 50) : (guestMode ? 'guest_' + Date.now() : null), user_email: userEmail && !userEmail.startsWith('guest_') ? userEmail : null, child_name: childName, child_age: parseInt(childAge), event_data: eventData }) }).catch(e => console.log('Analytics error:', e));
        }
        
        // ========== ЗВУКИ ==========
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playSound(soundName) {
            try {
                const ctx = initAudio(), osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                const sounds = { 'eat': { f: 523.25, d: 0.2, t: 'sine' }, 'purr': { f: 130.81, d: 0.5, t: 'sine' }, 'laugh': { f: 659.25, d: 0.15, t: 'square' }, 'click': { f: 880, d: 0.05, t: 'sine' }, 'success': { f: 523.25, d: 0.2, t: 'sine' }, 'fail': { f: 220, d: 0.3, t: 'sawtooth' }, 'victory': { f: 783.99, d: 0.3, t: 'sine' }, 'achievement': { f: 1046.50, d: 0.4, t: 'sine' }, 'paint': { f: 440, d: 0.03, t: 'sine' } };
                const s = sounds[soundName] || sounds['click']; osc.type = s.t; osc.frequency.value = s.f; gain.gain.value = 0.25;
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + s.d); osc.stop(ctx.currentTime + s.d);
            } catch(e) {}
        }
        
        // ========== ДОСТИЖЕНИЯ ==========
        function getAchievementsKey() { return `achievements_${currentChildIndex}`; }
        function initAchievements() {
            const key = getAchievementsKey(); let ach = localStorage.getItem(key);
            if (!ach) { const d = { 'first_talk': { name: '🎤 Первый разговор', desc: 'Первый разговор с Люциком', earned: false, date: null }, 'brave_kid': { name: '🦁 Храбрый малыш', desc: 'Победил первый страх', earned: false, date: null }, 'story_lover': { name: '🌙 Сказочник', desc: '10 сказок на ночь', earned: false, date: null, progress: 0, target: 10 }, 'game_master': { name: '🎮 Игроман', desc: 'Сыграл во все игры', earned: false, date: null }, 'fish_catcher': { name: '🐟 Рыболов', desc: 'Поймал 30 рыбок', earned: false, date: null, progress: 0, target: 30 }, 'memory_champion': { name: '🧠 Чемпион памяти', desc: 'Выиграл в Мемори', earned: false, date: null }, 'puzzle_solver': { name: '🧩 Собиратель пазлов', desc: 'Собрал пазл', earned: false, date: null }, 'artist': { name: '🎨 Художник', desc: 'Раскрасил Люцика', earned: false, date: null }, 'emotion_master': { name: '😊 Мастер эмоций', desc: 'Угадал все эмоции', earned: false, date: null }, '7_days': { name: '📅 Друг на неделю', desc: '7 дней с Люциком', earned: false, date: null } }; localStorage.setItem(key, JSON.stringify(d)); }
            return JSON.parse(localStorage.getItem(key));
        }
        function updateAchievement(id, progress = null) {
            const key = getAchievementsKey(), ach = JSON.parse(localStorage.getItem(key));
            if (ach[id] && !ach[id].earned) {
                if (progress !== null) { ach[id].progress = (ach[id].progress || 0) + progress; if (ach[id].progress >= ach[id].target) { ach[id].earned = true; ach[id].date = new Date().toISOString(); playSound('achievement'); showAchievementNotification(ach[id].name); sendAnalytics('achievement_earned', { achievement: ach[id].name }); } }
                else { ach[id].earned = true; ach[id].date = new Date().toISOString(); playSound('achievement'); showAchievementNotification(ach[id].name); sendAnalytics('achievement_earned', { achievement: ach[id].name }); }
                localStorage.setItem(key, JSON.stringify(ach));
            }
        }
        function showAchievementNotification(name) { const n = document.createElement('div'); n.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(135deg,#ffd700,#ff9f4a); color:#3a2a1a; padding:20px 30px; border-radius:60px; z-index:5000; text-align:center; animation:achievementPop 0.5s ease-out; box-shadow:0 0 30px rgba(0,0,0,0.3); font-weight:bold;'; n.innerHTML = `<strong>🏆 НАГРАДА!</strong><br>${name}`; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
        
        // ========== НЕДЕЛЬНАЯ ПАМЯТЬ ==========
        function getWeekStart(d) { const date = new Date(d); const day = date.getDay(); const diff = date.getDate() - day + (day === 0 ? -6 : 1); return new Date(date.setDate(diff)).toISOString().split('T')[0]; }
        function getWeeklyMemory() {
            const key = `weeklyMemory_${currentChildIndex}`; let m = localStorage.getItem(key);
            if (!m) { const now = new Date(); m = { weekStart: getWeekStart(now), fears: {}, positiveTopics: {}, mood: { happy: 0, sad: 0, scared: 0 }, victories: [], lastUpdated: new Date().toISOString() }; localStorage.setItem(key, JSON.stringify(m)); return m; }
            m = JSON.parse(m); const now = new Date(), ws = getWeekStart(now);
            if (m.weekStart !== ws) { localStorage.setItem(`${key}_${m.weekStart}`, JSON.stringify(m)); const nm = { weekStart: ws, fears: {}, positiveTopics: {}, mood: { happy: 0, sad: 0, scared: 0 }, victories: [], lastUpdated: new Date().toISOString() }; localStorage.setItem(key, JSON.stringify(nm)); return nm; }
            return m;
        }
        function updateWeeklyMemory(fear, topic, moodType, victory = null) { const m = getWeeklyMemory(); if (fear && m.fears) { if (!m.fears[fear]) m.fears[fear] = { count: 0, resolved: false }; m.fears[fear].count++; m.fears[fear].lastMention = new Date().toISOString(); } if (topic && m.positiveTopics) m.positiveTopics[topic] = (m.positiveTopics[topic] || 0) + 1; if (moodType && m.mood) m.mood[moodType] = (m.mood[moodType] || 0) + 1; if (victory && m.victories) { m.victories.push(victory); if (m.victories.length > 5) m.victories.shift(); } m.lastUpdated = new Date().toISOString(); localStorage.setItem(`weeklyMemory_${currentChildIndex}`, JSON.stringify(m)); }
        
        // ========== ОСНОВНЫЕ ДАННЫЕ ==========
        let isPremium = localStorage.getItem('isPremium') === 'true';
        const currentChild = getCurrentChild();
        let childName = currentChild.name, childAge = currentChild.age;
        let savedPin = localStorage.getItem('parentPin');
        let mood, hunger, energy, bravery, fearStats, conversationHistory, fishScore, storyCount;
        loadChildData(currentChildIndex);
        if (conversationHistory.length > 50) conversationHistory = conversationHistory.slice(0, 50);
        
        const characters = { lucik: { name: 'Люцик', icon: 'avatar.png', premium: false }, mom: { name: 'Мама', icon: 'mom.png', premium: true }, dad: { name: 'Папа', icon: 'dad.png', premium: true }, kid1: { name: 'Ребёнок 1', icon: 'kid1.png', premium: true }, kid2: { name: 'Ребёнок 2', icon: 'kid2.png', premium: true } };
        let currentChar = localStorage.getItem('currentCharacter') || 'lucik';
        
        // Установка аватара по полу
        function setAvatarByGender() {
            const child = getCurrentChild();
            if (child.gender === 'girl') currentChar = 'kid1';
            else if (child.gender === 'boy') currentChar = 'kid2';
            else currentChar = 'lucik';
            localStorage.setItem('currentCharacter', currentChar);
            document.getElementById('avatar').style.backgroundImage = `url('${characters[currentChar].icon}')`;
            updateAvatarLock();
            updateAvatarLabel();
        }
        setAvatarByGender();
        
        initAchievements();
        updateChildIndicator();
        sendAnalytics('app_open');
        window.addEventListener('beforeunload', () => { saveChildData(currentChildIndex); sendAnalytics('session_end'); });
        
        function updateStatsUI() { document.getElementById('moodFill').style.width = mood + '%'; document.getElementById('hungerFill').style.width = hunger + '%'; document.getElementById('energyFill').style.width = energy + '%'; document.getElementById('braveryFill').style.width = bravery + '%'; }
        function updateUI() { updateStatsUI(); }
        function saveHistory(text) { conversationHistory.unshift(new Date().toLocaleTimeString() + ": " + text); if (conversationHistory.length > 50) conversationHistory.pop(); localStorage.setItem(`storyHistory_${currentChildIndex}`, JSON.stringify(conversationHistory)); }
        function updateFear(fear) { if (fearStats[fear] !== undefined) { fearStats[fear]++; localStorage.setItem(`fearStats_${currentChildIndex}`, JSON.stringify(fearStats)); bravery = Math.min(100, bravery + 10); localStorage.setItem(`lucik_bravery_${currentChildIndex}`, bravery); updateAchievement('brave_kid'); sendAnalytics('fear_detected', { fear }); const msgs = { темноты: 'боюсь темноты', врачей: 'боюсь врачей', одиночества: 'боюсь оставаться один', нового: 'боюсь нового', обиды: 'меня обидели', животных: 'боюсь животных' }; localStorage.setItem('pendingFearAlert', 'true'); localStorage.setItem('pendingFearText', msgs[fear] || fear); updateUI(); } }
        function updateAvatarLock() { const av = document.getElementById('avatar'), lo = document.getElementById('lockOverlay'), locked = characters[currentChar].premium && !isPremium; if (locked) { av.classList.add('premium-locked'); lo.style.display = 'flex'; } else { av.classList.remove('premium-locked'); lo.style.display = 'none'; } }
        
        // ========== ОЗВУЧКА ==========
        let currentAudio = null, isAudioPlaying = false, audioUnlocked = false;
        function unlockAudio() { if (audioUnlocked) return; const ctx = new (window.AudioContext || window.webkitAudioContext)(); ctx.resume().then(() => { audioUnlocked = true; }).catch(e => console.log('Audio unlock error:', e)); }
        function fallbackSpeak(text) { const ct = text.replace(/[\*\_\#]/g, ''); const u = new SpeechSynthesisUtterance(ct); u.lang = 'ru-RU'; u.rate = 0.9; u.onstart = () => document.getElementById('avatar').classList.add('talking'); u.onend = () => document.getElementById('avatar').classList.remove('talking'); window.speechSynthesis.speak(u); }

        function showRoomMenu() { const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<h3 style="margin-bottom:20px;">🏠 Моя комната</h3><button id="cr" style="background:#4CAF50;">🧸 Уборка комнаты</button><button id="du" style="background:#ff9f4a;">👕 Переодеть персонажа</button><div style="margin-top:20px;"><button class="close-btn" id="crm">Закрыть</button></div>`; document.body.appendChild(modal); document.getElementById('cr').onclick = () => { modal.remove(); sendAnalytics('room_clean'); energy = Math.min(100, energy + 10); mood = Math.min(100, mood + 5); localStorage.setItem(`lucik_energy_${currentChildIndex}`, energy); localStorage.setItem(`lucik_mood_${currentChildIndex}`, mood); updateStatsUI(); speak("Мурр! Комната стала чистой!"); playSound('purr'); saveHistory(`🧸 Убрал комнату для ${getCurrentChild().name}`); }; document.getElementById('du').onclick = () => { modal.remove(); sendAnalytics('dress_up'); if (!isPremium) { alert('🌟 Оформите подписку, чтобы переодевать персонажа!'); return; } const dm = document.createElement('div'); dm.className = 'modal'; dm.innerHTML = `<h3>👕 Выбери образ</h3><button id="d1">🦁 Обычный</button><button id="d2">🎩 В шляпе</button><button id="d3">🕶️ В очках</button><button id="d4">👑 С короной</button><div><button class="close-btn" id="cdm">Закрыть</button></div>`; document.body.appendChild(dm); document.getElementById('d1').onclick = () => { document.getElementById('avatar').style.filter = 'none'; dm.remove(); speak("Вернулся к обычному виду!"); }; document.getElementById('d2').onclick = () => { document.getElementById('avatar').style.filter = 'drop-shadow(0 0 5px gold)'; dm.remove(); speak("Какая стильная шляпа!"); }; document.getElementById('d3').onclick = () => { document.getElementById('avatar').style.filter = 'brightness(1.1)'; dm.remove(); speak("Очки делают меня умным!"); }; document.getElementById('d4').onclick = () => { document.getElementById('avatar').style.filter = 'drop-shadow(0         document.getElementById('nightStoryBtn').onclick = async () => { const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = `<h3>🌙 Люцик готовит сказку...</h3><p>Пожалуйста, подожди</p>`; document.body.appendChild(modal); speak("Мяу! Сейчас я расскажу тебе длинную, уютную сказку на ночь..."); const longStory = await askDeepSeek("Расскажи длинную, спокойную сказку на ночь для ребёнка 3-7 лет.", true); modal.remove(); storyCount++; localStorage.setItem(`storyCount_${currentChildIndex}`, storyCount); updateAchievement('story_lover', 1); sendAnalytics('story_night'); const sm = document.createElement('div'); sm.className = 'modal'; sm.style.maxWidth = '90%'; sm.style.maxHeight = '70%'; sm.style.overflow = 'auto'; sm.innerHTML = `<h3>🌙 Сказка на ночь</h3><p style="margin:15px 0; line-height:1.4;">${longStory.replace(/\n/g, '<br>')}</p><button class="close-btn" onclick="this.parentElement.remove()">Закрыть</button>`; document.body.appendChild(sm); speak(longStory); saveHistory(`🌙 Люцик рассказал длинную сказку на ночь`); };
        
        const badWords = ['мат', 'дурак', 'идиот', 'тупой', 'заткнись', 'пошёл', 'уйди', 'убирайся', 'хрен', 'фиг', 'блин', 'черт'];
        function containsBadWords(text) { if (!text) return false; return badWords.some(w => text.toLowerCase().includes(w)); }
        
        document.getElementById('feedBtn').onclick = () => { sendAnalytics('feed'); hunger = Math.min(100, hunger + 15); mood = Math.min(100, mood + 5); localStorage.setItem(`lucik_mood_${currentChildIndex}`, mood); localStorage.setItem(`lucik_hunger_${currentChildIndex}`, hunger); updateStatsUI(); playSound('eat'); saveHistory(`🍎 Покормил ${characters[currentChar].name}`); };
        document.getElementById('gamesBtn').onclick = () => showGameMenu();
        document.getElementById('roomBtn').onclick = () => showRoomMenu();
        
        let isListening = false, isWaiting = false;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition; let rec = null;
        if (SpeechRec) { rec = new SpeechRec(); rec.lang = 'ru-RU'; rec.continuous = false; }
        document.getElementById('micBtn').onclick = () => { if (!rec) { speak("Голос не поддерживается"); return; } if (isListening) return; if (isWaiting) { speak("Подожди, я ещё отвечаю..."); return; } isListening = true; document.getElementById('micBtn').classList.add('recording'); document.getElementById('avatar').classList.add('listening'); rec.start(); sendAnalytics('talk_start'); };
        if (rec) { rec.onresult = async (e) => { const text = e.results[0][0].transcript; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('avatar').classList.remove('listening'); isListening = false; saveHistory(`👶 ${childName}: ${text}`); updateAchievement('first_talk'); const lower = text.toLowerCase(); if (lower.includes('темнот')) updateFear('темноты'); else if (lower.includes('врач')) updateFear('врачей'); else if (lower.includes('один')) updateFear('одиночества'); else if (lower.includes('обид')) updateFear('обиды'); else if (lower.includes('новое')) updateFear('нового'); else if (lower.includes('собака') || lower.includes('кошка')) updateFear('животных'); isWaiting = true; const answer = await askDeepSeek(text); isWaiting = false; saveHistory(`🦁 ${characters[currentChar].name}: ${answer}`); speak(answer); purr(); }; rec.onerror = () => { document.getElementById('micBtn').classList.remove('recording'); document.getElementById('avatar').classList.remove('listening'); isListening = false; speak("Не расслышал, скажи ещё раз!"); }; }
        
        document.getElementById('parentBtn').onclick = () => { if (!savedPin) { const pin = prompt('Создайте пароль для входа в Штаб (4-6 цифр):'); if (pin && pin.length >= 4 && /^\d+$/.test(pin)) { localStorage.setItem('parentPin', encodePin(pin)); savedPin = encodePin(pin); alert('Пароль создан! Теперь вы можете войти в Штаб.'); window.location.href = '/parent.html'; } else alert('Пароль должен содержать 4-6 цифр!'); } else { const pin = prompt('Введите пароль для входа в Штаб:'); if (pin === decodePin(savedPin)) window.location.href = '/parent.html'; else if (pin !== null) alert('Неверный пароль!'); } };
        
        updateAvatarLock(); updateAvatarLabel(); updateStatsUI(); changeCharacter(currentChar);
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error', e)); }
        function updateTimeTheme() { const hour = new Date().getHours(); if (hour >= 18 || hour < 6) document.body.classList.add('night'); else document.body.classList.remove('night'); }
        updateTimeTheme(); setInterval(updateTimeTheme, 60000);
        speak(`Мяу! Привет, ${childName}! Нажми на микрофон, и мы подружимся!`);
    </script>
</body>
</html>
