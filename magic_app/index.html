<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Герой Сказок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8d5a8, #d4c08c, #c8b078);
            min-height: 100vh;
            color: #3a2a1a;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .glass {
            background: rgba(255,248,235,0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        h1 { font-size: 48px; color: #6b3a1f; text-align: center; }
        .btn {
            background: #c8a86c;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }
        .btn-blue { background: #00d2ff; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            margin: 10px 0;
            background: rgba(255,248,235,0.3);
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .nav-link {
            color: #6b3a1f;
            text-decoration: none;
            margin: 0 10px;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            font-size: 12px;
        }
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="avatar.png" style="height: 50px; width: 50px; border-radius: 50%;">
                <span style="font-weight: bold; font-size: 20px;">Герой Сказок</span>
            </div>
            <div>
                <a href="/" class="nav-link">Главная</a>
                <a href="/app.html" class="nav-link">Приложение</a>
                <a href="/account.html" class="nav-link">Личный кабинет</a>
            </div>
        </div>

        <div class="glass" style="text-align: center; margin-bottom: 30px;">
            <h1>🦁 Герой Сказок</h1>
            <p style="font-size: 20px; margin: 20px 0;">Виртуальный друг с ИИ для детей 3-7 лет</p>
            <button class="btn" id="installBtn">📱 Установить приложение</button>
            <a href="/app.html" class="btn btn-blue">🎮 Открыть</a>
        </div>

        <div class="glass" style="max-width: 400px; margin: 0 auto;">
            <h2 style="text-align: center;">🔐 Вход</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn" id="loginBtn" style="width: 100%;">Войти</button>
            <button class="btn btn-blue" id="registerBtn" style="width: 100%;">Зарегистрироваться</button>
            <div id="loginStatus" style="text-align: center; margin-top: 10px;"></div>
        </div>

        <footer>
            <p>© 2026 Герой Сказок</p>
            <a href="/privacy.html">Политика</a> | <a href="/terms.html">Соглашение</a>
        </footer>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-block';
        });
        
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if (outcome === 'accepted') installBtn.style.display = 'none';
            } else {
                alert('Нажмите три точки → "Установить приложение"');
            }
        });

        document.getElementById('registerBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            document.getElementById('loginStatus').innerHTML = data.success ? '✅ Регистрация успешна!' : '❌ ' + data.error;
        };

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userToken', data.token);
                window.location.href = '/account.html';
            } else {
                document.getElementById('loginStatus').innerHTML = '❌ ' + data.error;
            }
        };
    </script>
</body>
</html>
