<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Герой Сказки</title>
    <link rel="icon" href="avatar.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); background-size: 400% 400%; animation: gradientBG 15s ease infinite; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; text-align: center; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* 1. Регистрация */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a2a6c; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .btn-magic { background: #00d2ff; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        input, select { width: 100%; max-width: 300px; padding: 15px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box;}

        /* 2. Защита и Штаб */
        #parent-entry { position: fixed; top: 20px; right: 20px; font-size: 28px; cursor: pointer; opacity: 0.4; z-index: 100; }
        #auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 600; justify-content: center; align-items: center; flex-direction: column; }
        #parent-mode { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 25, 45, 0.98); backdrop-filter: blur(25px); z-index: 500; padding: 40px 20px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .parent-card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }

        /* 3. Премиум и Магазин */
        .premium-banner { background: linear-gradient(90deg, #fdbb2d, #b21f1f); border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: pointer; text-align: center; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .shop-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); opacity: 0.5; position: relative; }
        .shop-item.active { opacity: 1; border-color: #fdbb2d; }

        /* 4. Ребенок */
        .avatar-container { position: relative; margin-bottom: 25px; z-index: 10; }
        .avatar { width: 190px; height: 190px; border-radius: 50%; background-image: url('avatar.png'); background-size: cover; border: 5px solid rgba(255, 255, 255, 0.3); animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #story-box { width: 85%; max-width: 480px; background: rgba(255,255,255,0.12); padding: 30px; border-radius: 25px; backdrop-filter: blur(20px); }
        .history-item { font-size: 13px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #00d2ff; }
    </style>
</head>
<body>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="welcome-screen">
        <h1>✨ Привет, Создатель!</h1>
        <p style="opacity: 0.8;">Настройте магию для ребенка</p>
        <input type="text" id="reg-name" placeholder="Имя ребенка">
        <input type="number" id="reg-age" placeholder="Возраст">
        <button class="btn-magic" onclick="finishReg()">Начать 🐾</button>
    </div>

    <!-- ВХОД С ПАРОЛЕМ -->
    <div id="parent-entry" onclick="checkAccess()">⚙️</div>
    <div id="auth-modal">
        <h3 id="auth-title">Ключ доступа</h3>
        <input type="password" id="pin-field" maxlength="4" style="font-size:24px; letter-spacing:10px; width:200px;">
        <button class="btn-magic" style="margin-top:20px;" onclick="verifyPin()">Войти</button>
        <button onclick="closeAuth()" style="background:none; border:none; color:white; margin-top:15px;">Отмена</button>
    </div>

    <!-- ШТАБ СОЗДАТЕЛЯ -->
    <div id="parent-mode">
        <h2 style="color: #00d2ff; margin:0;">🚀 Штаб Создателя</h2>
        <div class="premium-banner" id="prem-banner" onclick="activatePremium()">
            <div id="prem-text" style="font-weight:bold;">🌟 Активировать Создатель+</div>
        </div>

        <div class="parent-card">
            <label style="font-size:12px; opacity:0.6;">ИМЯ: <b id="disp-name">...</b></label>
            <select id="child-fear" style="margin-top:10px; width:100%; max-width:none;">
                <option value="темноты">Страх темноты</option>
                <option value="врачей">Поход к врачу</option>
            </select>
            <button class="btn-magic" style="width:100%;" onclick="saveSettings()">СОХРАНИТЬ</button>
        </div>

        <div class="shop-grid">
            <div class="shop-item" id="it-1">🎤<br><small>Голос Мамы</small></div>
            <div class="shop-item" id="it-2">🦖<br><small>Герой Драко</small></div>
        </div>

        <h3 style="color:#fdbb2d; margin-top:20px;">📒 Дневник разговоров</h3>
        <div class="parent-card" id="history-list">Тишина...</div>

        <button onclick="closeParentMode()" style="width:100%; background:none; border:none; color:white; margin-top:20px;">Назад</button>
    </div>

    <!-- ЭКРАН РЕБЕНКА -->
    <div class="avatar-container"><div class="avatar"></div></div>
    <button id="btn" style="width:80px; height:80px; background:#ff4081; border:none; border-radius:50%; font-size:35px; color:white; cursor:pointer; margin-bottom:20px;">🎤</button>
    <div id="story-box">Люцик ждет...</div>

    <script>
        let config = {
            name: localStorage.getItem('childName'),
            pin: localStorage.getItem('parentPin'),
            premium: localStorage.getItem('isPremium') === 'true'
        };

        if (!config.name) {
            document.getElementById('welcome-screen').style.display = 'flex';
        } else {
            initApp();
        }

        function finishReg() {
            const n = document.getElementById('reg-name').value;
            const a = document.getElementById('reg-age').value;
            if (n && a) {
                localStorage.setItem('childName', n);
                localStorage.setItem('childAge', a);
                location.reload();
            }
        }

        function initApp() {
            document.getElementById('disp-name').innerText = config.name;
            document.getElementById('story-box').innerText = "Привет, " + config.name + "!";
            if(config.premium) applyPremiumUI();
            updateHistory();
        }

        function checkAccess() {
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('auth-title').innerText = config.pin ? "Введите ключ" : "Придумайте 4 цифры";
        }

        function verifyPin() {
            const val = document.getElementById('pin-field').value;
            if(!config.pin) {
                if(val.length === 4) { localStorage.setItem('parentPin', val); location.reload(); }
            } else if(val === config.pin) {
                closeAuth(); document.getElementById('parent-mode').style.display = 'block';
            } else { alert("Неверно!"); }
        }

        function activatePremium() {
            if(confirm("Активировать Создатель+?")) {
                localStorage.setItem('isPremium', 'true');
                location.reload();
            }
        }

        function applyPremiumUI() {
            document.getElementById('prem-banner').style.background = "#4caf50";
            document.getElementById('prem-text').innerText = "✅ Создатель+ Активен";
            document.getElementById('it-1').classList.add('active');
            document.getElementById('it-2').classList.add('active');
        }

        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function closeParentMode() { document.getElementById('parent-mode').style.display = 'none'; }
        function saveSettings() {
            localStorage.setItem('childFear', document.getElementById('child-fear').value);
            location.reload();
        }

        function updateHistory() {
            const hist = JSON.parse(localStorage.getItem('chatHistory') || "[]");
            const cont = document.getElementById('history-list');
            if(hist.length > 0) cont.innerHTML = hist.map(h => `<div class="history-item"><b>${h.date}:</b> ${h.text}</div>`).join('');
        }

        const btn = document.getElementById('btn');
        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition(); rec.lang = 'ru-RU';
            btn.onclick = () => { rec.start(); btn.style.background = '#f44336'; };
            rec.onresult = (e) => {
                const speech = e.results[0][0].transcript;
                btn.style.background = '#ff4081';
                
                let hist = JSON.parse(localStorage.getItem('chatHistory') || "[]");
                hist.unshift({ date: new Date().toLocaleTimeString(), text: speech });
                localStorage.setItem('chatHistory', JSON.stringify(hist.slice(0, 5)));

                document.getElementById('story-box').innerText = "Ты сказал: " + speech;
                const utter = new SpeechSynthesisUtterance("Храбрый " + config.name + "! Твоя история про " + speech + " очень интересная!");
                window.speechSynthesis.speak(utter);
                updateHistory();
            };
        }
    </script>
</body>
</html>
