<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Герой Сказок</title>
    <link rel="icon" href="avatar.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* ЭКРАН РЕГИСТРАЦИИ */
        .screen-register {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            text-align: center;
        }

        .screen-register input {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            margin: 10px;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            text-align: center;
            font-size: 16px;
        }

        .screen-register button {
            background: #00d2ff;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            margin-top: 20px;
            cursor: pointer;
        }

        /* ОСНОВНОЙ ЭКРАН */
        .screen-main {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100vh;
            padding: 20px 0 80px 0;
            box-sizing: border-box;
            position: relative;
        }

        .top-bar {
            position: fixed;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .weather-icon {
            font-size: 36px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .parent-btn {
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Шкалы */
        .stats-container {
            position: fixed;
            top: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 10px 15px;
            z-index: 90;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .stat-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .fill-mood { background: #fdbb2d; }
        .fill-hunger { background: #4CAF50; }
        .fill-energy { background: #00d2ff; }
        .fill-bravery { background: #ff4081; }

        .avatar {
            width: 220px;
            height: 220px;
            background-image: url('avatar.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-top: 120px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .avatar.talking {
            animation: pulse 0.5s infinite;
            filter: drop-shadow(0 0 15px #00d2ff);
        }

        .avatar.listening {
            animation: pulse 1s infinite;
            filter: drop-shadow(0 0 15px #4CAF50);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .mic-btn {
            width: 85px;
            height: 85px;
            background: #ff4081;
            border: none;
            border-radius: 50%;
            font-size: 45px;
            cursor: pointer;
            margin: 10px auto;
            transition: 0.1s;
        }

        .mic-btn.recording {
            background: #4CAF50;
            transform: scale(1.05);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
        }

        .status-text {
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 30px;
            margin: 5px 20px;
            font-size: 16px;
            text-align: center;
        }

        .footer {
            position: fixed;
            bottom: 5px;
            font-size: 10px;
            opacity: 0.4;
            width: 100%;
            text-align: center;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        /* Родительская панель */
        .parent-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0c29;
            z-index: 1000;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .parent-panel h3 {
            color: #fdbb2d;
        }

        .close-panel {
            background: #ff4081;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            color: white;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .avatar { width: 180px; height: 180px; margin-top: 100px; }
            .mic-btn { width: 75px; height: 75px; font-size: 40px; }
            .action-btn { width: 55px; height: 55px; font-size: 24px; }
        }
    </style>
</head>
<body>

<!-- ЭКРАН РЕГИСТРАЦИИ -->
<div id="registerScreen" class="screen-register">
    <h1>✨ Привет, Создатель!</h1>
    <input type="text" id="childNameInput" placeholder="Имя ребенка">
    <input type="number" id="childAgeInput" placeholder="Возраст">
    <button id="startBtn">Начать 🐾</button>
</div>

<!-- ОСНОВНОЙ ЭКРАН -->
<div id="mainScreen" class="screen-main">
    <div class="top-bar">
        <div class="weather-icon" id="weatherIcon">☀️</div>
        <div class="parent-btn" id="parentBtn">⚙️ Родителям</div>
    </div>

    <div class="stats-container">
        <div class="stat-item"><span class="stat-icon">😊</span><div class="stat-bar"><div class="stat-fill fill-mood" id="moodFill" style="width:70%"></div></div></div>
        <div class="stat-item"><span class="stat-icon">🍽️</span><div class="stat-bar"><div class="stat-fill fill-hunger" id="hungerFill" style="width:60%"></div></div></div>
        <div class="stat-item"><span class="stat-icon">⚡</span><div class="stat-bar"><div class="stat-fill fill-energy" id="energyFill" style="width:50%"></div></div></div>
        <div class="stat-item"><span class="stat-icon">⭐</span><div class="stat-bar"><div class="stat-fill fill-bravery" id="braveryFill" style="width:0%"></div></div></div>
    </div>

    <div class="avatar" id="avatar"></div>

    <button class="mic-btn" id="micButton">🎤</button>

    <div class="action-buttons">
        <button class="action-btn" id="feedBtn">🍎</button>
        <button class="action-btn" id="playBtn">🎾</button>
        <button class="action-btn" id="dressBtn">🧸</button>
        <button class="action-btn" id="roomBtn">🏠</button>
    </div>

    <div class="status-text" id="statusText">Нажми на микрофон 🎤</div>

    <div class="footer">
        <a href="privacy.html">Политика конфиденциальности</a>
    </div>
</div>

<!-- РОДИТЕЛЬСКАЯ ПАНЕЛЬ -->
<div id="parentPanel" class="parent-panel">
    <h2>🚀 Штаб Создателя</h2>
    <div id="pinStatus"></div>
    <input type="password" id="pinInput" placeholder="Пароль" style="width:100%; padding:10px; margin:10px 0;">
    <button id="pinSaveBtn">Сохранить пароль</button>
    <button id="pinCheckBtn">Войти</button>
    <hr>
    <h3>⭐ Промокод</h3>
    <input type="text" id="promoInput" placeholder="TEST2025">
    <button id="promoBtn">Активировать</button>
    <h3>📊 Дневник страхов</h3>
    <div id="fearStats">😨 Темнота: 0<br>🏥 Врачи: 0<br>🧸 Одиночество: 0<br>🌟 Новое: 0<br>💔 Обиды: 0<br>🐕 Животные: 0</div>
    <br>
    <button class="close-panel" id="closePanelBtn">Закрыть</button>
</div>

<script>
    // ========== 1. ЗАГРУЗКА ИМЕНИ ==========
    let childName = localStorage.getItem('childName');
    let childAge = localStorage.getItem('childAge');
    let savedPin = localStorage.getItem('parentPin');
    let isPremium = localStorage.getItem('isPremium') === 'true';

    // Шкалы
    let mood = parseInt(localStorage.getItem('lucik_mood')) || 70;
    let hunger = parseInt(localStorage.getItem('lucik_hunger')) || 60;
    let energy = parseInt(localStorage.getItem('lucik_energy')) || 50;
    let bravery = parseInt(localStorage.getItem('lucik_bravery')) || 0;

    // Статистика страхов
    let fearStats = JSON.parse(localStorage.getItem('fearStats') || '{"темноты":0,"врачей":0,"одиночества":0,"нового":0,"обиды":0,"животных":0}');

    function updateStatsUI() {
        document.getElementById('moodFill').style.width = mood + '%';
        document.getElementById('hungerFill').style.width = hunger + '%';
        document.getElementById('energyFill').style.width = energy + '%';
        document.getElementById('braveryFill').style.width = bravery + '%';
    }

    function saveStats() {
        localStorage.setItem('lucik_mood', mood);
        localStorage.setItem('lucik_hunger', hunger);
        localStorage.setItem('lucik_energy', energy);
        localStorage.setItem('lucik_bravery', bravery);
        updateStatsUI();
    }

    function updateFearStatsUI() {
        document.getElementById('fearStats').innerHTML = `
            😨 Темнота: ${fearStats['темноты'] || 0}<br>
            🏥 Врачи: ${fearStats['врачей'] || 0}<br>
            🧸 Одиночество: ${fearStats['одиночества'] || 0}<br>
            🌟 Новое: ${fearStats['нового'] || 0}<br>
            💔 Обиды: ${fearStats['обиды'] || 0}<br>
            🐕 Животные: ${fearStats['животных'] || 0}
        `;
    }

    function updateFearStats(fear) {
        if (fearStats[fear] !== undefined) {
            fearStats[fear]++;
            localStorage.setItem('fearStats', JSON.stringify(fearStats));
            updateFearStatsUI();
            bravery = Math.min(100, bravery + 10);
            saveStats();
        }
    }

    const registerScreen = document.getElementById('registerScreen');
    const mainScreen = document.getElementById('mainScreen');

    if (childName && childAge) {
        registerScreen.style.display = 'none';
        mainScreen.style.display = 'flex';
        document.getElementById('statusText').innerHTML = `Привет, ${childName}! Нажми на микрофон 🎤`;
        updateStatsUI();
        updateFearStatsUI();
    } else {
        registerScreen.style.display = 'flex';
        mainScreen.style.display = 'none';
    }

    document.getElementById('startBtn').addEventListener('click', () => {
        const name = document.getElementById('childNameInput').value;
        const age = document.getElementById('childAgeInput').value;
        if (name && age) {
            localStorage.setItem('childName', name);
            localStorage.setItem('childAge', age);
            childName = name;
            registerScreen.style.display = 'none';
            mainScreen.style.display = 'flex';
            document.getElementById('statusText').innerHTML = `Привет, ${name}! Нажми на микрофон 🎤`;
            updateStatsUI();
            updateFearStatsUI();
        } else {
            alert('Введите имя и возраст');
        }
    });

    // ========== 2. ГОЛОС ==========
    function speak(message) {
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9;
        const avatar = document.getElementById('avatar');
        utterance.onstart = () => avatar.classList.add('talking');
        utterance.onend = () => avatar.classList.remove('talking');
        window.speechSynthesis.speak(utterance);
    }

    function purr() {
        const audio = new Audio('purr.mp3');
        audio.play().catch(e => console.log('no purr.mp3'));
    }

    const micButton = document.getElementById('micButton');
    const statusText = document.getElementById('statusText');
    let isListening = false;

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognitionAPI) {
        recognition = new SpeechRecognitionAPI();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false;
    }

    micButton.addEventListener('click', () => {
        if (!recognition) {
            statusText.innerText = '❌ Голос не поддерживается';
            return;
        }
        if (isListening) return;
        isListening = true;
        micButton.classList.add('recording');
        document.getElementById('avatar').classList.add('listening');
        statusText.innerText = '🎤 Слушаю... скажи что-нибудь';
        recognition.start();
    });

    if (recognition) {
        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            statusText.innerText = `Ты сказал: "${text}"`;
            micButton.classList.remove('recording');
            document.getElementById('avatar').classList.remove('listening');
            isListening = false;

            // Определяем страх
            const lowerText = text.toLowerCase();
            if (lowerText.includes('темнот') || lowerText.includes('ночь')) updateFearStats('темноты');
            else if (lowerText.includes('врач') || lowerText.includes('укол')) updateFearStats('врачей');
            else if (lowerText.includes('один') || lowerText.includes('одна')) updateFearStats('одиночества');
            else if (lowerText.includes('обид')) updateFearStats('обиды');
            else if (lowerText.includes('новое') || lowerText.includes('первый раз')) updateFearStats('нового');
            else if (lowerText.includes('собака') || lowerText.includes('кошка')) updateFearStats('животных');

            speak(`Мяу, ${childName}! Ты сказал: "${text}". Расскажи ещё что-нибудь!`);
            statusText.innerText = `🦁 ${childName}, я тебя понял!`;
            purr();
        };

        recognition.onerror = () => {
            statusText.innerText = '🦁 Не расслышал, попробуй ещё раз';
            micButton.classList.remove('recording');
            document.getElementById('avatar').classList.remove('listening');
            isListening = false;
        };

        recognition.onend = () => {
            micButton.classList.remove('recording');
            document.getElementById('avatar').classList.remove('listening');
            isListening = false;
        };
    }

    // ========== 3. КНОПКИ ДЕЙСТВИЙ ==========
    document.getElementById('feedBtn').addEventListener('click', () => {
        hunger = Math.min(100, hunger + 15);
        mood = Math.min(100, mood + 5);
        saveStats();
        speak("Мур-р-р, вкусно! Спасибо!");
        purr();
    });
    document.getElementById('playBtn').addEventListener('click', () => {
        if (energy >= 20) {
            energy -= 20;
            mood = Math.min(100, mood + 15);
            saveStats();
            speak("Ура! Весело играть с тобой!");
        } else {
            speak("Я слишком устал. Дай мне отдохнуть.");
        }
        purr();
    });
    document.getElementById('dressBtn').addEventListener('click', () => {
        speak("Мяу! Мне нравится этот наряд!");
        purr();
    });
    document.getElementById('roomBtn').addEventListener('click', () => {
        speak("Пойдём в мою комнату? Там уютно!");
        purr();
    });

    // Поглаживание
    document.getElementById('avatar').addEventListener('click', () => {
        mood = Math.min(100, mood + 10);
        saveStats();
        purr();
        speak(`Мурр, ${childName}, как приятно!`);
        statusText.innerText = `😊 Ты погладил кота!`;
    });

    // ========== 4. РОДИТЕЛЬСКАЯ ПАНЕЛЬ ==========
    const parentPanel = document.getElementById('parentPanel');
    const pinInput = document.getElementById('pinInput');
    const pinStatus = document.getElementById('pinStatus');

    function updatePinStatus() {
        if (savedPin) {
            pinStatus.innerText = '✅ Пароль установлен. Введите его для входа.';
        } else {
            pinStatus.innerText = '🔐 Пароль ещё не создан. Придумайте 4 цифры.';
        }
    }
    updatePinStatus();

    document.getElementById('parentBtn').addEventListener('click', () => {
        parentPanel.style.display = 'block';
    });
    document.getElementById('closePanelBtn').addEventListener('click', () => {
        parentPanel.style.display = 'none';
    });

    document.getElementById('pinSaveBtn').addEventListener('click', () => {
        const newPin = pinInput.value.trim();
        if (newPin.length >= 4 && /^\d+$/.test(newPin)) {
            localStorage.setItem('parentPin', newPin);
            savedPin = newPin;
            alert('Пароль сохранён!');
            updatePinStatus();
            pinInput.value = '';
        } else {
            alert('Пароль должен содержать минимум 4 цифры');
        }
    });

    document.getElementById('pinCheckBtn').addEventListener('click', () => {
        if (!savedPin) {
            alert('Сначала создайте пароль через кнопку "Сохранить пароль"');
            return;
        }
        const enteredPin = pinInput.value.trim();
        if (enteredPin === savedPin) {
            alert('Вход выполнен!');
        } else {
            alert('Неверный пароль!');
        }
        pinInput.value = '';
    });

    document.getElementById('promoBtn').addEventListener('click', () => {
        const code = document.getElementById('promoInput').value.trim();
        if (code === 'TEST2025') {
            localStorage.setItem('isPremium', 'true');
            isPremium = true;
            alert('Премиум активирован!');
        } else {
            alert('Неверный промокод');
        }
    });

    // ========== 5. ПОГОДА ==========
    function updateWeather() {
        const hour = new Date().getHours();
        const icon = document.getElementById('weatherIcon');
        if (hour >= 6 && hour < 12) icon.innerText = '🌤️';
        else if (hour >= 12 && hour < 18) icon.innerText = '☀️';
        else if (hour >= 18 && hour < 22) icon.innerText = '🌙';
        else icon.innerText = '⭐';
    }
    updateWeather();
    setInterval(updateWeather, 60000);

    // ========== 6. АВТОСНИЖЕНИЕ ==========
    setInterval(() => {
        hunger = Math.max(0, hunger - 2);
        energy = Math.max(0, energy - 1);
        if (hunger < 30 || energy < 30) mood = Math.max(0, mood - 5);
        saveStats();
    }, 30 * 60 * 1000);

    // ========== 7. SERVICE WORKER ==========
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error', e));
    }
</script>
</body>
</html>
