<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Люцик — Сказочный друг</title>
    <link rel="icon" href="avatar.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg-day: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); --bg-night: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-day); background-size: 400% 400%; animation: gradientBG 15s ease infinite; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; text-align: center; transition: background 2s ease; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a2a6c; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .btn-magic { background: #00d2ff; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        input, select { width: 100%; max-width: 300px; padding: 15px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box;}

        #parent-entry { position: fixed; top: 20px; right: 20px; font-size: 28px; cursor: pointer; opacity: 0.4; z-index: 100; }
        #auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 600; justify-content: center; align-items: center; flex-direction: column; }
        #parent-mode { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 25, 45, 0.98); backdrop-filter: blur(25px); z-index: 500; padding: 40px 20px; box-sizing: border-box; text-align: left; overflow-y: auto; }
        .parent-card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-top: 15px; }

        .avatar-container { position: relative; margin-bottom: 25px; z-index: 10; }
        .avatar { width: 190px; height: 190px; border-radius: 50%; background-image: url('avatar.png'); background-size: cover; border: 5px solid rgba(255, 255, 255, 0.3); transition: transform 0.3s ease; }
        .avatar.talking { animation: speak-pulse 0.5s ease-in-out infinite; border-color: #00d2ff; box-shadow: 0 0 30px rgba(0,210,255,0.6); }
        .avatar.listening { animation: listen-pulse 1s ease-in-out infinite; border-color: #4CAF50; box-shadow: 0 0 30px rgba(76,175,80,0.6); filter: brightness(1.1); }
        @keyframes speak-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes listen-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        #story-box { width: 85%; max-width: 480px; background: rgba(255,255,255,0.12); padding: 30px; border-radius: 25px; backdrop-filter: blur(20px); min-height: 60px; font-size: 16px; line-height: 1.4; }
        .history-item { font-size: 13px; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #00d2ff; }
        .loading { opacity: 0.7; }
        .loading::after { content: " ✨"; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: " ✨"; } 40% { content: " ✨✨"; } 60% { content: " ✨✨✨"; } 80%, 100% { content: " ✨✨✨✨"; } }
        .recording-indicator { position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #ff4081; border-radius: 50%; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>✨ Привет, Создатель!</h1>
        <input type="text" id="reg-name" placeholder="Имя ребенка">
        <input type="number" id="reg-age" placeholder="Возраст">
        <button class="btn-magic" onclick="finishReg()">Начать 🐾</button>
    </div>

    <div id="parent-entry" onclick="checkAccess()">⚙️</div>
    
    <div id="auth-modal">
        <h3 id="auth-title">Ключ доступа</h3>
        <input type="password" id="pin-field" maxlength="4" style="font-size:24px; letter-spacing:10px; width:200px;">
        <button class="btn-magic" onclick="verifyPin()">Войти</button>
        <button onclick="closeAuth()" style="background:none; border:none; color:white; margin-top:15px;">Отмена</button>
    </div>

    <div id="parent-mode">
        <h2 style="color: #00d2ff; margin:0;">🚀 Штаб Создателя</h2>
        <div class="parent-card">
            <label style="font-size:12px; opacity:0.6;">ИМЯ: <b id="disp-name">...</b></label>
            <select id="child-fear" style="margin-top:10px; width:100%; max-width:none;">
                <option value="темноты">Страх темноты</option>
                <option value="врачей">Поход к врачу</option>
                <option value="одиночества">Оставаться одному</option>
                <option value="нового">Пробовать новое</option>
            </select>
            <button class="btn-magic" style="width:100%;" onclick="saveSettings()">СОХРАНИТЬ</button>
        </div>
        <h3 style="color:#fdbb2d; margin-top:20px;">📒 Дневник разговоров</h3>
        <div id="history-list"></div>
        <button onclick="closeParentMode()" style="width:100%; background:none; border:none; color:white; margin-top:20px;">Назад</button>
    </div>

    <div class="avatar-container">
        <div id="main-avatar" class="avatar"></div>
    </div>
    <button id="btn" style="width:80px; height:80px; background:#ff4081; border:none; border-radius:50%; font-size:35px; color:white; cursor:pointer; margin-bottom:20px; transition: 0.3s; position: relative;">🎤</button>
    <div id="story-box">Загрузка магии...</div>

    <script>
        let config = {
            name: localStorage.getItem('childName'),
            pin: localStorage.getItem('parentPin'),
            fear: localStorage.getItem('childFear') || 'темноты'
        };

        // История диалога для поддержки контекста
        let conversationHistory = [];

        window.onload = () => {
            updateTimeTheme();
            if (!config.name) {
                document.getElementById('welcome-screen').style.display = 'flex';
            } else {
                initApp();
            }
            // Предзагрузка звука мурчания
            const audio = new Audio('purr.mp3');
            audio.load();
        };

        function initApp() {
            document.getElementById('disp-name').innerText = config.name;
            document.getElementById('child-fear').value = config.fear;
            document.getElementById('story-box').innerHTML = "Мур-р-р! Привет, " + config.name + "! Я Люцик. Расскажи, как у тебя дела? 🦁";
            updateHistory();
            // Сброс истории диалога
            conversationHistory = [];
        }

        function updateTimeTheme() {
            const hour = new Date().getHours();
            if (hour >= 18 || hour < 6) {
                document.body.style.background = "var(--bg-night)";
            } else {
                document.body.style.background = "var(--bg-day)";
            }
        }

        // Звук мурчания
        let purrAudio = null;
        function startPurr() {
            if (!purrAudio) {
                purrAudio = new Audio('purr.mp3');
                purrAudio.loop = true;
                purrAudio.volume = 0.3;
            }
            purrAudio.play().catch(e => console.log('Audio play failed:', e));
        }
        function stopPurr() {
            if (purrAudio) {
                purrAudio.pause();
                purrAudio.currentTime = 0;
            }
        }

        // Главная функция запроса к DeepSeek с историей
        async function askLucik(userSpeech) {
            const fear = document.getElementById('child-fear').value;
            const name = config.name;
            
            // Добавляем сообщение ребёнка в историю
            conversationHistory.push({ role: "user", content: userSpeech });
            
            // Ограничиваем историю последними 10 сообщениями
            if (conversationHistory.length > 10) {
                conversationHistory = conversationHistory.slice(-10);
            }
            
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    childName: name,
                    childFear: fear,
                    userSpeech: userSpeech,
                    history: conversationHistory.slice(0, -1) // отправляем предыдущую историю
                })
            });
            
            const data = await response.json();
            
            // Добавляем ответ Люцика в историю
            conversationHistory.push({ role: "assistant", content: data.story });
            
            return data.story;
        }

        async function processStory(childText) {
            const storyBox = document.getElementById('story-box');
            
            storyBox.innerHTML = "Люцик думает";
            storyBox.classList.add('loading');
            
            try {
                const story = await askLucik(childText);
                storyBox.classList.remove('loading');
                storyBox.innerHTML = story;
                speak(story);
                saveHistory(childText);
            } catch (error) {
                storyBox.classList.remove('loading');
                storyBox.innerHTML = "🦁 Мур-р-р, давай ещё раз? Я не расслышал!";
                console.error(error);
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            msg.rate = 0.9;
            const avatar = document.getElementById('main-avatar');
            msg.onstart = () => avatar.classList.add('talking');
            msg.onend = () => avatar.classList.remove('talking');
            window.speechSynthesis.speak(msg);
        }

        // Микрофон с визуальным эффектом "слушает"
        const btn = document.getElementById('btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const rec = new SpeechRecognition();
            rec.lang = 'ru-RU';
            rec.interimResults = false;
            rec.maxAlternatives = 1;
            
            btn.onclick = () => {
                rec.start();
                btn.style.transform = "scale(1.2)";
                btn.style.background = "#4CAF50";
                document.getElementById('story-box').innerHTML = "🎤 Люцик слушает... Мур-р-р";
                document.getElementById('main-avatar').classList.add('listening');
                startPurr();
            };
            
            rec.onresult = async (e) => {
                btn.style.transform = "scale(1)";
                btn.style.background = "#ff4081";
                document.getElementById('main-avatar').classList.remove('listening');
                stopPurr();
                const text = e.results[0][0].transcript;
                await processStory(text);
            };
            
            rec.onerror = () => {
                btn.style.transform = "scale(1)";
                btn.style.background = "#ff4081";
                document.getElementById('main-avatar').classList.remove('listening');
                stopPurr();
                document.getElementById('story-box').innerHTML = "🦁 Мур-р-р? Не расслышал, скажи ещё раз!";
            };
            
            rec.onend = () => {
                // Если вдруг закончилось без результата
                if (document.getElementById('main-avatar').classList.contains('listening')) {
                    document.getElementById('main-avatar').classList.remove('listening');
                    stopPurr();
                }
            };
        } else {
            document.getElementById('story-box').innerHTML = "Ваш браузер не поддерживает голосовой ввод";
        }

        function finishReg() {
            const n = document.getElementById('reg-name').value;
            const a = document.getElementById('reg-age').value;
            if (n && a) { localStorage.setItem('childName', n); localStorage.setItem('childAge', a); location.reload(); }
        }
        
        function saveSettings() {
            localStorage.setItem('childFear', document.getElementById('child-fear').value);
            alert("Настройки сохранены!");
            location.reload();
        }
        
        function checkAccess() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        
        function verifyPin() {
            const val = document.getElementById('pin-field').value;
            if(!config.pin) { if(val.length === 4) { localStorage.setItem('parentPin', val); location.reload(); } }
            else if(val === config.pin) { document.getElementById('parent-mode').style.display = 'block'; closeAuth(); }
            else { alert("Неверно!"); }
        }
        
        function closeParentMode() { document.getElementById('parent-mode').style.display = 'none'; }
        
        function saveHistory(t) {
            let h = JSON.parse(localStorage.getItem('storyHistory') || '[]');
            h.unshift(new Date().toLocaleTimeString() + ": " + t);
            localStorage.setItem('storyHistory', JSON.stringify(h.slice(0, 10)));
            updateHistory();
        }
        
        function updateHistory() {
            const h = JSON.parse(localStorage.getItem('storyHistory') || '[]');
            document.getElementById('history-list').innerHTML = h.map(i => `<div class="history-item">${i}</div>`).join('') || "Пока тишина...";
        }
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
