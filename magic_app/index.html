<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Герой Сказок — виртуальный друг с ИИ для детей 3-7 лет</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8d5b7, #dcc8a4);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* Стеклянная карточка (точно работает) */
        .glass-card {
            background: rgba(255, 250, 240, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 { color: #6b3a1f; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            background: linear-gradient(90deg, #d4a373, #b5835a);
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            margin: 10px;
            border: none;
            cursor: pointer;
        }
        .stat-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(255, 250, 240, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 20px;
            min-width: 120px;
        }
        .stat-number { font-size: 48px; font-weight: bold; color: #d4a373; }
        
        @media (max-width: 768px) {
            .glass-card { padding: 30px 20px; border-radius: 35px; }
            .stat-number { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>🏜️ Герой Сказок</h1>
        <p>Виртуальный друг с ИИ для детей 3-7 лет</p>
        
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-number" id="statFears">0</div>
                <div>страхов</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTales">0</div>
                <div>сказок</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statHours">0</div>
                <div>часов</div>
            </div>
        </div>
        
        <button class="btn" id="installBtn">📱 Установить приложение</button>
        <a href="/app.html" class="btn">🎮 Открыть в браузере</a>
    </div>

    <script>
        function loadStats() {
            const fearStats = JSON.parse(localStorage.getItem('fearStats') || '{}');
            const totalFears = Object.values(fearStats).reduce((a, b) => a + b, 0);
            document.getElementById('statFears').innerText = totalFears;
            
            const history = JSON.parse(localStorage.getItem('storyHistory') || '[]');
            const talesCount = history.filter(item => item.includes('Люцик:')).length;
            document.getElementById('statTales').innerText = talesCount;
            
            const totalTime = parseInt(localStorage.getItem('totalAppTime')) || 0;
            const hours = Math.floor(totalTime / 3600);
            document.getElementById('statHours').innerText = hours;
        }
        
        function installPWA() {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                alert('Приложение уже установлено!');
            } else if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
                alert('Нажмите "Поделиться" → "На экран Домой"');
            } else {
                alert('Нажмите на три точки в браузере → "Установить приложение"');
            }
        }
        
        document.getElementById('installBtn').addEventListener('click', installPWA);
        loadStats();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
