<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Родительский штаб — Герой Сказок</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui; min-height:100vh; color:#f0e6d0; background-image: url('parent-bg.png'); background-size:cover; background-position:center; overflow-x:hidden; }
        .container { max-width:600px; margin:0 auto; padding:30px 20px; }
        .card { background:rgba(0,0,0,0.55); backdrop-filter:blur(8px); border-radius:30px; padding:20px; margin-bottom:20px; border:1px solid rgba(160,180,140,0.3); }
        h1 { font-size:28px; margin-bottom:20px; text-align:center; color:#d4e6c3; }
        h2 { font-size:20px; margin-bottom:15px; color:#c4d6a3; border-left:3px solid #8bc34a; padding-left:12px; }
        .child-indicator { text-align:center; font-size:18px; font-weight:bold; background:rgba(0,0,0,0.5); padding:10px 20px; border-radius:30px; margin-bottom:20px; cursor:pointer; }
        button { background:#2d5a3b; border:none; padding:10px 20px; border-radius:30px; margin:5px; cursor:pointer; color:white; font-size:14px; transition:0.2s; }
        button:hover { background:#3d7a4b; transform:scale(1.02); }
        .btn-primary { background:#4a7a4a; }
        .btn-share { background:#25D366; }
        .btn-share-vk { background:#4c75a3; }
        .btn-share-tg { background:#26A5E4; }
        .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .stat-item { background:rgba(0,0,0,0.3); padding:8px 12px; border-radius:20px; font-size:14px; }
        .achievements-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .achievement-item { background:rgba(0,0,0,0.3); border-radius:20px; padding:10px; text-align:center; }
        .achievement-item.earned { background:rgba(255,215,0,0.2); border:1px solid #ffd700; }
        .history-list { max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:20px; padding:10px; font-size:12px; }
        .lock-icon { position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); padding:8px 15px; border-radius:30px; font-size:12px; z-index:10; cursor:pointer; }
        @media (max-width:480px){ .achievements-grid,.stats-grid{ grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="lock-icon" id="lockIcon">🔒 Родительская зона</div>
    <div class="container">
        <h1>🌲 Штаб Создателя</h1>
        <div class="child-indicator" id="childIndicator">👶 Загрузка...</div>
        <div id="fearAlert" class="alert-card" style="display:none; background:rgba(255,215,0,0.15); border-left:4px solid #ffd700; padding:12px 15px; border-radius:20px; margin-bottom:20px;">
            <div id="alertContent"></div>
            <button id="alertHelpBtn" style="margin-top:10px; background:#ff9f4a;">💬 Помочь поговорить</button>
        </div>
        <div class="card"><h2>🏆 Достижения</h2><div id="achievementsList" class="achievements-grid">Загрузка...</div></div>
        <div class="card">
            <h2>📊 Дневник страхов</h2><div class="stats-grid" id="fearStats"></div>
            <h3>📒 История разговоров</h3><div class="history-list" id="historyList">Пока тишина...</div>
            <button id="exportBtn" style="margin-top:10px; width:100%; background:#00d2ff;">📥 Экспорт данных (JSON)</button>
        </div>
        <div class="card"><h2>🧠 Помощь психолога</h2><button id="parentHelpBtn" class="btn-primary" style="width:100%;">💬 Получить совет</button></div>
        <div class="card">
            <h2>📤 Поделиться успехами</h2>
            <button id="shareAchievementBtn" class="btn-share" style="background:#ff9800;">🏆 Поделиться достижениями</button>
            <button id="shareBtn" class="btn-share">📱 WhatsApp</button>
            <button id="shareVkBtn" class="btn-share-vk">📱 VK</button>
            <button id="shareTgBtn" class="btn-share-tg">📱 Telegram</button>
            <p style="font-size:12px; margin-top:10px;">🎉 Расскажите о прогрессе ребёнка!</p>
        </div>
        <div class="card">
            <h2>📜 Документы</h2>
            <p><a href="/privacy.html" target="_blank" style="color:#a4d4a4;">Политика конфиденциальности</a></p>
            <p><a href="/terms.html" target="_blank" style="color:#a4d4a4;">Пользовательское соглашение</a></p>
        </div>
        <div style="text-align:center;">
            <button onclick="window.location.href='/account.html'" style="background:#00d2ff;">👤 Личный кабинет</button>
            <button onclick="window.location.href='/app.html'" style="background:#5a3a2a;">🏠 Вернуться к Люцику</button>
        </div>
    </div>
    <script>
        const PIN_SALT='lucik_magic_2024';
        function encodePin(pin){ return btoa(pin.split('').reverse().join('')+':'+PIN_SALT); }
        function decodePin(enc){ try{ return atob(enc).split(':')[0].split('').reverse().join(''); }catch(e){ return ''; } }
        
        let children=[], currentChildIndex=0;
        function loadChildren(){ try{ const s=localStorage.getItem('children'); if(s) children=JSON.parse(s); currentChildIndex=parseInt(localStorage.getItem('currentChildIndex')||'0'); if(currentChildIndex>=children.length) currentChildIndex=0; }catch(e){ children=[]; } if(children.length===0) children=[{name:'малыш',age:5,gender:'boy'}]; }
        function getCurrentChild(){ return children[currentChildIndex]||{name:'малыш',age:5}; }
        function updateChildIndicator(){ const c=getCurrentChild(); document.getElementById('childIndicator').innerHTML=`👶 ${c.name}, ${c.age} лет`; }
        function switchChild(direction){ if(children.length<=1) return; currentChildIndex+=direction; if(currentChildIndex<0) currentChildIndex=children.length-1; if(currentChildIndex>=children.length) currentChildIndex=0; localStorage.setItem('currentChildIndex',currentChildIndex); updateChildIndicator(); updateUI(); }
        let touchStart=0; document.getElementById('childIndicator').addEventListener('touchstart',e=>{ touchStart=e.changedTouches[0].screenX; }); document.getElementById('childIndicator').addEventListener('touchend',e=>{ const diff=e.changedTouches[0].screenX-touchStart; if(Math.abs(diff)>40) switchChild(diff>0?-1:1); }); document.getElementById('childIndicator').addEventListener('click',()=>{ if(children.length>1) switchChild(1); });
        
        function updateUI(){
            const idx=currentChildIndex;
            const fearData=localStorage.getItem(`fearStats_${idx}`); const fearStats=fearData?JSON.parse(fearData):{темноты:0,врачей:0,одиночества:0,нового:0,обиды:0,животных:0};
            document.getElementById('fearStats').innerHTML=`<div class="stat-item">😨 Темнота: ${fearStats.темноты||0}</div><div class="stat-item">🏥 Врачи: ${fearStats.врачей||0}</div><div class="stat-item">🧸 Одиночество: ${fearStats.одиночества||0}</div><div class="stat-item">🌟 Новое: ${fearStats.нового||0}</div><div class="stat-item">💔 Обиды: ${fearStats.обиды||0}</div><div class="stat-item">🐕 Животные: ${fearStats.животных||0}</div>`;
            const historyData=localStorage.getItem(`storyHistory_${idx}`); const history=historyData?JSON.parse(historyData):[];
            document.getElementById('historyList').innerHTML=history.slice(-15).map(i=>`<div class="history-item">${i}</div>`).join('')||"Пока тишина...";
            const pending=localStorage.getItem('pendingFearAlert'); const text=localStorage.getItem('pendingFearText')||'';
            if(pending==='true' && text){ document.getElementById('fearAlert').style.display='block'; document.getElementById('alertContent').innerHTML=`📢 <strong>Люцик заметил:</strong><br>Ребёнок сказал: "${text}"`; } else document.getElementById('fearAlert').style.display='none';
            const achData=localStorage.getItem(`achievements_${idx}`); const ach=achData?JSON.parse(achData):{};
            let html=''; for(const [id,a] of Object.entries(ach)){ html+=`<div class="achievement-item ${a.earned?'earned':'locked'}"><div style="font-size:24px;">${a.earned?'✅':'🔒'}</div><div style="font-weight:bold;">${a.name}</div><div style="font-size:10px;">${a.desc}</div>${a.progress?`<div>${a.progress}/${a.target}</div>`:''}</div>`; }
            document.getElementById('achievementsList').innerHTML=html||'Пока нет достижений';
        }
        
        async function getParentAdvice(fear){
            const modal=document.createElement('div'); modal.style.cssText='position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); border-radius:40px; padding:24px; z-index:3000; min-width:280px; max-width:90%; color:white;';
            modal.innerHTML=`<h3>🧠 Совет психолога</h3><div id="adviceResult">⏳ Загрузка...</div><button class="close-btn" style="background:#ff4081; padding:10px 20px; border-radius:30px; margin-top:15px;">Закрыть</button>`;
            document.body.appendChild(modal);
            try{
                const token=localStorage.getItem('userToken'); const child=getCurrentChild();
                const resp=await fetch('/api/parent-advice',{method:'POST',headers:{'Content-Type':'application/json','Authorization':token?`Bearer ${token}`:''},body:JSON.stringify({fear,childAge:child.age,childName:child.name})});
                const data=await resp.json();
                document.getElementById('adviceResult').innerHTML=data.advice?data.advice.replace(/\n/g,'<br>'):'❌ Не удалось получить совет.';
            }catch(e){ document.getElementById('adviceResult').innerHTML='❌ Ошибка соединения.'; }
            modal.querySelector('.close-btn').onclick=()=>modal.remove();
        }
        
        function shareWithAchievements(){
            const child=getCurrentChild(); const idx=currentChildIndex;
            const fearStats=JSON.parse(localStorage.getItem(`fearStats_${idx}`)||'{}');
            const totalFears=Object.values(fearStats).reduce((a,b)=>a+b,0);
            const bravery=parseInt(localStorage.getItem(`lucik_bravery_${idx}`)||'0');
            const stories=parseInt(localStorage.getItem(`storyCount_${idx}`)||'0');
            const achievements=JSON.parse(localStorage.getItem(`achievements_${idx}`)||'{}');
            const earnedCount=Object.values(achievements).filter(a=>a.earned).length;
            let text=`🎉 Мой ребёнок ${child.name} (${child.age} лет) пользуется "Герой Сказок"! Уже победил ${totalFears} страхов, набрал ${bravery}% храбрости, прослушал ${stories} сказок и получил ${earnedCount} достижений! Волшебный кот Люцик помогает детям справляться со страхами. Попробуйте: https://geroy-skazki.vercel.app`;
            const shareUrl=`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
            window.open(shareUrl,'_blank');
            sendAnalytics('share',{platform:'whatsapp_achievements',child:child.name});
        }
        
        function shareApp(platform){
            const child=getCurrentChild();
            let text=`🎉 Я пользуюсь "Герой Сказок" — волшебный кот Люцик помогает детям справляться со страхами. Мой ребёнок ${child.name} становится смелее! Попробуйте бесплатно: https://geroy-skazki.vercel.app`;
            const urls={ whatsapp:`https://wa.me/?text=${encodeURIComponent(text)}`, vk:`https://vk.com/share.php?url=https://geroy-skazki.vercel.app&title=Герой Сказок&description=${encodeURIComponent(text)}`, telegram:`https://t.me/share/url?url=https://geroy-skazki.vercel.app&text=${encodeURIComponent(text)}` };
            if(urls[platform]) window.open(urls[platform],'_blank');
            sendAnalytics('share',{platform,child:child.name});
        }
        
        function exportData(){
            const idx=currentChildIndex; const child=getCurrentChild();
            const data={ exportedAt:new Date().toISOString(), child, fearStats:JSON.parse(localStorage.getItem(`fearStats_${idx}`)||'{}'), conversationHistory:JSON.parse(localStorage.getItem(`storyHistory_${idx}`)||'[]'), achievements:JSON.parse(localStorage.getItem(`achievements_${idx}`)||'{}'), bravery:localStorage.getItem(`lucik_bravery_${idx}`), mood:localStorage.getItem(`lucik_mood_${idx}`), storyCount:localStorage.getItem(`storyCount_${idx}`), fishScore:localStorage.getItem(`fishScore_${idx}`) };
            const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`lucik_export_${child.name}_${Date.now()}.json`; a.click(); URL.revokeObjectURL(url);
            sendAnalytics('data_export',{child_name:child.name});
        }
        
        function sendAnalytics(et,ed={}){ fetch('/api/analytics',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_type:et,user_id:localStorage.getItem('userToken'),child_name:getCurrentChild().name,child_age:getCurrentChild().age,event_data:ed})}).catch(()=>{}); }
        
        async function checkAuth(){ const token=localStorage.getItem('userToken'); if(!token && !localStorage.getItem('guestMode')) window.location.href='/'; else return true; }
        
        (async function(){
            await checkAuth();
            const savedPin=localStorage.getItem('parentPin');
            if(savedPin){ const pin=prompt('Введите PIN-код:'); if(pin!==decodePin(savedPin)){ alert('Неверный PIN'); window.location.href='/app.html'; return; } }
            else{ const newPin=prompt('Создайте PIN-код (4-6 цифр):'); if(newPin && newPin.length>=4 && /^\d+$/.test(newPin)) localStorage.setItem('parentPin',encodePin(newPin)); else{ alert('PIN не задан'); window.location.href='/app.html'; return; } }
            loadChildren(); updateChildIndicator(); updateUI(); sendAnalytics('parent_page_view');
            document.getElementById('parentHelpBtn').onclick=()=>{ const m=document.createElement('div'); m.className='modal'; m.innerHTML=`<h3>Выберите страх</h3><button id="hd">😨 Темнота</button><button id="hv">🏥 Врачи</button><button id="ho">🧸 Одиночество</button><button id="ha">🐕 Животные</button><button id="hn">🌟 Новое</button><button id="hob">💔 Обиды</button><input id="cf" placeholder="Свой страх..."><button id="cfsend">👉</button><button class="close-btn" id="ccl">Закрыть</button>`; document.body.appendChild(m);
                const get=(f)=>{ m.remove(); getParentAdvice(f); };
                document.getElementById('hd').onclick=()=>get('темнота'); document.getElementById('hv').onclick=()=>get('врачи'); document.getElementById('ho').onclick=()=>get('одиночество'); document.getElementById('ha').onclick=()=>get('животные'); document.getElementById('hn').onclick=()=>get('новое'); document.getElementById('hob').onclick=()=>get('обиды'); document.getElementById('cfsend').onclick=()=>{ const val=document.getElementById('cf').value.trim(); if(val) get(val); }; document.getElementById('ccl').onclick=()=>m.remove();
            };
            document.getElementById('alertHelpBtn').onclick=()=>{ const fear=localStorage.getItem('pendingFearText')||''; localStorage.removeItem('pendingFearAlert'); localStorage.removeItem('pendingFearText'); updateUI(); getParentAdvice(fear); };
            document.getElementById('shareBtn').onclick=()=>shareApp('whatsapp'); document.getElementById('shareVkBtn').onclick=()=>shareApp('vk'); document.getElementById('shareTgBtn').onclick=()=>shareApp('telegram'); document.getElementById('shareAchievementBtn').onclick=()=>shareWithAchievements();
            document.getElementById('exportBtn').onclick=()=>exportData();
        })();
    </script>
</body>
</html>
